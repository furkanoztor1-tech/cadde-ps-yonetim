<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | PENCERE SİSTEMİ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --dark-bg: #0a0a0c; }
        
        /* EKRAN KAYMASINI TAMAMEN ENGELLER */
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--dark-bg); color: #fff; height: 100vh; overflow: hidden; }
        
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }

        /* ÜST PANEL SABİT */
        .top-area { flex-shrink: 0; margin-bottom: 10px; }
        .stat-card { background: #000; border: 1px solid var(--n-green); border-radius: 12px; padding: 10px; text-align: center; margin-bottom: 8px; }
        .glass { background: #111; border-radius: 12px; border: 1px solid #222; padding: 10px; }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 5px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Rajdhani'; box-sizing: border-box; font-size: 15px; }
        .t-btn-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 8px; }
        .t-btn { padding: 10px 2px; border: 1px solid #333; text-align: center; font-size: 10px; border-radius: 6px; background: #000; color: #777; font-weight: bold; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); }
        .btn-green { width: 100%; padding: 15px; background: var(--n-green); color: #000; font-weight: bold; border: none; border-radius: 10px; font-family: 'Orbitron'; cursor: pointer; font-size: 14px; }

        /* HER BAŞLIK KENDİ PENCERESİNDE */
        .window-container { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        
        .pencere { 
            display: flex; 
            flex-direction: column; 
            background: #080808; 
            border: 1px solid #1a1a1a; 
            border-radius: 10px; 
            flex: 1; 
            overflow: hidden; 
        }
        
        .pencere-baslik { 
            background: #111; 
            padding: 5px 12px; 
            font-family: 'Orbitron'; 
            font-size: 10px; 
            color: var(--n-blue); 
            border-bottom: 1px solid #222;
            letter-spacing: 1px;
        }

        .pencere-icerik { 
            flex-grow: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* Mobilde akıcı kaydırma */
        }

        .islem-item { padding: 10px; border-bottom: 1px solid #151515; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .info-box { flex: 1; }
        .amount { font-family: 'Orbitron'; font-size: 15px; }
        .meta { font-size: 11px; color: #555; display: block; }
        
        .action-btn { padding: 6px 12px; font-size: 10px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; margin-left: 5px; }
        .btn-sil { background: var(--red); color: #fff; font-size: 9px; padding: 4px 8px; }

        /* Scrollbar Gizleme */
        .pencere-icerik::-webkit-scrollbar { width: 3px; }
        .pencere-icerik::-webkit-scrollbar-thumb { background: var(--n-blue); }
    </style>
</head>
<body>

<div id="login-ekran" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="width:100%; max-width:300px; text-align:center;">
        <h2 style="font-family:'Orbitron'">CADDE PS</h2>
        <input type="text" id="k" placeholder="Kullanıcı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="btn-green" style="background:var(--n-blue); color:#fff;">GİRİŞ</button>
    </div>
</div>

<div id="panel" style="display:none;">
    <div class="main-wrapper">
        
        <div class="top-area">
            <div class="stat-card">
                <b id="vT" style="font-size:30px; color:var(--n-green); font-family:'Orbitron'">0₺</b>
            </div>

            <div class="glass">
                <select id="i-sube" onchange="verileriGetir()">
                    <option value="CADDEPS 1">ŞUBE 1</option>
                    <option value="CADDEPS 2">ŞUBE 2</option>
                </select>
                <div class="t-btn-group">
                    <div class="t-btn active" onclick="sec(this, 'Nakit')">NAKİT</div>
                    <div class="t-btn" onclick="sec(this, 'Kart')">KART</div>
                    <div class="t-btn" onclick="sec(this, 'Havale')">HAVALE</div>
                    <div class="t-btn" onclick="sec(this, 'Gider')">GİDER</div>
                    <div class="t-btn" onclick="sec(this, 'Borç')">BORÇ</div>
                </div>
                <input type="number" id="i-miktar" placeholder="Tutar ₺">
                <input type="text" id="i-not" placeholder="Not...">
                <button onclick="kaydet()" class="btn-green">KAYDET</button>
            </div>
        </div>

        <div class="window-container">
            <div class="pencere">
                <div class="pencere-baslik">AÇIK BORÇLAR</div>
                <div id="borc-log" class="pencere-icerik"></div>
            </div>

            <div class="pencere">
                <div class="pencere-baslik">BUGÜNKÜ İŞLEMLER</div>
                <div id="islem-log" class="pencere-icerik"></div>
            </div>

            <div class="pencere">
                <div class="pencere-baslik">GİDERLER</div>
                <div id="gider-log" class="pencere-icerik"></div>
            </div>
        </div>

    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase();
        const s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad && s === pDoc.data().sifre) start(k, "admin");
        else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) start(k, "staff"); else alert("Hatalı Giriş!");
        }
    }

    function start(u, r) {
        userRole = r; currentUserName = u.toUpperCase();
        localStorage.setItem('c_u', u); localStorage.setItem('c_p', document.getElementById('s').value);
        document.getElementById('login-ekran').style.display='none';
        document.getElementById('panel').style.display='block';
        verileriGetir();
    }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        const u1 = db.collection("islemler").where("sube", "==", sName).onSnapshot(snap => {
            let kasa = 0, log="", gLog="", bLog="";
            const docs = [];
            snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => (b.tarih?.seconds || 0) - (a.tarih?.seconds || 0));

            docs.forEach(d => {
                const m = Number(d.miktar) || 0;
                const isBorc = d.tip === "Borç" && d.durum === "aktif";
                const isToday = d.arsiv === false;
                if(d.durum === "iptal" && !isToday) return;

                if(isToday && d.durum !== "iptal") {
                    if(["Nakit", "Kart", "Havale"].includes(d.tip)) kasa += m;
                    else if(d.tip === "Gider") kasa -= m;
                }

                let silBtn = (userRole === "admin" || isToday) ? `<button onclick="iptal('${d.id}')" class="action-btn btn-sil">SİL</button>` : "";
                
                let satir = `<div class="islem-item">
                    <div class="info-box">
                        <span class="amount">${m}₺</span> - <span>${d.not}</span>
                        <span class="meta">${d.tip} | ${d.ekleyen}</span>
                    </div>
                    <div style="display:flex;">
                        ${isBorc ? `
                            <button onclick="ode('${d.id}',${m},'${d.not}','Nakit')" class="action-btn" style="background:var(--n-green); color:#000;">NAKİT</button>
                            <button onclick="ode('${d.id}',${m},'${d.not}','Kart')" class="action-btn" style="background:var(--n-blue); color:#000;">KART</button>
                        ` : silBtn}
                    </div>
                </div>`;

                if(isBorc) bLog += satir;
                else if(isToday) { if(d.tip === "Gider") gLog += satir; else log += satir; }
            });
            document.getElementById('vT').innerText = kasa + "₺";
            document.getElementById('islem-log').innerHTML = log || "<center style='padding:15px; color:#333; font-size:12px;'>Kayıt yok.</center>";
            document.getElementById('gider-log').innerHTML = gLog || "<center style='padding:15px; color:#333; font-size:12px;'>Gider yok.</center>";
            document.getElementById('borc-log').innerHTML = bLog || "<center style='padding:15px; color:#333; font-size:12px;'>Borç yok.</center>";
        });
        unsubs.push(u1);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || seciliTip,
            tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false, ekleyen: currentUserName
        });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function ode(id, m, n, tip) {
        if(!confirm("Tahsil edildi mi?")) return;
        await db.collection("islemler").doc(id).update({durum:"iptal", arsiv: true});
        await db.collection("islemler").add({
            miktar: m, tip: tip, sube: document.getElementById('i-sube').value,
            not: "[BORÇ] " + n, tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false, ekleyen: currentUserName
        });
    }

    function iptal(id) { if(confirm("Silinsin mi?")) db.collection("islemler").doc(id).update({durum:"iptal"}); }
    function sec(btn, val) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=val; }
    window.onload = () => { if(localStorage.getItem('c_u')) { document.getElementById('k').value=localStorage.getItem('c_u'); document.getElementById('s').value=localStorage.getItem('c_p'); giris(); } };
</script>
</body>
</html>
