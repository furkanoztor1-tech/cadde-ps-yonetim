<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v17.1 PWA</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CaddePS">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/00d2ff/000000?text=CPS">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Cadde%20PS%20Yönetim%22,%22short_name%22:%22CaddePS%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#000000%22,%22theme_color%22:%22#00d2ff%22,%22icons%22:[{%22src%22:%22https://via.placeholder.com/192/00d2ff/000000?text=CPS%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22https://via.placeholder.com/512/00d2ff/000000?text=CaddePS%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --n-purple: #bc13fe; --red: #ff4444; --orange: #ff9f43; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow: hidden; font-weight: 600; -webkit-tap-highlight-color: transparent; }
        
        /* Mobil Kaydırma Düzenlemesi */
        @media (max-width: 768px) { 
            body { overflow-y: auto; }
            .main-grid { display: flex; flex-direction: column; height: auto; padding: 10px; gap: 10px; } 
            .top-bar { grid-template-columns: 1fr 1fr; padding: 10px; } 
            #saat { font-size: 18px; } 
            .glass { height: auto; min-height: 350px; margin-bottom: 5px; } 
            .login-box { width: 90%; padding: 20px; } 
        }

        #rapor-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; padding: 20px; overflow-y: auto; }
        .rapor-tablo { width: 100%; border-collapse: collapse; font-size: 14px; }
        .rapor-tablo th, .rapor-tablo td { border: 1px solid #333; padding: 8px; text-align: left; }
        .rapor-tablo th { background: var(--n-blue); color: #000; font-family: 'Orbitron'; }
        
        #login-ekran { position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { width: 350px; padding: 40px; background: rgba(10, 10, 10, 0.95); border-top: 5px solid var(--n-blue); border-radius: 5px 5px 20px 20px; backdrop-filter: blur(15px); text-align: center; }
        .login-box h1 { font-family: 'Orbitron'; color: #fff; font-size: 28px; margin-bottom: 5px; letter-spacing: 4px; font-weight: 900; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 20px; background: #1a1a1a; border: 2px solid #333; border-radius: 8px; color: #fff; font-size: 18px; box-sizing: border-box; font-weight: 700; }
        .login-btn { width: 100%; padding: 18px; border: none; border-radius: 8px; background: var(--n-blue); color: #000; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; }
        
        .gizli { display: none !important; }
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px 20px; background: #050505; border-bottom: 3px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 340px 1fr 340px; gap: 20px; padding: 20px; height: calc(100vh - 150px); box-sizing: border-box; }
        .glass { background: rgba(15,15,15,0.9); border-radius: 12px; border: 2px solid #252525; padding: 18px; display: flex; flex-direction: column; overflow: hidden; }
        
        .type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .t-btn { padding: 10px; border: 2px solid #333; border-radius: 6px; background: #000; color: #fff; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; opacity: 0.5; text-align: center; }
        .t-btn.active[data-val="Nakit"] { border-color: var(--n-green); color: var(--n-green); opacity: 1; }
        .t-btn.active[data-val="Kart"] { border-color: var(--n-blue); color: var(--n-blue); opacity: 1; }
        .t-btn.active[data-val="Havale"] { border-color: var(--orange); color: var(--orange); opacity: 1; }
        .t-btn.active[data-val="Gider"] { border-color: var(--red); color: var(--red); opacity: 1; }
        .t-btn.active[data-val="Borç"] { border-color: var(--n-purple); color: var(--n-purple); opacity: 1; }
        
        .log-box { flex: 1; overflow-y: auto; background: #030303; border-radius: 8px; padding: 12px; font-size: 14px; }
        .log-item { padding: 10px; border-bottom: 1px solid #1a1a1a; position: relative; }
        .stat-card { background: #000; border: 2px solid var(--n-green); border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .r-btn { padding: 6px 12px; background: #111; border: 2px solid #333; color: #aaa; font-size: 10px; cursor: pointer; font-family: 'Orbitron'; border-radius: 5px; font-weight: 900; margin-right: 4px; }
        .r-btn.active { border-color: var(--n-blue); color: var(--n-blue); }
    </style>
</head>
<body>

<div id="rapor-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-family:'Orbitron'; color:var(--n-blue); font-size:18px;">ARŞİV</h2>
        <button onclick="document.getElementById('rapor-modal').style.display='none'" style="background:var(--red); border:none; color:#fff; padding:10px 20px; font-weight:900; cursor:pointer; border-radius:5px;">KAPAT</button>
    </div>
    <table class="rapor-tablo"><thead id="z-head"></thead><tbody id="z-body"></tbody></table>
</div>

<div id="login-ekran">
    <div class="login-box">
        <h1>CADDE PS</h1>
        <p style="color:var(--n-blue); font-family:'Orbitron'; font-size:12px; margin-bottom:30px; font-weight:700;">YÖNETİM SİSTEMİ</p>
        <input type="text" id="k" placeholder="Kullanıcı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="login-btn">BAĞLAN</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'; font-size:20px; font-weight:900;">00:00:00</div>
        <div style="text-align:center"><h2 style="font-family:'Orbitron'; margin:0; letter-spacing:2px; font-weight:900; font-size:18px;">CADDE <span style="color:var(--n-blue)">PS</span></h2></div>
        <div id="tarih-ust" style="text-align:right; font-size:13px; color:var(--n-blue); font-weight:700;">...</div>
    </div>

    <div class="main-grid">
        <div class="glass">
            <h4 style="color:var(--n-green); margin:0 0 10px 0;">İŞLEM</h4>
            <select id="i-sube" onchange="verileriGetir()" style="width:100%; padding:10px; background:#000; color:#fff; border:2px solid var(--n-blue); border-radius:8px; margin-bottom:10px; font-family:'Orbitron'; font-size:12px;">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <div class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</div>
                <div class="t-btn" data-val="Kart" onclick="sec(this)">KART</div>
                <div class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</div>
                <div class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</div>
                <div class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺" onkeyup="if(event.key==='Enter') kaydet()" style="width:100%; padding:12px; background:#000; border:2px solid #444; color:#fff; font-size:20px; margin-bottom:10px; border-radius:8px; box-sizing:border-box;">
            <input type="text" id="i-not" placeholder="Not / Müşteri" onkeyup="if(event.key==='Enter') kaydet()" style="width:100%; padding:10px; background:#000; border:2px solid #333; color:#fff; margin-bottom:12px; border-radius:8px; box-sizing:border-box;">
            <button onclick="kaydet()" style="width:100%; padding:15px; background:var(--n-green); color:#000; font-weight:900; border:none; border-radius:8px; cursor:pointer;">TAMAMLA</button>
            <div id="admin-area" class="gizli" style="margin-top:15px; border-top:1px solid #222; padding-top:10px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px;">
                    <button onclick="raporAc()" style="padding:8px; background:var(--n-purple); border:none; font-weight:900; cursor:pointer; border-radius:6px; color:#fff; font-size:10px;">ARŞİV</button>
                    <button onclick="patronAyarAc()" style="padding:8px; background:#333; border:1px solid var(--orange); font-weight:900; cursor:pointer; border-radius:6px; color:var(--orange); font-size:10px;">AYAR</button>
                </div>
                <div id="p-liste" style="max-height:60px; overflow-y:auto; background:#050505; border:1px solid #222; padding:5px; font-size:12px;"></div>
                <button onclick="pEkle()" style="width:100%; margin-top:5px; padding:8px; background:var(--n-blue); border:none; font-weight:900; cursor:pointer; border-radius:6px; font-size:11px;">+ PERSONEL</button>
            </div>
        </div>
        <div id="orta-panel" class="glass">
            <div style="margin-bottom:10px;"><button class="r-btn active" onclick="setRapor('gun', this)">GÜN</button><button class="r-btn" onclick="setRapor('hafta', this)">HAFTA</button><button class="r-btn" onclick="setRapor('ay', this)">AY</button></div>
            <div class="stat-card"><small id="sube-baslik" style="font-weight:900; color:#888; font-size:11px;">...</small><br><b id="vT" style="font-size:36px; color:var(--n-green); font-family:'Orbitron';">0₺</b></div>
            <div id="islem-log" class="log-box"></div>
        </div>
        <div class="glass">
            <h4 style="color:var(--n-purple); margin:0 0 10px 0; font-size:14px;">BORÇ</h4>
            <div id="borc-log" style="height:150px; overflow-y:auto; margin-bottom:10px;" class="log-box"></div>
            <h4 style="color:var(--red); margin:0 0 10px 0; font-size:14px;">GİDER</h4>
            <div id="gider-log" style="height:150px; overflow-y:auto;" class="log-box"></div>
            <button onclick="location.reload()" style="background:#111; border:2px solid var(--red); color:var(--red); margin-top:10px; padding:10px; cursor:pointer; border-radius:8px; font-weight:900; font-size:12px;">GÜVENLİ ÇIKIŞ</button>
        </div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", raporTuru = "gun", unsubs = [];
    let currentNakit = 0, currentKart = 0, currentHavale = 0, currentGider = 0;

    // Service Worker Kaydı (PWA için)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi.h3ZW50TGlzdGVuZXIoJ2ZldGNoJywgZXZlbnQgPT4ge2V2ZW50LnJlc3BvbmRXaXRoKGZldGNoKGV2ZW50LnJlcXVlc3QpKTt9KTs=');
        });
    }

    async function initP() { const d = await db.collection("ayarlar").doc("patron").get(); if(!d.exists) await db.collection("ayarlar").doc("patron").set({ ad: "patron", sifre: "1234" }); }
    initP();
    async function giris() { const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value; const p = await db.collection("ayarlar").doc("patron").get(); const pD = p.data(); if(k === pD.ad && s === pD.sifre) { userRole = "admin"; currentUserName = k; panelAc(); } else { db.collection("personeller").where("ad","==",k).where("sifre","==",s).get().then(snap => { if(!snap.empty) { userRole = "staff"; currentUserName = k; panelAc(); } else alert("Hata!"); }); } }
    async function patronAyarAc() { const yeniAd = prompt("Yeni Patron Adı:"); const yeniSifre = prompt("Yeni Şifre:"); if(yeniAd && yeniSifre) { await db.collection("ayarlar").doc("patron").update({ ad: yeniAd.toLowerCase(), sifre: yeniSifre }); alert("Güncellendi."); } }
    function panelAc() { document.getElementById('login-ekran').style.display='none'; document.getElementById('panel').classList.remove('gizli'); if(userRole === "admin") { document.getElementById('admin-area').classList.remove('gizli'); pYukle(); } verileriGetir(); checkZReport(); }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        document.getElementById('sube-baslik').innerText = sName + " - " + raporTuru.toUpperCase();
        unsubs.forEach(u => u()); unsubs = [];
        let bas = new Date();
        if(raporTuru === 'gun') { if(bas.getHours() < 2) bas.setDate(bas.getDate() - 1); bas.setHours(2,0,0,0); } 
        else if(raporTuru === 'hafta') { bas.setDate(bas.getDate() - 7); bas.setHours(0,0,0,0); } 
        else { bas.setMonth(bas.getMonth() - 1); bas.setHours(0,0,0,0); }

        const u1 = db.collection("islemler").where("tarih", ">=", bas).orderBy("tarih", "desc").onSnapshot(snap => {
            let nkt=0, krt=0, hav=0, gdr=0, log="", giderLog="", borcLog="";
            let index = 0;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.sube === sName && d.durum !== "iptal") {
                    if(d.tip === "Nakit") nkt += Number(d.miktar);
                    if(d.tip === "Kart") krt += Number(d.miktar);
                    if(d.tip === "Havale") hav += Number(d.miktar);
                    if(d.tip === "Gider") gdr += Number(d.miktar);
                    let tar = d.tarih.toDate();
                    let simdi = new Date();
                    let farkDakika = (simdi - tar) / 1000 / 60;
                    
                    let silButon = "";
                    if(userRole === "admin") {
                        silButon = `<button onclick="iptal('${doc.id}')" style="position:absolute; right:10px; top:10px; background:red; border:none; color:#fff; cursor:pointer; border-radius:4px; padding:5px 10px; font-weight:900;">SİL</button>`;
                    } else if (index === 0 && d.ekleyen === currentUserName && farkDakika < 5) {
                        silButon = `<button onclick="iptal('${doc.id}')" style="position:absolute; right:10px; top:10px; background:red; border:none; color:#fff; cursor:pointer; border-radius:4px; padding:5px 10px; font-weight:900;">DÜZELT</button>`;
                    }
                    
                    let item = `<div class="log-item"><small style="color:var(--n-blue); font-weight:700;">${tar.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})} - ${d.ekleyen.toUpperCase()}</small><br><b>${d.miktar}₺</b> - ${d.not} (${d.tip})${silButon}</div>`;
                    if(d.tip === "Borç") borcLog += item; else if(d.tip === "Gider") giderLog += item; else log += item;
                    index++; 
                }
            });
            currentNakit = nkt; currentKart = krt; currentHavale = hav; currentGider = gdr;
            document.getElementById('vT').innerText = (nkt + krt + hav) + "₺";
            document.getElementById('islem-log').innerHTML = log; document.getElementById('gider-log').innerHTML = giderLog; document.getElementById('borc-log').innerHTML = borcLog;
        });
        unsubs.push(u1);
    }

    async function iptal(id) { if(confirm("İŞLEM İPTAL EDİLECEK: Emin misiniz?")) await db.collection("islemler").doc(id).update({durum:"iptal"}); }
    async function kaydet() { const m = Number(document.getElementById('i-miktar').value); if(!m) return; const s = document.getElementById('i-sube').value, n = document.getElementById('i-not').value || seciliTip; await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:s, not:n, tarih:new Date(), durum:"aktif", ekleyen:currentUserName }); document.getElementById('i-miktar').value=""; document.getElementById('i-not').value=""; }
    function pYukle() { db.collection("personeller").onSnapshot(snap => { let h = ""; snap.forEach(doc => { h += `<div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;"><span style="font-weight:900; color:var(--n-blue);">${doc.data().ad.toUpperCase()}</span><button onclick="db.collection('personeller').doc('${doc.id}').delete()" style="color:red; background:none; border:none; cursor:pointer; font-weight:900;">SİL</button></div>`; }); document.getElementById('p-liste').innerHTML = h; }); }
    async function pEkle() { const ad = prompt("Personel Adı:"), sifre = prompt("Şifre:"); if(ad && sifre) await db.collection("personeller").add({ ad: ad.toLowerCase(), sifre }); }
    function raporAc() { document.getElementById('rapor-modal').style.display='block'; db.collection("z_raporlari").orderBy("tarih","desc").limit(30).get().then(snap => { let h = "<tr><th>Tarih</th><th>Şube</th><th>Nakit</th><th>Kart</th><th>Havale</th><th>Gider</th><th>Net</th></tr>"; document.getElementById('z-head').innerHTML = h; let b = ""; snap.forEach(doc => { const d = doc.data(); b += `<tr><td>${d.tarih_key}</td><td>${d.sube}</td><td>${d.nakit}₺</td><td>${d.kart}₺</td><td>${d.havale || 0}₺</td><td style="color:red">${d.gider}₺</td><td style="color:var(--n-green); font-weight:900">${d.net}₺</td></tr>`; }); document.getElementById('z-body').innerHTML = b; }); }
    async function checkZReport() { const d = new Date(); const bugunKey = d.toLocaleDateString('tr-TR'); const sName = document.getElementById('i-sube').value; if(d.getHours() >= 2) { const check = await db.collection("z_raporlari").where("tarih_key","==",bugunKey).where("sube","==",sName).get(); if(check.empty && (currentNakit + currentKart + currentHavale > 0)) { await db.collection("z_raporlari").add({ tarih: new Date(), tarih_key: bugunKey, sube: sName, nakit: currentNakit, kart: currentKart, havale: currentHavale, gider: currentGider, net: (currentNakit + currentKart + currentHavale - currentGider) }); } } }
    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    function setRapor(t,b) { raporTuru=t; document.querySelectorAll('.r-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); verileriGetir(); }
    setInterval(()=>{ document.getElementById('saat').innerText=new Date().toLocaleTimeString('tr-TR'); },1000);
    document.getElementById('tarih-ust').innerText = new Date().toLocaleDateString('tr-TR');
</script>
</body>
</html>
