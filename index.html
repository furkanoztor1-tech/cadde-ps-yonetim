<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v24.0 FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --purple: #bc13fe; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #050505; border-bottom: 2px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; padding: 15px; }
        .glass { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 10px; position: relative; }
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 1px solid #333; background: #000; color: #fff; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; opacity: 0.6; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); opacity: 1; }
        .log-box { height: 450px; overflow-y: auto; background: #050505; padding: 10px; font-size: 13px; border-radius: 5px; margin-top: 10px; border: 1px solid #111; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 5px; font-family: 'Rajdhani'; }
        .action-btn { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 5px; }
        .gizli { display: none !important; }
        .vardiya-box { border: 1px solid var(--gold); padding: 10px; border-radius: 5px; margin-top: 15px; background: #080808; }
        .sil-btn { background: var(--red); color: white; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .islem-satir { padding: 10px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        @media (max-width: 1024px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-ekran" class="gizli" style="text-align:center; padding-top:100px;">
    <div style="width:320px; margin:auto; background:#0a0a0a; padding:40px; border-top:4px solid var(--n-blue); border-radius:10px;">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">CADDE PS</h2>
        <input type="text" id="k" placeholder="Kullanıcı Adı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="action-btn" style="background:var(--n-blue); color:#000;">SİSTEME GİRİŞ</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'">00:00:00</div>
        <div id="user-info" style="font-family:'Orbitron'; font-size:12px; color:var(--n-blue)"></div>
        <button onclick="cikisYap()" style="background:none; border:1px solid var(--red); color:var(--red); padding:5px 15px; cursor:pointer; border-radius:5px;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--n-green)">İŞLEM GİRİŞİ</h4>
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <button class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</button>
                <button class="t-btn" data-val="Kart" onclick="sec(this)">KART</button>
                <button class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</button>
                <button class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</button>
                <button class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</button>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Açıklama">
            <button onclick="kaydet()" class="action-btn" style="background:var(--n-green); color:#000;">KAYDET</button>
            
            <div id="vardiya-ozet" class="vardiya-box">
                <p style="color:var(--gold); margin:0 0 5px 0; font-size:11px; font-family:'Orbitron'">SİZİN ÖZETİNİZ</p>
                <div id="v-nakit">Nakit: 0₺</div>
                <div id="v-kart">Kart: 0₺</div>
                <button onclick="vardiyaBitir()" class="action-btn" style="background:var(--gold); color:#000; margin-top:10px; font-size:10px;">VARDİYAYI KAPAT</button>
            </div>
        </div>

        <div class="glass">
            <div style="text-align:center; padding:15px; border:2px solid var(--n-green); border-radius:8px; margin-bottom:10px;">
                <div id="kasa-detay" style="font-size:12px; color:#888;">Yükleniyor...</div>
                <div id="vT" style="font-size:36px; font-family:'Orbitron'; color:var(--n-green);">0₺</div>
                <small style="color:#444">GÜNLÜK TOPLAM</small>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--red)">AKTİF BORÇLAR</h4>
            <div id="borc-log" class="log-box" style="height:350px;"></div>
            
            <!-- ADMIN PANELİ: BURASI SADECE ADMİNE GÖRÜNÜR -->
            <div id="admin-panel" class="gizli" style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <button onclick="arsivAc()" class="action-btn" style="background:var(--purple); color:#fff;">📊 MUHASEBE ARŞİVİ</button>
            </div>
        </div>
    </div>
</div>

<!-- ARŞİV MODAL -->
<div id="arsiv-modal" class="gizli" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:2000; padding:20px; box-sizing:border-box;">
    <div style="max-width:900px; margin:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold); padding-bottom:10px;">
            <h2 style="color:var(--gold); font-family:'Orbitron';">MUHASEBE ARŞİVİ</h2>
            <button onclick="modalKapat('arsiv-modal')" style="background:var(--red); border:none; color:#fff; padding:10px 20px; cursor:pointer;">KAPAT</button>
        </div>
        <div style="margin:20px 0; display:grid; grid-template-columns: 1fr 1fr auto; gap:10px;">
            <input type="date" id="arsiv-tarih">
            <select id="arsiv-p-filtre"><option value="hepsi">Tüm Personeller</option></select>
            <button onclick="arsivGetir()" class="action-btn" style="background:var(--gold); color:#000; width:120px; margin:0;">SORGULA</button>
        </div>
        <div id="arsiv-sonuc" class="log-box" style="height:60vh;"></div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    const SABIT_KASA = 200; 
    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];
    let pNakit = 0, pKart = 0;

    (function init() {
        const d = localStorage.getItem('cadde_session_v2');
        if(d) {
            const s = JSON.parse(d);
            userRole = s.role; currentUserName = s.name.toLowerCase();
            panelBaslat();
        } else { document.getElementById('login-ekran').classList.remove('gizli'); }
    })();

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase();
        const s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad.toLowerCase() && s === pDoc.data().sifre) {
            userRole = "admin"; currentUserName = k;
            localStorage.setItem('cadde_session_v2', JSON.stringify({role:"admin", name:k}));
            panelBaslat();
        } else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) {
                userRole="staff"; currentUserName=k;
                localStorage.setItem('cadde_session_v2', JSON.stringify({role:"staff", name:k}));
                panelBaslat();
            } else alert("Hatalı Giriş!");
        }
    }

    function panelBaslat() {
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        document.getElementById('user-info').innerText = currentUserName.toUpperCase();
        if(userRole === "admin") {
            document.getElementById('admin-panel').classList.remove('gizli');
            personelListesiYukle();
        }
        verileriGetir();
    }

    async function personelListesiYukle() {
        const pSel = document.getElementById('arsiv-p-filtre');
        const snap = await db.collection("personeller").get();
        pSel.innerHTML = '<option value="hepsi">Tüm Personeller</option>';
        snap.forEach(doc => {
            const ad = doc.data().ad;
            pSel.innerHTML += `<option value="${ad.toLowerCase()}">${ad.toUpperCase()}</option>`;
        });
    }

    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        unsubs.forEach(u => { if(typeof u === 'function') u(); });
        unsubs = []; 
        let bas = new Date(); bas.setHours(0,0,0,0);
        let bit = new Date(); bit.setHours(23,59,59,999);

        const u1 = db.collection("islemler").where("sube","==",sube).where("tarih",">=",bas).where("tarih","<",bit).orderBy("tarih","desc").onSnapshot(snap => {
            let nT=0, kT=0, log="", vN=0, vK=0;
            snap.forEach(doc => {
                const d = doc.data();
                const dEkleyen = (d.ekleyen || "").toLowerCase();
                if(d.durum === "aktif") {
                    if(d.tip === "Nakit") nT += d.miktar;
                    if(d.tip === "Kart") kT += d.miktar;
                    if(d.tip === "Gider") nT -= d.miktar;
                    if(dEkleyen === currentUserName) {
                        if(d.tip === "Nakit") vN += d.miktar;
                        if(d.tip === "Kart") vK += d.miktar;
                        if(d.tip === "Gider") vN -= d.miktar;
                    }
                }
                if(userRole === "admin" || dEkleyen === currentUserName) {
                    log += `<div class="islem-satir">
                        <span><b>${d.miktar}₺</b> - ${d.not || d.tip} <small style="color:#555">(${dEkleyen.toUpperCase()})</small></span>
                        ${userRole === "admin" ? `<button class="sil-btn" onclick="tSil('${doc.id}')">SİL</button>` : ''}
                    </div>`;
                }
            });
            document.getElementById('kasa-detay').innerText = `Şube Nakit: ${nT}₺ | Kart: ${kT}₺`;
            document.getElementById('vT').innerText = (nT + kT + SABIT_KASA) + "₺";
            document.getElementById('islem-log').innerHTML = log || "<center style='padding:20px; color:#444;'>İşlem yok.</center>";
            pNakit = vN; pKart = vK;
            document.getElementById('v-nakit').innerHTML = `Sizin Nakitiniz: ${vN}₺ <br><small>(Kasa: ${vN + SABIT_KASA}₺)</small>`;
            document.getElementById('v-kart').innerText = `Sizin Kartınız: ${vK}₺`;
        });

        const u2 = db.collection("islemler").where("sube","==",sube).where("tip","==","Borç").where("durum","==","aktif").onSnapshot(snap => {
            let bLog = "";
            snap.forEach(doc => {
                const d = doc.data();
                bLog += `<div style="padding:10px; background:#080808; border-left:3px solid var(--red); margin-bottom:10px; font-size:12px;">
                    <div><b>${d.miktar}₺</b> - ${d.not}</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
                        <button onclick="bTahsil('${doc.id}',${d.miktar},'${d.not}','Nakit')" style="background:var(--n-green); border:none; padding:5px; cursor:pointer; font-weight:bold;">NAKİT AL</button>
                        <button onclick="bTahsil('${doc.id}',${d.miktar},'${d.not}','Kart')" style="background:var(--n-blue); border:none; padding:5px; cursor:pointer; font-weight:bold;">KART AL</button>
                    </div>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1, u2);
    }

    async function arsivGetir() {
        const tarihStr = document.getElementById('arsiv-tarih').value;
        const pFiltre = document.getElementById('arsiv-p-filtre').value;
        const sube = document.getElementById('i-sube').value;
        if(!tarihStr) return alert("Tarih seçin!");

        let bas = new Date(tarihStr); bas.setHours(0,0,0,0);
        let bit = new Date(tarihStr); bit.setHours(23,59,59,999);

        const snap = await db.collection("islemler").where("sube","==",sube).where("tarih",">=",bas).where("tarih","<",bit).orderBy("tarih","desc").get();
        let html = "", aNakit = 0, aKart = 0;

        snap.forEach(doc => {
            const d = doc.data();
            const ekleyen = (d.ekleyen || "").toLowerCase();
            if(pFiltre === "hepsi" || ekleyen === pFiltre) {
                if(d.durum === "aktif") {
                    if(d.tip === "Nakit") aNakit += d.miktar;
                    if(d.tip === "Kart") aKart += d.miktar;
                    if(d.tip === "Gider") aNakit -= d.miktar;
                }
                html += `<div class="islem-satir">
                    <span><b>${d.miktar}₺</b> - ${d.not || d.tip} <small style="color:#555">(${ekleyen.toUpperCase()})</small></span>
                    <button class="sil-btn" onclick="tSil('${doc.id}', true)">SİL</button>
                </div>`;
            }
        });
        document.getElementById('arsiv-sonuc').innerHTML = `<div style="padding:10px; background:#111; border:1px solid var(--gold); margin-bottom:10px;">Nakit: ${aNakit}₺ | Kart: ${aKart}₺</div>` + html;
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, not:document.getElementById('i-not').value, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function bTahsil(id, m, n, t) {
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        await db.collection("islemler").add({ miktar:m, tip:t, sube:document.getElementById('i-sube').value, not:"BORÇ ÖDEME: "+n, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
    }

    async function tSil(id, isArsiv = false) {
        if(confirm("Silmek istediğinize emin misiniz?")) {
            await db.collection("islemler").doc(id).delete();
            if(isArsiv) arsivGetir();
        }
    }

    async function vardiyaBitir() {
        const sube = document.getElementById('i-sube').value;
        if(confirm(`Vardiyayı Kapatıyorsunuz. Teslim: ${pNakit}₺ Onay?`)) {
            let bas = new Date(); bas.setHours(0,0,0,0);
            let bit = new Date(); bit.setHours(23,59,59,999);
            const snap = await db.collection("islemler").where("sube", "==", sube).get();
            let liste = [];
            snap.forEach(doc => {
                let d = doc.data(); let t = d.tarih.toDate();
                if(t >= bas && t <= bit && d.durum === "aktif") { d.st = t.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}); liste.push(d); }
            });
            let wp = `📊 *GÜN SONU*\n👤 ${currentUserName.toUpperCase()}\n💰 Nakit: ${pNakit}₺\n💳 Kart: ${pKart}₺\n💵 Kasa: ${pNakit+SABIT_KASA}₺\n\n`;
            liste.forEach(x => wp += `${x.st} | ${x.miktar}₺ | ${x.not || x.tip}\n`);
            window.open(`https://api.whatsapp.com/send?phone=905393774554&text=${encodeURIComponent(wp)}`, '_blank');
            cikisYap();
        }
    }

    function cikisYap() { localStorage.removeItem('cadde_session_v2'); location.reload(); }
    function arsivAc() { document.getElementById('arsiv-modal').classList.remove('gizli'); }
    function modalKapat(id) { document.getElementById(id).classList.add('gizli'); }
    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=> { if(document.getElementById('saat')) document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
