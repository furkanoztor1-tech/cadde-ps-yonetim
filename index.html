<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | YÖNETİM SİSTEMİ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');
        
        :root {
            --n-green: #39ff14;
            --n-blue: #00d2ff;
            --bg: #080808;
            --panel: #111;
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            overflow-x: hidden;
        }

        .container { padding: 10px; display: flex; flex-direction: column; gap: 10px; }

        /* KASA GÖSTERGESİ */
        .kasa-box {
            background: #000;
            border: 2px solid var(--n-green);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        .kasa-label { font-family: 'Orbitron'; font-size: 12px; color: #666; }
        .kasa-tutar { font-family: 'Orbitron'; font-size: 32px; color: var(--n-green); display: block; margin-top: 5px; }

        /* GİRİŞ ALANI */
        .input-card {
            background: var(--panel);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #222;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .type-btn {
            background: #000;
            border: 1px solid #333;
            color: #888;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }

        .type-btn.active {
            border-color: var(--n-blue);
            color: var(--n-blue);
            background: rgba(0, 210, 255, 0.05);
        }

        .kaydet-btn {
            width: 100%;
            padding: 15px;
            background: var(--n-green);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        /* LİSTELER */
        .logs { display: flex; flex-direction: column; gap: 10px; }
        .log-window {
            background: #000;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
        }
        .log-header {
            background: #151515;
            padding: 8px 15px;
            font-family: 'Orbitron';
            font-size: 11px;
            color: var(--n-blue);
            border-bottom: 1px solid #222;
        }
        .log-body { max-height: 250px; overflow-y: auto; }

        .log-item {
            padding: 12px 15px;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-info { display: flex; flex-direction: column; }
        .log-amount { font-family: 'Orbitron'; font-size: 18px; color: #fff; }
        .log-note { font-size: 14px; color: #aaa; }
        .log-meta { font-size: 10px; color: #444; }

        .ode-btn {
            background: var(--n-green);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="kasa-box">
        <span class="kasa-label">TOPLAM KASA</span>
        <span class="kasa-tutar" id="vT">0₺</span>
    </div>

    <div class="input-card">
        <select id="i-sube" onchange="verileriGetir()">
            <option value="CADDEPS 1">ŞUBE 1 (CADDE)</option>
            <option value="CADDEPS 2">ŞUBE 2 (CADDE)</option>
        </select>

        <div class="btn-group">
            <div class="type-btn active" onclick="setT('Nakit', this)">NAKİT</div>
            <div class="type-btn" onclick="setT('Kart', this)">KART</div>
            <div class="type-btn" onclick="setT('Havale', this)">HAVALE</div>
            <div class="type-btn" onclick="setT('Gider', this)">GİDER</div>
            <div class="type-btn" onclick="setT('Borç', this)">BORÇ</div>
        </div>

        <input type="number" id="i-miktar" placeholder="Tutar ₺" inputmode="decimal">
        <input type="text" id="i-not" placeholder="Not veya Müşteri Adı...">
        <button class="kaydet-btn" onclick="kaydet()">İŞLEMİ KAYDET</button>
    </div>

    <div class="logs">
        <div class="log-window">
            <div class="log-header">AKTİF BORÇLAR</div>
            <div class="log-body" id="log-borc"></div>
        </div>
        <div class="log-window">
            <div class="log-header">SON İŞLEMLER</div>
            <div class="log-body" id="log-islem"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", 
        authDomain: "cadde-yonetim.firebaseapp.com", 
        projectId: "cadde-yonetim", 
        storageBucket: "cadde-yonetim.firebasestorage.app", 
        messagingSenderId: "578914689738", 
        appId: "1:578914689738:web:70c71a96e0eea69b0bca33" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTip = "Nakit", currentUnsub = null;

    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        if(currentUnsub) currentUnsub();

        currentUnsub = db.collection("islemler")
            .where("sube", "==", sube)
            .orderBy("tarih", "desc")
            .onSnapshot(snap => {
                let kasa = 0, islemHtml = "", borcHtml = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const m = Number(d.miktar) || 0;
                    const html = `
                        <div class="log-item">
                            <div class="log-info">
                                <span class="log-amount">${m}₺</span>
                                <span class="log-note">${d.not}</span>
                                <span class="log-meta">${d.tip}</span>
                            </div>
                            ${d.tip === "Borç" && d.durum === "aktif" ? `<button class="ode-btn" onclick="ode('${doc.id}', ${m}, '${d.not}')">ÖDE</button>` : ""}
                        </div>`;

                    if(d.tip === "Borç" && d.durum === "aktif") {
                        borcHtml += html;
                    } else if(d.durum === "aktif") {
                        if(d.tip === "Gider") kasa -= m; else kasa += m;
                        islemHtml += html;
                    }
                });
                document.getElementById('vT').innerText = kasa + "₺";
                document.getElementById('log-islem').innerHTML = islemHtml;
                document.getElementById('log-borc').innerHTML = borcHtml;
            });
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value);
        const n = document.getElementById('i-not').value || currentTip;
        if(!m) return;

        await db.collection("islemler").add({
            miktar: m, tip: currentTip, not: n,
            sube: document.getElementById('i-sube').value,
            tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif"
        });
        document.getElementById('i-miktar').value = "";
        document.getElementById('i-not').value = "";
    }

    async function ode(id, m, n) {
        await db.collection("islemler").doc(id).update({durum: "kapali"});
        await db.collection("islemler").add({
            miktar: m, tip: "Nakit", not: "[BORÇ ÖDENDİ] " + n,
            sube: document.getElementById('i-sube').value,
            tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif"
        });
    }

    function setT(v, el) {
        currentTip = v;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    window.onload = verileriGetir;
</script>
</body>
</html>
