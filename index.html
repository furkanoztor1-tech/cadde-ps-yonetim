<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v22.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --n-purple: #bc13fe; --red: #ff4444; --orange: #ff9f43; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow-x: hidden; font-weight: 600; }
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px 20px; background: #050505; border-bottom: 3px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 340px 1fr 340px; gap: 20px; padding: 20px; box-sizing: border-box; }
        .glass { background: rgba(15,15,15,0.9); border-radius: 12px; border: 2px solid #252525; padding: 15px; display: flex; flex-direction: column; }
        .type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 2px solid #333; border-radius: 6px; background: #000; color: #fff; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; opacity: 0.5; text-align: center; }
        .t-btn.active { opacity: 1; border-color: var(--n-blue); color: var(--n-blue); }
        .t-btn.active[data-val="Nakit"] { border-color: var(--n-green); color: var(--n-green); }
        .t-btn.active[data-val="Gider"] { border-color: var(--red); color: var(--red); }
        .log-box { flex: 1; overflow-y: auto; background: #030303; border-radius: 8px; padding: 10px; font-size: 14px; min-height: 200px; }
        .stat-card { background: #000; border: 2px solid var(--n-green); border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .gizli { display: none !important; }
        #rapor-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; padding: 15px; overflow-y: auto; }
        .rapor-tablo { width: 100%; border-collapse: collapse; font-size: 11px; margin-top:10px; }
        .rapor-tablo th, .rapor-tablo td { border: 1px solid #222; padding: 8px; text-align: center; }
        .ozet-card { background: #0a0a0a; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        @media (max-width: 768px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-ekran">
    <div style="width: 320px; padding: 40px; background: #0a0a0a; border-top: 5px solid var(--n-blue); text-align: center; border-radius: 10px; margin: 50px auto;">
        <h1 style="font-family:'Orbitron';">CADDE PS</h1>
        <input type="text" id="k" placeholder="Kullanıcı" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:5px;">
        <input type="password" id="s" placeholder="Şifre" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:5px;">
        <button onclick="giris()" style="width:100%; padding:15px; background:var(--n-blue); color:#000; font-weight:900; border:none; cursor:pointer; border-radius:5px;">GİRİŞ YAP</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'; font-size:18px;">00:00:00</div>
        <div style="text-align:center"><h2 style="font-family:'Orbitron'; margin:0; font-size:18px;">CADDE <span style="color:var(--n-blue)">PS</span></h2></div>
        <button onclick="cikisYap()" style="background:none; border:1px solid var(--red); color:var(--red); font-size:10px; padding:6px 12px; border-radius:5px; cursor:pointer; font-weight:900;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <div class="glass">
            <h4 style="color:var(--n-green); margin:0 0 10px 0;">YENİ İŞLEM</h4>
            <select id="i-sube" onchange="verileriGetir()" style="width:100%; padding:10px; background:#000; color:#fff; border:2px solid var(--n-blue); border-radius:8px; margin-bottom:10px; font-family:'Orbitron';">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <div class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</div>
                <div class="t-btn" data-val="Kart" onclick="sec(this)">KART</div>
                <div class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</div>
                <div class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</div>
                <div class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺" style="width:100%; padding:15px; background:#000; border:2px solid #444; color:#fff; font-size:22px; margin-bottom:10px; border-radius:8px; box-sizing:border-box;">
            <input type="text" id="i-not" placeholder="Not / Açıklama" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:12px; border-radius:8px; box-sizing:border-box;">
            <button onclick="kaydet()" style="width:100%; padding:15px; background:var(--n-green); color:#000; font-weight:900; border:none; border-radius:8px; cursor:pointer;">KAYDET</button>
            <button onclick="gunuKapat()" style="width:100%; padding:15px; background:var(--orange); color:#000; font-weight:900; border:none; border-radius:8px; cursor:pointer; margin-top:10px;">GÜNÜ KAPAT (Z RAPORU)</button>

            <div id="admin-area" class="gizli" style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <button onclick="document.getElementById('rapor-modal').style.display='block'; arsivGoster();" style="width:100%; padding:10px; background:var(--n-purple); color:#fff; border:none; font-weight:900; cursor:pointer; border-radius:6px;">Z RAPORLARI ARŞİVİ</button>
            </div>
        </div>

        <div class="glass">
            <div class="stat-card">
                <small style="font-weight:900; color:#888;">GÜNCEL AKTİF KASA</small><br>
                <b id="vT" style="font-size:36px; color:var(--n-green); font-family:'Orbitron';">0₺</b>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <div class="glass">
            <h4 style="color:var(--n-purple); margin:0 0 10px 0;">AÇIK BORÇLAR</h4>
            <div id="borc-log" class="log-box" style="margin-bottom:15px; max-height:200px;"></div>
            <h4 style="color:var(--red); margin:0 0 10px 0;">GİDERLER (AKTİF)</h4>
            <div id="gider-log" class="log-box" style="max-height:150px;"></div>
        </div>
    </div>
</div>

<div id="rapor-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="font-family:'Orbitron'; color:var(--n-blue); margin:0;">Z RAPORU ARŞİVİ</h2>
        <button onclick="document.getElementById('rapor-modal').style.display='none'" style="background:var(--red); color:#fff; border:none; padding:10px 20px; cursor:pointer; font-weight:900; border-radius:5px;">KAPAT</button>
    </div>
    <div id="z-rapor-ozet" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap:10px; margin-bottom:15px;"></div>
    <table class="rapor-tablo">
        <thead>
            <tr style="background:#111; color:var(--n-blue)">
                <th>Kapanış Tarihi</th>
                <th>Şube</th>
                <th>Kapatan</th>
                <th>Nakit</th>
                <th>Kart</th>
                <th>Havale</th>
                <th>Borç</th>
                <th>Gider</th>
                <th>NET KASA</th>
            </tr>
        </thead>
        <tbody id="z-body"></tbody>
    </table>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value;
        const p = await db.collection("ayarlar").doc("patron").get();
        if(k === p.data().ad && s === p.data().sifre) { basariliGiris(k, s, "admin"); }
        else {
            db.collection("personeller").where("ad","==",k).where("sifre","==",s).get().then(snap => {
                if(!snap.empty) basariliGiris(k, s, "staff");
                else alert("Hata!");
            });
        }
    }

    function basariliGiris(u, p, role) {
        localStorage.setItem('caddeUser', u); localStorage.setItem('caddePass', p);
        userRole = role; currentUserName = u.toUpperCase();
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        if(role === "admin") document.getElementById('admin-area').classList.remove('gizli');
        verileriGetir();
    }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        
        // 1. Aktif İşlemler (Z raporuna girmemişler)
        const u1 = db.collection("islemler").where("sube","==",sName).where("durum","==","aktif").where("arsiv","==",false).onSnapshot(snap => {
            let kasa = 0, log="", gLog="";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.tip === "Nakit" || d.tip === "Kart" || d.tip === "Havale") kasa += Number(d.miktar);
                else if(d.tip === "Gider") kasa -= Number(d.miktar);
                let sil = (userRole === "admin") ? `<button onclick="iptal('${doc.id}')" style="float:right; background:red; border:none; color:#fff; border-radius:3px; padding:2px 6px; font-size:10px;">SİL</button>` : "";
                let item = `<div style="padding:10px; border-bottom:1px solid #222;"><b>${d.miktar}₺</b> - ${d.not} <br><small>${d.ekleyen} - ${d.tip}</small> ${sil}</div>`;
                if(d.tip === "Gider") gLog += item; else if(d.tip !== "Borç") log += item;
            });
            document.getElementById('vT').innerText = kasa + "₺";
            document.getElementById('islem-log').innerHTML = log;
            document.getElementById('gider-log').innerHTML = gLog;
        });

        // 2. Borçlar (Arşivlenmiş olsa bile ödenene kadar durur)
        const u2 = db.collection("islemler").where("sube","==",sName).where("tip","==","Borç").where("durum","==","aktif").onSnapshot(snap => {
            let bLog = "";
            snap.forEach(doc => {
                const d = doc.data();
                bLog += `<div style="padding:10px; border-bottom:1px solid #222; border-left:3px solid var(--n-purple);">
                    <b>${d.miktar}₺</b> - ${d.not} <br><small>${d.ekleyen}</small>
                    <button onclick="borcOde('${doc.id}', ${d.miktar}, '${d.not}')" style="float:right; background:var(--n-green); color:#000; border:none; padding:4px 8px; border-radius:4px; font-weight:900; font-size:10px; cursor:pointer;">ÖDE</button>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bLog || "Açık borç yok.";
        });
        unsubs.push(u1, u2);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ 
            miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, 
            not:document.getElementById('i-not').value || seciliTip, 
            tarih:new Date(), durum:"aktif", ekleyen:currentUserName, arsiv: false 
        });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function borcOde(id, miktar, not) {
        if(!confirm("Bu borç ödendi olarak kasaya işlensin mi?")) return;
        const sube = document.getElementById('i-sube').value;
        // 1. Borcu kapat
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        // 2. Kasaya nakit girişi yap
        await db.collection("islemler").add({
            miktar: miktar, tip: "Nakit", sube: sube, not: "BORÇ ÖDEMESİ: " + not,
            tarih: new Date(), durum: "aktif", ekleyen: currentUserName, arsiv: false
        });
        alert("Borç tahsil edildi ve nakit kasaya eklendi.");
    }

    async function gunuKapat() {
        const sName = document.getElementById('i-sube').value;
        if(!confirm("Dükkanı kapatıyor ve Z raporu oluşturuyorsunuz?")) return;
        const snap = await db.collection("islemler").where("sube","==",sName).where("durum","==","aktif").where("arsiv","==",false).get();
        if(snap.empty) { alert("İşlem yok!"); return; }

        let n=0, k=0, hav=0, g=0, b=0, ids=[];
        snap.forEach(doc => {
            const d = doc.data();
            if(d.tip==="Nakit") n+=Number(d.miktar); else if(d.tip==="Kart") k+=Number(d.miktar);
            else if(d.tip==="Havale") hav+=Number(d.miktar); else if(d.tip==="Gider") g+=Number(d.miktar);
            else if(d.tip==="Borç") b+=Number(d.miktar);
            ids.push(doc.id);
        });

        await db.collection("z_raporlari").add({
            tarih: new Date().toLocaleString('tr-TR'), sube: sName, kapatan: currentUserName,
            nakit: n, kart: k, havale: hav, gider: g, borc: b, net: (n+k+hav)-g, ts: new Date()
        });

        const batch = db.batch();
        ids.forEach(id => batch.update(db.collection("islemler").doc(id), { arsiv: true }));
        await batch.commit();
        alert("Z Raporu Kaydedildi!");
        location.reload();
    }

    async function arsivGoster() {
        const snap = await db.collection("z_raporlari").orderBy("ts","desc").limit(50).get();
        let h = "";
        snap.forEach(doc => {
            const d = doc.data();
            h += `<tr>
                <td>${d.tarih}</td><td>${d.sube}</td><td>${d.kapatan}</td>
                <td style="color:var(--n-green)">${d.nakit}₺</td><td style="color:var(--n-blue)">${d.kart}₺</td>
                <td style="color:var(--orange)">${d.havale}₺</td><td style="color:var(--n-purple)">${d.borc}₺</td>
                <td style="color:var(--red)">-${d.gider}₺</td><td style="background:#111; font-weight:900;">${d.net}₺</td>
            </tr>`;
        });
        document.getElementById('z-body').innerHTML = h;
    }

    function cikisYap() { localStorage.removeItem('caddeUser'); localStorage.removeItem('caddePass'); location.reload(); }
    function iptal(id) { if(confirm("Sil?")) db.collection("islemler").doc(id).update({durum:"iptal"}); }
    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=> { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
    window.onload = function() { const u=localStorage.getItem('caddeUser'), p=localStorage.getItem('caddePass'); if(u && p) { document.getElementById('k').value=u; document.getElementById('s').value=p; giris(); } };
</script>
</body>
</html>
