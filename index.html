<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS v17.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        /* Önceki tüm CSS kodların buraya gelecek (v17.1 tasarımı) */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --n-purple: #bc13fe; --red: #ff4444; --orange: #ff9f43; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px 20px; background: #050505; border-bottom: 3px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 340px 1fr 340px; gap: 20px; padding: 20px; box-sizing: border-box; }
        .glass { background: rgba(15,15,15,0.9); border-radius: 12px; border: 2px solid #252525; padding: 15px; display: flex; flex-direction: column; }
        .type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 2px solid #333; border-radius: 6px; background: #000; color: #fff; cursor: pointer; font-size: 10px; text-align: center; font-weight: 900; }
        .t-btn.active[data-val="Nakit"] { border-color: var(--n-green); color: var(--n-green); }
        .t-btn.active[data-val="Kart"] { border-color: var(--n-blue); color: var(--n-blue); }
        .t-btn.active[data-val="Havale"] { border-color: var(--orange); color: var(--orange); }
        .gizli { display: none !important; }
        @media (max-width: 768px) { .main-grid { display: flex; flex-direction: column; } }
        
        /* EKSTRA: Yükleme Butonu (Eğer menüde çıkmazsa diye) */
        #pwa-btn { display: none; width: 100%; padding: 15px; background: orange; color: black; font-weight: 900; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-ekran">
    <div style="width: 300px; padding: 40px; background: #0a0a0a; border-top: 5px solid var(--n-blue); text-align: center; border-radius: 10px; margin: 100px auto;">
        <h1 style="font-family:'Orbitron'; color:#fff;">CADDE PS</h1>
        <input type="text" id="k" placeholder="Kullanıcı" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff;">
        <input type="password" id="s" placeholder="Şifre" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff;">
        <button onclick="giris()" style="width:100%; padding:15px; background:var(--n-blue); color:#000; font-weight:900; border:none; cursor:pointer;">GİRİŞ YAP</button>
        <button id="pwa-btn" onclick="installPWA()">UYGULAMAYI TELEFONA İNDİR</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat">00:00:00</div>
        <div style="text-align:center">CADDE PS</div>
        <div id="tarih-ust">...</div>
    </div>
    <div class="main-grid">
        <div class="glass">
            <div class="type-grid">
                <div class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</div>
                <div class="t-btn" data-val="Kart" onclick="sec(this)">KART</div>
                <div class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</div>
                <div class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</div>
                <div class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺" style="width:100%; padding:15px; background:#000; color:#fff; font-size:20px; margin-bottom:10px;">
            <button onclick="kaydet()" style="width:100%; padding:15px; background:var(--n-green); font-weight:900;">KAYDET</button>
        </div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    // PWA AYARLARI
    let deferredPrompt;
    const pwaBtn = document.getElementById('pwa-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        pwaBtn.style.display = 'block'; // Menüde çıkmazsa ekranda turuncu buton çıkar
    });

    async function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                deferredPrompt = null;
                pwaBtn.style.display = 'none';
            }
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=5');
    }

    // Giriş ve Kayıt Fonksiyonları
    let userRole = "staff", currentUserName = "", seciliTip = "Nakit";
    async function giris() { 
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value; 
        const p = await db.collection("ayarlar").doc("patron").get(); 
        if(k === p.data().ad && s === p.data().sifre) { userRole = "admin"; currentUserName = k; panelAc(); } 
        else { panelAc(); } // Test için direkt açtırıyorum
    }
    function panelAc() { document.getElementById('login-ekran').classList.add('gizli'); document.getElementById('panel').classList.remove('gizli'); }
    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=>{ document.getElementById('saat').innerText=new Date().toLocaleTimeString('tr-TR'); },1000);
</script>
</body>
</html>
