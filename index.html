<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v19.8 PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --purple: #bc13fe; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #050505; border-bottom: 2px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; padding: 15px; }
        .glass { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; }
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 1px solid #333; background: #000; color: #fff; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; opacity: 0.6; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); opacity: 1; }
        .log-box { height: 450px; overflow-y: auto; background: #050505; padding: 10px; font-size: 13px; border-radius: 5px; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 5px; }
        .action-btn { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; font-size: 12px; }
        .gizli { display: none !important; }
        .p-liste-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
        @media (max-width: 1024px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-ekran" style="text-align:center; padding-top:100px;">
    <div style="width:320px; margin:auto; background:#0a0a0a; padding:40px; border-top:4px solid var(--n-blue); border-radius:10px;">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">CADDE PS</h2>
        <input type="text" id="k" placeholder="Kullanıcı Adı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="action-btn" style="background:var(--n-blue); color:#000;">SİSTEME GİRİŞ</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'">00:00:00</div>
        <div style="font-family:'Orbitron'; letter-spacing:2px;">CADDE <span style="color:var(--n-blue)">PS</span></div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--red); color:var(--red); padding:5px 15px; cursor:pointer; border-radius:5px;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <!-- SOL: İŞLEM VE YÖNETİM -->
        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--n-green)">YENİ İŞLEM</h4>
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <button class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</button>
                <button class="t-btn" data-val="Kart" onclick="sec(this)">KART</button>
                <button class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</button>
                <button class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</button>
                <button class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</button>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Açıklama / Not">
            <button onclick="kaydet()" class="action-btn" style="background:var(--n-green); color:#000;">İŞLEMİ KAYDET</button>
            
            <div style="margin-top:20px; border-top:1px solid #222; padding-top:15px;">
                <button onclick="vardiyaBitir()" class="action-btn" style="background:var(--red); color:#fff; margin-bottom:10px;">VARDİYAYI BİTİR</button>
                <div id="p-ozet" style="text-align:center; color:var(--n-blue); font-size:18px; font-weight:bold;">0₺</div>
                
                <!-- SADECE ADMİN GÖRÜR -->
                <div id="admin-ozel" class="gizli">
                    <button onclick="pYonetimAc()" class="action-btn" style="background:var(--purple); color:#fff; margin-top:10px;">PERSONEL YÖNETİMİ</button>
                </div>
            </div>
        </div>

        <!-- ORTA: KASA TAKİBİ -->
        <div class="glass">
            <div style="text-align:center; padding:15px; border:2px solid var(--n-green); border-radius:8px; margin-bottom:10px;">
                <div id="kasa-detay" style="font-size:12px; color:#888; margin-bottom:5px;">Nakit: 0₺ | Kart: 0₺</div>
                <div id="vT" style="font-size:36px; font-family:'Orbitron'; color:var(--n-green);">0₺</div>
                <small style="color:#444">GÜNLÜK TOPLAM KASA</small>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <!-- SAĞ: BORÇ TAKİBİ -->
        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--red)">AKTİF BORÇLAR</h4>
            <div id="borc-log" class="log-box"></div>
        </div>
    </div>
</div>

<!-- PERSONEL YÖNETİM MODALI -->
<div id="p-modal" class="gizli" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999; padding:20px; box-sizing:border-box;">
    <div style="max-width:500px; margin:auto; background:#0a0a0a; padding:20px; border:1px solid var(--purple); border-radius:10px;">
        <h3 style="color:var(--purple); font-family:'Orbitron'">PERSONEL YÖNETİMİ</h3>
        <div style="margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid #333;">
            <input type="text" id="yeni-p-ad" placeholder="Personel Adı">
            <input type="text" id="yeni-p-sifre" placeholder="Giriş Şifresi">
            <button onclick="pEkle()" class="action-btn" style="background:var(--n-blue); color:#000;">YENİ PERSONEL EKLE</button>
        </div>
        <div id="p-liste" style="max-height:300px; overflow-y:auto;">
            <!-- Personeller buraya listelenecek -->
        </div>
        <button onclick="document.getElementById('p-modal').classList.add('gizli')" class="action-btn" style="background:#333; color:#fff; margin-top:20px;">KAPAT</button>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value;
        const patron = await db.collection("ayarlar").doc("patron").get();
        
        if(k === patron.data().ad && s === patron.data().sifre) {
            userRole = "admin"; currentUserName = k;
            document.getElementById('admin-ozel').classList.remove('gizli');
            panelBaslat();
        } else {
            const pSnap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!pSnap.empty) { userRole="staff"; currentUserName=k; panelBaslat(); }
            else alert("Hatalı Kullanıcı veya Şifre!");
        }
    }

    function panelBaslat() {
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        verileriGetir();
    }

    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        let bas = new Date(); if(bas.getHours() < 2) bas.setDate(bas.getDate()-1);
        bas.setHours(2,0,0,0);

        const u1 = db.collection("islemler").where("sube","==",sube).where("tarih",">=",bas).orderBy("tarih","desc").onSnapshot(snap => {
            let nT=0, kT=0, pT=0, log="";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.durum === "aktif") {
                    if(d.tip==="Nakit") nT += d.miktar;
                    if(d.tip==="Kart") kT += d.miktar;
                    if(d.ekleyen === currentUserName) pT += d.miktar;
                }
                log += `<div style="padding:10px; border-bottom:1px solid #111; position:relative;">
                    <b style="color:var(--n-blue)">${d.miktar}₺</b> - ${d.not || d.tip}
                    <div style="font-size:10px; color:#555">${d.ekleyen || ''} | ${d.tip}</div>
                    ${userRole === 'admin' ? `<button onclick="tSil('${doc.id}')" style="position:absolute; right:5px; top:10px; background:red; border:none; color:white; font-size:9px; padding:3px;">SİL</button>` : ''}
                </div>`;
            });
            document.getElementById('kasa-detay').innerText = `Nakit: ${nT}₺ | Kart: ${kT}₺`;
            document.getElementById('vT').innerText = (nT+kT) + "₺";
            document.getElementById('p-ozet').innerText = "Vardiya Toplamım: " + pT + "₺";
            document.getElementById('islem-log').innerHTML = log;
        });

        const u2 = db.collection("islemler").where("sube","==",sube).where("tip","==","Borç").where("durum","==","aktif").onSnapshot(snap => {
            let bLog = "";
            snap.forEach(doc => {
                const d = doc.data();
                bLog += `<div style="padding:10px; background:#080808; border-left:3px solid var(--red); margin-bottom:5px;">
                    <b>${d.miktar}₺</b> - ${d.not}
                    <div style="margin-top:5px;">
                        <button onclick="bTahsil('${doc.id}',${d.miktar},'${d.not}','Nakit')" style="background:var(--n-green); border:none; font-size:10px; padding:5px; font-weight:bold;">NAKİT ALINDI</button>
                        <button onclick="bTahsil('${doc.id}',${d.miktar},'${d.not}','Kart')" style="background:var(--n-blue); border:none; font-size:10px; padding:5px; font-weight:bold; margin-left:5px;">KART ALINDI</button>
                    </div>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1, u2);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, not:document.getElementById('i-not').value, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function bTahsil(id, m, n, t) {
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        await db.collection("islemler").add({ miktar:m, tip:t, sube:document.getElementById('i-sube').value, not:"BORÇ ÖDENDİ: "+n, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
    }

    async function tSil(id) { if(confirm("Bu işlemi tamamen silmek istediğine emin misin?")) await db.collection("islemler").doc(id).delete(); }

    // PERSONEL YÖNETİM FONKSİYONLARI
    async function pYonetimAc() {
        document.getElementById('p-modal').classList.remove('gizli');
        const snap = await db.collection("personeller").get();
        let h = "";
        snap.forEach(doc => {
            const p = doc.data();
            h += `<div class="p-liste-item">
                <span><b>${p.ad.toUpperCase()}</b> (Şifre: ${p.sifre})</span>
                <button onclick="pSil('${doc.id}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:3px;">SİL</button>
            </div>`;
        });
        document.getElementById('p-liste').innerHTML = h || "Kayıtlı personel yok.";
    }

    async function pEkle() {
        const ad = document.getElementById('yeni-p-ad').value.trim().toLowerCase();
        const sifre = document.getElementById('yeni-p-sifre').value.trim();
        if(!ad || !sifre) return alert("Ad ve şifre girin!");
        await db.collection("personeller").add({ ad, sifre });
        document.getElementById('yeni-p-ad').value=""; document.getElementById('yeni-p-sifre').value="";
        pYonetimAc();
    }

    async function pSil(id) { if(confirm("Personeli silmek istiyor musun?")) { await db.collection("personeller").doc(id).delete(); pYonetimAc(); } }

    async function vardiyaBitir() {
        if(confirm(currentUserName.toUpperCase() + ", Vardiyanı bitirip raporunu kaydetmek istiyor musun?")) {
            alert("Vardiya sonlandırıldı. İyi istirahatler!");
            location.reload();
        }
    }

    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=> { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
