<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v19.7</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #050505; border-bottom: 2px solid var(--n-blue); }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; padding: 15px; }
        .glass { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 10px; }
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .t-btn { padding: 8px; border: 1px solid #333; background: #000; color: #fff; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); }
        .log-box { height: 400px; overflow-y: auto; background: #050505; padding: 10px; font-size: 13px; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 8px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .v-btn { background: var(--red); color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .gizli { display: none !important; }
        @media (max-width: 1024px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-ekran" style="text-align:center; padding-top:100px;">
    <div style="width:300px; margin:auto; background:#0a0a0a; padding:30px; border:1px solid var(--n-blue);">
        <h2 style="font-family:'Orbitron'">CADDE PS</h2>
        <input type="text" id="k" placeholder="Kullanıcı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" style="width:100%; padding:10px; background:var(--n-blue); border:none; font-weight:bold;">GİRİŞ</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'">00:00</div>
        <div style="font-family:'Orbitron'; color:var(--n-blue)">CADDE PS YÖNETİM</div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--red); color:var(--red);">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <!-- SOL PANEL: İŞLEM VE VARDİYA -->
        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--n-green)">İŞLEM GİRİŞİ</h4>
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">Şube 1</option>
                <option value="CADDEPS 2">Şube 2</option>
            </select>
            <div class="type-grid">
                <button class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</button>
                <button class="t-btn" data-val="Kart" onclick="sec(this)">KART</button>
                <button class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</button>
                <button class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</button>
                <button class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</button>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Açıklama/Masa No">
            <button onclick="kaydet()" style="width:100%; padding:12px; background:var(--n-green); border:none; font-weight:bold; cursor:pointer;">KAYDET</button>
            
            <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
                <h4 style="color:var(--n-blue); margin-bottom:5px;">VARDİYA DURUMU</h4>
                <div id="p-ozet" style="font-size:20px; font-weight:bold; margin-bottom:10px;">0₺</div>
                <button onclick="vardiyaBitir()" class="v-btn">VARDİYAYI BİTİR</button>
                <button id="admin-btn" onclick="vardiyalariGor()" class="gizli" style="width:100%; margin-top:5px; padding:10px; background:#444; color:#fff; border:none;">GEÇMİŞ VARDİYALAR</button>
            </div>
        </div>

        <!-- ORTA PANEL: KASA LOG -->
        <div class="glass">
            <div style="text-align:center; padding:10px; border:1px solid var(--n-green); margin-bottom:10px;">
                <div id="kasa-ozet" style="font-size:12px; color:#aaa;">Nakit: 0 | Kart: 0</div>
                <div id="vT" style="font-size:32px; font-family:'Orbitron'; color:var(--n-green);">0₺</div>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <!-- SAĞ PANEL: BORÇLAR -->
        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--red)">AKTİF BORÇLAR</h4>
            <div id="borc-log" class="log-box"></div>
        </div>
    </div>
</div>

<script>
    // Firebase ayarların (Aynen kalsın)
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad && s === pDoc.data().sifre) {
            userRole = "admin"; currentUserName = k;
            document.getElementById('admin-btn').classList.remove('gizli');
            panelAc();
        } else {
            const sSnap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!sSnap.empty) { userRole="staff"; currentUserName=k; panelAc(); }
            else alert("Hatalı Giriş!");
        }
    }

    function panelAc() {
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        verileriGetir();
    }

    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        let bas = new Date(); if(bas.getHours() < 2) bas.setDate(bas.getDate()-1);
        bas.setHours(2,0,0,0);

        const u1 = db.collection("islemler").where("sube","==",sube).where("tarih",">=",bas).onSnapshot(snap => {
            let nT=0, kT=0, pT=0, log="";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.durum === "aktif") {
                    if(d.tip==="Nakit") nT += d.miktar;
                    if(d.tip==="Kart") kT += d.miktar;
                    if(d.ekleyen === currentUserName) pT += d.miktar;
                }
                log += `<div style="padding:8px; border-bottom:1px solid #222; ${d.durum==='hata'?'text-decoration:line-through; color:red':''}">
                    <b>${d.miktar}₺</b> - ${d.not} (${d.tip}) 
                    <small style="display:block; color:#555">${d.ekleyen || ''}</small>
                </div>`;
            });
            document.getElementById('kasa-ozet').innerText = `Nakit: ${nT}₺ | Kart: ${kT}₺`;
            document.getElementById('vT').innerText = (nT+kT) + "₺";
            document.getElementById('p-ozet').innerText = pT + "₺";
            document.getElementById('islem-log').innerHTML = log;
        });

        const u2 = db.collection("islemler").where("sube","==",sube).where("tip","==","Borç").where("durum","==","aktif").onSnapshot(snap => {
            let bLog = "";
            snap.forEach(doc => {
                const d = doc.data();
                bLog += `<div style="padding:10px; background:#111; margin-bottom:5px;">
                    ${d.miktar}₺ - ${d.not}
                    <button onclick="bOdendi('${doc.id}', ${d.miktar}, '${d.not}')" style="float:right; background:var(--n-green); border:none; padding:5px;">ÖDENDİ</button>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1, u2);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, not:document.getElementById('i-not').value, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function bOdendi(id, m, n) {
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        await db.collection("islemler").add({ miktar:m, tip:"Nakit", sube:document.getElementById('i-sube').value, not:"BORÇ ÖDEME: "+n, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
    }

    async function vardiyaBitir() {
        if(!confirm("Vardiyayı bitiriyorsun. Raporun kaydedilecek?")) return;
        alert("Vardiya raporu kaydedildi. Çıkış yapılıyor...");
        location.reload();
    }

    function sec(btn) { 
        document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); 
        btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); 
    }

    setInterval(()=> { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
