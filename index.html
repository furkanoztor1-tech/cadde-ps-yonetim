<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | STANDART BOYUT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --dark-bg: #0a0a0c; }
        
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--dark-bg); color: #fff; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 8px; box-sizing: border-box; }

        /* ÜST KISIM - KİBAR VE KOMPAKT */
        .top-area { flex-shrink: 0; margin-bottom: 10px; }
        .stat-card { background: #000; border: 1px solid var(--n-green); border-radius: 10px; padding: 6px; text-align: center; margin-bottom: 6px; }
        .glass { background: #111; border-radius: 10px; border: 1px solid #222; padding: 8px; }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 4px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; font-family: 'Rajdhani'; box-sizing: border-box; font-size: 14px; }
        .t-btn-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 6px; }
        .t-btn { padding: 10px 0; border: 1px solid #333; text-align: center; font-size: 10px; border-radius: 6px; background: #000; color: #777; font-weight: bold; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); }
        .btn-green { width: 100%; padding: 12px; background: var(--n-green); color: #000; font-weight: bold; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 14px; }

        /* LİSTE PENCERELERİ - EKRANI KAPLAYAN ALAN */
        .window-container { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        
        .pencere { 
            display: flex; 
            flex-direction: column; 
            background: #080808; 
            border: 1px solid #1a1a1a; 
            border-radius: 10px; 
            flex: 1; /* Pencereler artık daha dengeli */
            overflow: hidden; 
        }

        .pencere-baslik { 
            background: #111; 
            padding: 6px 12px; 
            font-family: 'Orbitron'; 
            font-size: 11px; 
            color: var(--n-blue); 
            border-bottom: 1px solid #222;
        }

        .pencere-icerik { 
            flex-grow: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        /* SATIRLARDAKİ YAZILAR NORMAL BOYUTTA */
        .islem-item { padding: 10px; border-bottom: 1px solid #151515; display: flex; justify-content: space-between; align-items: center; }
        .amount { font-family: 'Orbitron'; font-size: 16px; color: #fff; }
        .islem-not { font-size: 14px; color: #ccc; margin-left: 5px; }
        .meta { font-size: 11px; color: #555; display: block; margin-top: 2px; }
        
        .action-btn { padding: 8px 12px; font-size: 11px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; margin-left: 4px; }
        .btn-sil { background: var(--red); color: #fff; padding: 4px 10px; font-size: 10px; }

        .pencere-icerik::-webkit-scrollbar { width: 3px; }
        .pencere-icerik::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div id="panel">
    <div class="main-wrapper">
        <div class="top-area">
            <div class="stat-card"><b id="vT" style="font-size:26px; color:var(--n-green); font-family:'Orbitron'">0₺</b></div>
            <div class="glass">
                <select id="i-sube" onchange="verileriGetir()"><option value="CADDEPS 1">ŞUBE 1</option><option value="CADDEPS 2">ŞUBE 2</option></select>
                <div class="t-btn-group">
                    <div class="t-btn active" onclick="sec(this, 'Nakit')">NAKİT</div>
                    <div class="t-btn" onclick="sec(this, 'Kart')">KART</div>
                    <div class="t-btn" onclick="sec(this, 'Havale')">HAVALE</div>
                    <div class="t-btn" onclick="sec(this, 'Gider')">GİDER</div>
                    <div class="t-btn" onclick="sec(this, 'Borç')">BORÇ</div>
                </div>
                <input type="number" id="i-miktar" placeholder="Tutar ₺">
                <input type="text" id="i-not" placeholder="Not (Müşteri adı vb.)">
                <button onclick="kaydet()" class="btn-green">KAYDET</button>
            </div>
        </div>

        <div class="window-container">
            <div class="pencere">
                <div class="pencere-baslik">AÇIK BORÇLAR (TÜMÜ)</div>
                <div id="borc-log" class="pencere-icerik"></div>
            </div>
            <div class="pencere">
                <div class="pencere-baslik">BUGÜNKÜ İŞLEMLER</div>
                <div id="islem-log" class="pencere-icerik"></div>
            </div>
            <div class="pencere">
                <div class="pencere-baslik">GİDERLER</div>
                <div id="gider-log" class="pencere-icerik"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let seciliTip = "Nakit", unsubs = [];

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        const bugun = new Date(); bugun.setHours(0,0,0,0);
        unsubs.forEach(u => u());
        const u1 = db.collection("islemler").where("sube", "==", sName).onSnapshot(snap => {
            let kasa = 0, log="", gLog="", bLog="";
            const docs = [];
            snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => (b.tarih?.seconds || 0) - (a.tarih?.seconds || 0));

            docs.forEach(d => {
                const m = Number(d.miktar) || 0;
                const dDate = d.tarih ? d.tarih.toDate() : new Date();
                const isToday = dDate >= bugun;

                if(d.tip === "Borç" && d.durum === "aktif") bLog += satir(d, m, true);
                else if(isToday && d.durum === "aktif") {
                    if(d.tip === "Gider") { kasa -= m; gLog += satir(d, m, false); }
                    else { kasa += m; log += satir(d, m, false); }
                }
            });
            document.getElementById('vT').innerText = kasa + "₺";
            document.getElementById('islem-log').innerHTML = log || "<center style='color:#333; padding:15px;'>Kayıt yok</center>";
            document.getElementById('gider-log').innerHTML = gLog || "<center style='color:#333; padding:15px;'>Gider yok</center>";
            document.getElementById('borc-log').innerHTML = bLog || "<center style='color:#333; padding:15px;'>Borç yok</center>";
        });
        unsubs.push(u1);
    }

    function satir(d, m, bMu) {
        return `<div class="islem-item">
            <div>
                <span class="amount">${m}₺</span><span class="islem-not">- ${d.not}</span>
                <span class="meta">${d.tip}</span>
            </div>
            <div style="display:flex;">${bMu ? `
                <button onclick="ode('${d.id}',${m},'${d.not}','Nakit')" class="action-btn" style="background:var(--n-green); color:#000;">NAKİT</button>
                <button onclick="ode('${d.id}',${m},'${d.not}','Kart')" class="action-btn" style="background:var(--n-blue); color:#000;">KART</button>
            ` : `<button onclick="iptal('${d.id}')" class="action-btn btn-sil">SİL</button>`}</div>
        </div>`;
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || seciliTip,
            tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false
        });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function ode(id, m, n, tip) {
        if(!confirm("Borç kapatılsın mı?")) return;
        await db.collection("islemler").doc(id).update({durum:"kapali", arsiv: true});
        await db.collection("islemler").add({
            miktar: m, tip: tip, sube: document.getElementById('i-sube').value,
            not: "[BORÇ] " + n, tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false
        });
    }

    function iptal(id) { if(confirm("Silinsin mi?")) db.collection("islemler").doc(id).update({durum:"iptal"}); }
    function sec(btn, val) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=val; }
    window.onload = verileriGetir;
</script>
</body>
</html>
