<!-- v20.4 - Sabit Açılış Kasası Entegre Edilmiş Versiyon -->
<script>
    // Önceki fonksiyonlara ekleme/güncelleme yapıyoruz:

    // 1. Sabit kasa miktarını tanımlıyoruz
    const SABIT_KASA = 200; 

    // 2. Vardiya Özeti kısmını güncelliyoruz
    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        // ... (diğer kodlar aynı kalıyor) ...

        const u1 = db.collection("islemler").where("sube","==",sube).where("tarih",">=",bas).where("tarih","<",bit).orderBy("tarih","desc").onSnapshot(snap => {
            let nT=0, kT=0, log="", vN=0, vK=0;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.durum === "aktif") {
                    if(d.tip==="Nakit") nT += d.miktar;
                    if(d.tip==="Kart") kT += d.miktar;
                    if(d.ekleyen === currentUserName) {
                        if(d.tip==="Nakit") vN += d.miktar;
                        if(d.tip==="Kart") vK += d.multiplier || d.miktar;
                    }
                }
                // ... (log oluşturma aynı) ...
            });

            // GÜNCELLEME: Kasada duran parayı (Nakit + Sabit Kasa) gösteriyoruz
            document.getElementById('kasa-detay').innerText = `Kasadaki Nakit: ${nT + SABIT_KASA}₺ | Kart: ${kT}₺`;
            document.getElementById('vT').innerText = (nT + kT + SABIT_KASA) + "₺";
            
            // Personel Özeti
            document.getElementById('v-nakit').innerHTML = `Şahsi Nakit Tahsilat: ${vN}₺ <br><small>(Kasa Mevcudu: ${vN + SABIT_KASA}₺)</small>`;
            document.getElementById('v-kart').innerText = `Şahsi Kart Tahsilat: ${vK}₺`;
            
            pNakit = vN; pKart = vK;
        });
    }

    // 3. Vardiya Bitir fonksiyonunu "Teslim Edilecek Para"ya göre güncelliyoruz
    async function vardiyaBitir() {
        // Personel dükkanı kapatırken 200 TL'yi kasada bırakıp kalan nakdi teslim etmeli
        const teslimEdilecekNakit = pNakit; 
        
        if(confirm(`Dükkanı Kapatıyorsunuz.\n\nKasada Bırakılacak Sabit: ${SABIT_KASA}₺\nTeslim Edilecek Nakit: ${teslimEdilecekNakit}₺\nTeslim Edilecek Kart: ${pKart}₺\n\nOnaylıyor musunuz?`)) {
            await db.collection("islemler").add({ 
                miktar: 0, 
                tip: "BİLGİ", 
                not: `DÜKKAN KAPANIŞ: ${teslimEdilecekNakit}₺ teslim edildi. ${SABIT_KASA}₺ kasada bırakıldı.`, 
                tarih: new Date(), 
                ekleyen: currentUserName, 
                sube: document.getElementById('i-sube').value, 
                durum: "info" 
            });
            cikisYap();
        }
    }
</script>
