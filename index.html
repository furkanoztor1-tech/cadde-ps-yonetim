<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v48.0 BOSS MODE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; touch-action: manipulation; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #050505; border-bottom: 2px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; padding: 15px; }
        .glass { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 10px; }
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .t-btn { padding: 12px 5px; border: 1px solid #333; background: #000; color: #fff; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); background: rgba(0,210,255,0.1); }
        .log-box { height: 450px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #111; border-radius: 5px; margin-top:10px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 5px; font-size: 16px; }
        .action-btn { width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; font-size: 13px; margin-bottom: 10px; }
        .gizli { display: none !important; }
        .islem-satir { padding: 10px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .ozet-kart { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .ozet-item { background: #111; padding: 10px; border-radius: 5px; text-align: center; border: 1px solid #222; }
        @media (max-width: 1024px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-ekran" class="gizli" style="text-align:center; padding-top:80px;">
    <div style="width:300px; margin:auto; background:#0a0a0a; padding:30px; border-top:4px solid var(--n-blue); border-radius:10px;">
        <h2 style="font-family:'Orbitron';">CADDE PS</h2>
        <input type="text" id="k" placeholder="Kullanıcı Adı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="action-btn" style="background:var(--n-blue); color:#000;">GİRİŞ YAP</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'; font-size:14px;">00:00</div>
        <div id="user-info" style="font-family:'Orbitron'; color:var(--n-blue); font-size:12px;"></div>
        <button onclick="cikisYap()" style="background:var(--red); border:none; color:#fff; padding:5px 10px; border-radius:5px; font-size:10px;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <div class="glass">
            <h4 style="color:var(--n-green); margin:0 0 10px 0;">YENİ İŞLEM</h4>
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <button class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</button>
                <button class="t-btn" data-val="Kart" onclick="sec(this)">KART</button>
                <button class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</button>
                <button class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</button>
                <button class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</button>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺" inputmode="numeric">
            <input type="text" id="i-not" placeholder="Açıklama">
            <button id="kaydet-btn" onclick="kaydet()" class="action-btn" style="background:var(--n-green); color:#000; height:60px;">KAYDET</button>

            <div id="admin-area" class="gizli">
                <button onclick="raporAc()" class="action-btn" style="background:var(--gold); color:#000;">📊 GELİŞMİŞ PATRON PANELİ</button>
            </div>

            <div class="glass" style="border:1px solid var(--gold); margin-top:10px; text-align:center;">
                <p style="color:var(--gold); font-size:11px; margin:0;">AKTİF VARDİYANIZ</p>
                <div id="v-nakit" style="font-size:26px; color:var(--n-green); font-weight:bold;">0₺</div>
                <div id="v-kart" style="font-size:20px; color:var(--n-blue);">0₺</div>
                <button onclick="vardiyaBitir()" class="action-btn" style="background:var(--gold); color:#000; margin-top:10px; font-size:11px;">TESLİM ET & WP</button>
            </div>
        </div>

        <div class="glass">
            <div id="admin-kasa" class="gizli" style="text-align:center; border:2px solid var(--n-green); padding:10px; border-radius:10px; margin-bottom:10px;">
                <div style="font-size:11px; color:var(--n-green);">GÜNLÜK KASA (+200₺)</div>
                <div id="vT" style="font-size:32px; font-family:'Orbitron'; color:#fff;">200₺</div>
            </div>
            <h4 style="color:var(--n-blue); font-size:12px; margin:0;">SON İŞLEMLER</h4>
            <div id="islem-log" class="log-box"></div>
        </div>

        <div class="glass">
            <h4 style="color:var(--red); margin:0 0 10px 0;">BORÇLAR</h4>
            <div id="borc-log" class="log-box"></div>
        </div>
    </div>
</div>

<!-- PATRON SORGULAMA MODALI -->
<div id="rapor-ekran" class="modal gizli">
    <div style="max-width:900px; margin:auto; background:#0a0a0a; padding:20px; border:1px solid #333; border-radius:10px; height:95vh; overflow-y:auto;">
        <button onclick="raporKapat()" style="float:right; background:var(--red); color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;">KAPAT</button>
        <h2 style="color:var(--gold); font-family:'Orbitron';">PATRON PANELİ</h2>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="date" id="r-bas">
            <input type="date" id="r-bit">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <select id="r-personel">
                <option value="Hepsi">Tüm Personeller</option>
            </select>
            <select id="r-sube">
                <option value="Hepsi">Tüm Şubeler</option>
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
        </div>
        <button onclick="sorgula()" class="action-btn" style="background:var(--n-blue); color:#000;">FİLTRELE VE HESAPLA</button>

        <div class="ozet-kart" id="r-ozet-alani">
            <div class="ozet-item"><small>TOPLAM NAKİT</small><div id="r-top-nakit" style="color:var(--n-green); font-size:20px;">0₺</div></div>
            <div class="ozet-item"><small>TOPLAM KART</small><div id="r-top-kart" style="color:var(--n-blue); font-size:20px;">0₺</div></div>
            <div class="ozet-item"><small>TOPLAM GİDER</small><div id="r-top-gider" style="color:var(--red); font-size:20px;">0₺</div></div>
        </div>

        <div id="r-liste" class="log-box" style="height: calc(100% - 300px);"></div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    const SESSION_KEY = 'cadde_v48_session';
    let userRole = "staff", currentUserName = "", unsubs = [], seciliTip = "Nakit", patronTel = "";
    let vn = 0, vk = 0, vg = 0;

    (function init() {
        const session = localStorage.getItem(SESSION_KEY);
        db.collection("ayarlar").doc("patron").onSnapshot(doc => { if(doc.exists) patronTel = doc.data().tel || ""; });
        // Personel listesini çek (Sorgu filtresi için)
        db.collection("personeller").get().then(snap => {
            const sel = document.getElementById('r-personel');
            snap.forEach(doc => { sel.innerHTML += `<option value="${doc.data().ad.toLowerCase()}">${doc.data().ad.toUpperCase()}</option>`; });
        });

        if(session) {
            const s = JSON.parse(session);
            userRole = s.role; currentUserName = s.name.toLowerCase();
            panelBaslat();
        } else { document.getElementById('login-ekran').classList.remove('gizli'); }
    })();

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase();
        const s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad.toLowerCase() && s === pDoc.data().sifre) {
            userRole = "admin"; currentUserName = k;
            localStorage.setItem(SESSION_KEY, JSON.stringify({role:"admin", name:k}));
            panelBaslat();
        } else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) {
                userRole="staff"; currentUserName=k;
                localStorage.setItem(SESSION_KEY, JSON.stringify({role:"staff", name:k}));
                panelBaslat();
            } else alert("Hata!");
        }
    }

    function panelBaslat() {
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        document.getElementById('user-info').innerText = currentUserName.toUpperCase();
        if(userRole === "admin") {
            document.getElementById('admin-area').classList.remove('gizli');
            document.getElementById('admin-kasa').classList.remove('gizli');
        }
        verileriGetir();
    }

    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        unsubs.forEach(u => u()); unsubs = [];
        const limit24 = Date.now() - (24 * 60 * 60 * 1000);

        const u1 = db.collection("islemler").where("sube","==",sube).onSnapshot(snap => {
            let total24 = 0, tvn = 0, tvk = 0, tvg = 0, logH = "";
            let docs = [];
            snap.forEach(doc => {
                const d = doc.data();
                docs.push({id: doc.id, ...d});
                if(d.durum === "aktif") {
                    if(d.tarih > limit24) {
                        if(d.tip === "Nakit" || d.tip === "Kart" || d.tip === "Havale") total24 += d.miktar;
                        if(d.tip === "Gider") total24 -= d.miktar;
                    }
                    if(d.ekleyen === currentUserName && d.v_durum === "acik") {
                        if(d.tip === "Nakit") tvn += d.miktar;
                        if(d.tip === "Kart" || d.tip === "Havale") tvk += d.miktar;
                        if(d.tip === "Gider") tvg += d.miktar;
                    }
                }
            });
            vn = tvn; vk = tvk; vg = tvg;
            document.getElementById('v-nakit').innerText = vn + "₺";
            document.getElementById('v-kart').innerText = vk + "₺";
            document.getElementById('vT').innerText = (total24 + 200) + "₺";
            
            docs.sort((a,b) => b.tarih - a.tarih).slice(0,20).forEach(d => {
                logH += `<div class="islem-satir"><span><b>${d.miktar}₺</b> - ${d.not}</span> <small>${d.tip} (${d.ekleyen})</small></div>`;
            });
            document.getElementById('islem-log').innerHTML = logH;
        });

        const u2 = db.collection("islemler").where("sube","==",sube).where("tip","==","Borç").where("durum","==","aktif").onSnapshot(snap => {
            let bH = "";
            snap.forEach(doc => {
                const d = doc.data();
                bH += `<div style="background:#111; padding:10px; border-left:4px solid var(--red); margin-bottom:5px;">
                    ${d.miktar}₺ - ${d.not} 
                    <div style="margin-top:5px;">
                        <button onclick="borcOde('${doc.id}',${d.miktar},'${d.not}','Nakit')" style="background:var(--n-green); border:none; padding:5px 10px; font-size:10px; cursor:pointer;">NAKİT</button>
                        <button onclick="borcOde('${doc.id}',${d.miktar},'${d.not}','Kart')" style="background:var(--n-blue); border:none; padding:5px 10px; font-size:10px; cursor:pointer;">KART</button>
                    </div>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bH;
        });
        unsubs.push(u1, u2);
    }

    async function kaydet() {
        const m = parseFloat(document.getElementById('i-miktar').value);
        if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || "İşlem", tarih: Date.now(),
            durum: "aktif", v_durum: "acik", ekleyen: currentUserName
        });
        document.getElementById('i-miktar').value = ""; document.getElementById('i-not').value = "";
    }

    async function borcOde(id, m, n, odemeTipi) {
        await db.collection("islemler").doc(id).update({durum:"odendi"});
        await db.collection("islemler").add({
            miktar: m, tip: odemeTipi, sube: document.getElementById('i-sube').value,
            not: "[BORÇ TAHSİL] " + n, tarih: Date.now(), durum: "aktif", v_durum: "acik", ekleyen: currentUserName
        });
    }

    async function vardiyaBitir() {
        if(!confirm("Teslim edilsin mi?")) return;
        const sube = document.getElementById('i-sube').value;
        const rapor = `🏁 VARDİYA\n👤: ${currentUserName.toUpperCase()}\n📍: ${sube}\n💵 Nakit: ${vn}₺\n💳 Kart: ${vk}₺\n📉 Gider: ${vg}₺\n💰 Net: ${vn+vk}₺`;
        
        const snap = await db.collection("islemler").where("sube","==",sube).where("ekleyen","==",currentUserName).where("v_durum","==","acik").get();
        const batch = db.batch();
        snap.forEach(doc => batch.update(doc.ref, {v_durum: "teslim"}));
        await batch.commit();
        window.open(`https://wa.me/${patronTel}?text=${encodeURIComponent(rapor)}`, '_blank');
    }

    // --- GELİŞMİŞ SORGULAMA FONKSİYONU ---
    async function sorgula() {
        const b = new Date(document.getElementById('r-bas').value).getTime();
        const s = new Date(document.getElementById('r-bit').value).setHours(23,59,59);
        const pers = document.getElementById('r-personel').value;
        const sube = document.getElementById('r-sube').value;

        if(!b || !s) { alert("Tarih seçin!"); return; }

        let query = db.collection("islemler").where("tarih",">=",b).where("tarih","<=",s);
        const snap = await query.get();

        let h = "", tNakit = 0, tKart = 0, tGider = 0;
        
        snap.forEach(doc => {
            const d = doc.data();
            // JS Tarafında Filtreleme (Firestore limitlerini aşmamak için)
            if((pers === "Hepsi" || d.ekleyen === pers) && (sube === "Hepsi" || d.sube === sube)) {
                if(d.durum === "aktif" || d.durum === "odendi") {
                    if(d.tip === "Nakit") tNakit += d.miktar;
                    if(d.tip === "Kart" || d.tip === "Havale") tKart += d.miktar;
                    if(d.tip === "Gider") tGider += d.miktar;
                    
                    h += `<div class="islem-satir">
                        <span><b>${d.miktar}₺</b><br><small>${d.sube}</small></span>
                        <span style="text-align:center;">${d.not}<br><small>${d.ekleyen}</small></span>
                        <span style="text-align:right;">${d.tip}<br><small>${new Date(d.tarih).toLocaleDateString()}</small></span>
                    </div>`;
                }
            }
        });

        document.getElementById('r-top-nakit').innerText = tNakit + "₺";
        document.getElementById('r-top-kart').innerText = tKart + "₺";
        document.getElementById('r-top-gider').innerText = tGider + "₺";
        document.getElementById('r-liste').innerHTML = h || "Kayıt bulunamadı.";
    }

    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); seciliTip = btn.getAttribute('data-val'); }
    function raporAc() { document.getElementById('rapor-ekran').classList.remove('gizli'); }
    function raporKapat() { document.getElementById('rapor-ekran').classList.add('gizli'); }
    function cikisYap() { localStorage.removeItem(SESSION_KEY); location.reload(); }
    setInterval(() => { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
</script>
</body>
</html>
