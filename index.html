<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v17.5 ULTIMATE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00d2ff">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --n-purple: #bc13fe; --red: #ff4444; --orange: #ff9f43; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow-x: hidden; font-weight: 600; }
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px 20px; background: #050505; border-bottom: 3px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 340px 1fr 340px; gap: 20px; padding: 20px; box-sizing: border-box; }
        .glass { background: rgba(15,15,15,0.9); border-radius: 12px; border: 2px solid #252525; padding: 15px; display: flex; flex-direction: column; }
        .type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 2px solid #333; border-radius: 6px; background: #000; color: #fff; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; opacity: 0.5; text-align: center; }
        .t-btn.active[data-val="Nakit"] { border-color: var(--n-green); color: var(--n-green); opacity: 1; }
        .t-btn.active[data-val="Kart"] { border-color: var(--n-blue); color: var(--n-blue); opacity: 1; }
        .t-btn.active[data-val="Havale"] { border-color: var(--orange); color: var(--orange); opacity: 1; }
        .t-btn.active[data-val="Gider"] { border-color: var(--red); color: var(--red); opacity: 1; }
        .t-btn.active[data-val="Borç"] { border-color: var(--n-purple); color: var(--n-purple); opacity: 1; }
        .log-box { flex: 1; overflow-y: auto; background: #030303; border-radius: 8px; padding: 10px; font-size: 14px; min-height: 200px; }
        .stat-card { background: #000; border: 2px solid var(--n-green); border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .gizli { display: none !important; }
        
        /* Arşiv Modalı Tasarımı */
        #rapor-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; padding: 15px; overflow-y: auto; }
        .filtre-alani { display: flex; flex-wrap: wrap; gap: 10px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 15px; }
        .f-input { background: #000; border: 1px solid var(--n-blue); color: #fff; padding: 8px; border-radius: 5px; font-family: 'Rajdhani'; }
        .hizli-btn { background: #222; border: none; color: #fff; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .hizli-btn:hover { background: var(--n-blue); color: #000; }
        .rapor-tablo { width: 100%; border-collapse: collapse; font-size: 13px; }
        .rapor-tablo th, .rapor-tablo td { border: 1px solid #222; padding: 10px; text-align: center; }
        .rapor-tablo th { background: #111; color: var(--n-blue); }
        .ozet-kutu { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .ozet-card { background: #0a0a0a; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

<div id="rapor-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="font-family:'Orbitron'; color:var(--n-blue); margin:0;">PATRON PANELİ</h2>
        <button onclick="document.getElementById('rapor-modal').style.display='none'" style="background:var(--red); color:#fff; border:none; padding:10px 20px; cursor:pointer; font-weight:900; border-radius:5px;">KAPAT</button>
    </div>

    <div class="filtre-alani">
        <select id="f-sube" class="f-input">
            <option value="HEPSİ">TÜM ŞUBELER</option>
            <option value="CADDEPS 1">CADDEPS 1</option>
            <option value="CADDEPS 2">CADDEPS 2</option>
        </select>
        <input type="date" id="f-bas" class="f-input">
        <input type="date" id="f-bit" class="f-input">
        <button onclick="arsivFiltrele()" style="background:var(--n-green); color:#000; border:none; padding:8px 20px; border-radius:5px; font-weight:900; cursor:pointer;">SORGULA</button>
        <div style="width:100%; height:1px; background:#222; margin:5px 0;"></div>
        <button class="hizli-btn" onclick="tarihAyarla('bugun')">BUGÜN</button>
        <button class="hizli-btn" onclick="tarihAyarla('dun')">DÜN</button>
        <button class="hizli-btn" onclick="tarihAyarla('hafta')">BU HAFTA</button>
        <button class="hizli-btn" onclick="tarihAyarla('ay')">BU AY</button>
    </div>

    <div class="ozet-kutu" id="ozet-sonuc"></div>
    <br>
    <table class="rapor-tablo">
        <thead>
            <tr>
                <th>Tarih</th>
                <th>Şube</th>
                <th>Nakit</th>
                <th>Kart</th>
                <th>Havale</th>
                <th>Gider</th>
                <th>NET</th>
            </tr>
        </thead>
        <tbody id="z-body"></tbody>
    </table>
</div>

<div id="login-ekran">
    <div style="width: 320px; padding: 40px; background: #0a0a0a; border-top: 5px solid var(--n-blue); text-align: center; border-radius: 10px; margin: 100px auto;">
        <h1 style="font-family:'Orbitron';">CADDE PS</h1>
        <p id="l-durum" style="color:var(--n-blue); font-size:12px;">Giriş Bekleniyor</p>
        <input type="text" id="k" placeholder="Kullanıcı" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:5px;">
        <input type="password" id="s" placeholder="Şifre" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:5px;">
        <button onclick="giris()" style="width:100%; padding:15px; background:var(--n-blue); color:#000; font-weight:900; border:none; cursor:pointer; border-radius:5px;">GİRİŞ YAP</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'; font-size:18px;">00:00:00</div>
        <div style="text-align:center"><h2 style="font-family:'Orbitron'; margin:0; font-size:18px;">CADDE <span style="color:var(--n-blue)">PS</span></h2></div>
        <button onclick="cikisYap()" style="background:none; border:1px solid var(--red); color:var(--red); font-size:10px; padding:6px 12px; border-radius:5px; cursor:pointer; font-weight:900;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <div class="glass">
            <h4 style="color:var(--n-green); margin:0 0 10px 0;">YENİ İŞLEM</h4>
            <select id="i-sube" onchange="verileriGetir()" style="width:100%; padding:10px; background:#000; color:#fff; border:2px solid var(--n-blue); border-radius:8px; margin-bottom:10px; font-family:'Orbitron';">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <div class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</div>
                <div class="t-btn" data-val="Kart" onclick="sec(this)">KART</div>
                <div class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</div>
                <div class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</div>
                <div class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺" style="width:100%; padding:15px; background:#000; border:2px solid #444; color:#fff; font-size:22px; margin-bottom:10px; border-radius:8px; box-sizing:border-box;">
            <input type="text" id="i-not" placeholder="Not / Açıklama" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:12px; border-radius:8px; box-sizing:border-box;">
            <button onclick="kaydet()" style="width:100%; padding:15px; background:var(--n-green); color:#000; font-weight:900; border:none; border-radius:8px; cursor:pointer;">KAYDET</button>
            
            <div id="admin-area" class="gizli" style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <button onclick="raporAc()" style="width:100%; padding:10px; background:var(--n-purple); color:#fff; border:none; font-weight:900; cursor:pointer; border-radius:6px; margin-bottom:10px;">ARŞİVİ GÖR</button>
                <button onclick="pEkle()" style="width:100%; padding:8px; background:var(--n-blue); color:#000; border:none; font-weight:900; cursor:pointer; border-radius:6px;">+ PERSONEL EKLE</button>
                <div id="p-liste" style="max-height:100px; overflow-y:auto; background:#050505; padding:5px; font-size:12px; margin-top:5px; border-radius:5px;"></div>
            </div>
        </div>

        <div class="glass">
            <div class="stat-card">
                <small style="font-weight:900; color:#888;">GÜNLÜK NET KASA (GİDER DÜŞÜLMÜŞ)</small><br>
                <b id="vT" style="font-size:36px; color:var(--n-green); font-family:'Orbitron';">0₺</b>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <div class="glass">
            <h4 style="color:var(--n-purple); margin:0 0 10px 0;">BORÇLAR</h4>
            <div id="borc-log" class="log-box" style="margin-bottom:15px; max-height:150px;"></div>
            <h4 style="color:var(--red); margin:0 0 10px 0;">GİDERLER</h4>
            <div id="gider-log" class="log-box" style="max-height:150px;"></div>
        </div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    // OTOMATİK GİRİŞ
    window.onload = function() {
        const u = localStorage.getItem('caddeUser'), p = localStorage.getItem('caddePass');
        if(u && p) { document.getElementById('k').value = u; document.getElementById('s').value = p; giris(); }
    };

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value;
        if(!k || !s) return;
        const p = await db.collection("ayarlar").doc("patron").get();
        if(k === p.data().ad && s === p.data().sifre) { basariliGiris(k, s, "admin"); }
        else {
            db.collection("personeller").where("ad","==",k).where("sifre","==",s).get().then(snap => {
                if(!snap.empty) basariliGiris(k, s, "staff");
                else { alert("Kullanıcı veya Şifre Hatalı!"); localStorage.removeItem('caddeUser'); }
            });
        }
    }

    function basariliGiris(u, p, role) {
        localStorage.setItem('caddeUser', u); localStorage.setItem('caddePass', p);
        userRole = role; currentUserName = u;
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        if(role === "admin") { document.getElementById('admin-area').classList.remove('gizli'); pYukle(); }
        verileriGetir();
    }

    function cikisYap() { localStorage.removeItem('caddeUser'); localStorage.removeItem('caddePass'); location.reload(); }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        let bas = new Date(); bas.setHours(0,0,0,0);
        const u1 = db.collection("islemler").where("tarih", ">=", bas).orderBy("tarih", "desc").onSnapshot(snap => {
            let kasaToplam = 0, log="", gLog="", bLog="";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.sube === sName && d.durum !== "iptal") {
                    if(d.tip === "Nakit" || d.tip === "Kart" || d.tip === "Havale") kasaToplam += Number(d.miktar);
                    else if(d.tip === "Gider") kasaToplam -= Number(d.miktar);
                    
                    let silBtn = (userRole === "admin" || d.ekleyen === currentUserName) ? `<button onclick="iptal('${doc.id}')" style="float:right; background:red; border:none; color:#fff; cursor:pointer; border-radius:3px; padding:2px 6px; font-size:10px;">SİL</button>` : "";
                    let item = `<div style="padding:10px; border-bottom:1px solid #222;"><b>${d.miktar}₺</b> - ${d.not} (${d.tip}) ${silBtn}</div>`;
                    if(d.tip === "Borç") bLog += item; else if(d.tip === "Gider") gLog += item; else log += item;
                }
            });
            document.getElementById('vT').innerText = kasaToplam + "₺";
            document.getElementById('islem-log').innerHTML = log;
            document.getElementById('gider-log').innerHTML = gLog;
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, not:document.getElementById('i-not').value || seciliTip, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function iptal(id) { if(confirm("Bu işlem silinsin mi?")) await db.collection("islemler").doc(id).update({durum:"iptal"}); }

    // ARŞİV VE FİLTRELEME SİSTEMİ
    function tarihAyarla(mod) {
        const bugun = new Date();
        let bas = new Date(), bit = new Date();
        if(mod === 'bugun') { bas = bugun; }
        else if(mod === 'dun') { bas.setDate(bugun.getDate()-1); bit.setDate(bugun.getDate()-1); }
        else if(mod === 'hafta') { bas.setDate(bugun.getDate()-7); }
        else if(mod === 'ay') { bas.setMonth(bugun.getMonth()-1); }
        
        document.getElementById('f-bas').value = bas.toISOString().split('T')[0];
        document.getElementById('f-bit').value = bit.toISOString().split('T')[0];
        arsivFiltrele();
    }

    function raporAc() {
        document.getElementById('rapor-modal').style.display='block';
        tarihAyarla('bugun');
    }

    async function arsivFiltrele() {
        const sube = document.getElementById('f-sube').value;
        const bas = document.getElementById('f-bas').value;
        const bit = document.getElementById('f-bit').value;
        
        const snap = await db.collection("z_raporlari").orderBy("tarih_key","desc").get();
        let h = "", tNakit=0, tKart=0, tHavale=0, tGider=0;

        snap.forEach(doc => {
            const d = doc.data();
            const tKey = d.tarih_key; // YYYY-MM-DD formatında olduğu varsayılıyor
            
            if((sube === "HEPSİ" || d.sube === sube) && (tKey >= bas && tKey <= bit)) {
                let n = Number(d.nakit || 0), k = Number(d.kart || 0), hav = Number(d.havale || 0), g = Number(d.gider || 0);
                let net = (n + k + hav) - g;
                
                tNakit += n; tKart += k; tHavale += hav; tGider += g;
                
                h += `<tr>
                    <td>${d.tarih_key}</td>
                    <td>${d.sube}</td>
                    <td>${n}₺</td>
                    <td>${k}₺</td>
                    <td>${hav}₺</td>
                    <td style="color:red">-${g}₺</td>
                    <td style="font-weight:900; background:rgba(0,210,255,0.05)">${net}₺</td>
                </tr>`;
            }
        });

        document.getElementById('z-body').innerHTML = h;
        document.getElementById('ozet-sonuc').innerHTML = `
            <div class="ozet-card"><small>TOPLAM NAKİT</small><br><b style="color:var(--n-green)">${tNakit}₺</b></div>
            <div class="ozet-card"><small>TOPLAM KART</small><br><b style="color:var(--n-blue)">${tKart}₺</b></div>
            <div class="ozet-card"><small>TOPLAM GİDER</small><br><b style="color:var(--red)">-${tGider}₺</b></div>
            <div class="ozet-card" style="border-color:var(--n-blue)"><small>NET KAZANÇ</small><br><b style="font-size:18px;">${(tNakit+tKart+tHavale)-tGider}₺</b></div>
        `;
    }

    function pYukle() {
        db.collection("personeller").onSnapshot(snap => {
            let h = ""; snap.forEach(doc => {
                h += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #222;"><span>${doc.data().ad}</span><button onclick="db.collection('personeller').doc('${doc.id}').delete()" style="color:red; background:none; border:none; cursor:pointer;">SİL</button></div>`;
            });
            document.getElementById('p-liste').innerHTML = h;
        });
    }

    async function pEkle() {
        const ad = prompt("Personel Adı:"), sifre = prompt("Şifre:");
        if(ad && sifre) await db.collection("personeller").add({ ad: ad.toLowerCase(), sifre });
    }

    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=> { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
