<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS MANAGEMENT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .kasa { border: 2px solid #39ff14; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 10px; }
        #toplamKasa { font-size: 30px; color: #39ff14; font-weight: bold; }
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        button { background: #39ff14; color: #000; font-weight: bold; border: none; cursor: pointer; }
        .islem-listesi, .borc-listesi { margin-top: 20px; border: 1px solid #222; padding: 10px; border-radius: 5px; }
        .baslik { color: #00d2ff; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .islem { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; align-items: center; }
        .ode-btn { width: auto; padding: 5px 10px; margin: 0; background: #39ff14; color: #000; font-size: 12px; }
    </style>
</head>
<body>

    <div class="kasa">
        <div>GÜNCEL KASA</div>
        <div id="toplamKasa">0₺</div>
    </div>

    <select id="sube">
        <option value="CADDEPS 1">ŞUBE 1</option>
        <option value="CADDEPS 2">ŞUBE 2</option>
    </select>

    <input type="number" id="miktar" placeholder="Miktar (₺)">
    <input type="text" id="not" placeholder="Not / Müşteri Adı">
    
    <select id="tip">
        <option value="Nakit">Nakit</option>
        <option value="Kart">Kart</option>
        <option value="Havale">Havale</option>
        <option value="Gider">Gider</option>
        <option value="Borç">Borç</option>
    </select>

    <button onclick="kaydet()">KAYDET</button>

    <div class="borc-listesi">
        <div class="baslik">BEKLEYEN BORÇLAR</div>
        <div id="borclar"></div>
    </div>

    <div class="islem-listesi">
        <div class="baslik">SON İŞLEMLER</div>
        <div id="islemler"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8",
        authDomain: "cadde-yonetim.firebaseapp.com",
        projectId: "cadde-yonetim",
        storageBucket: "cadde-yonetim.firebasestorage.app",
        messagingSenderId: "578914689738",
        appId: "1:578914689738:web:70c71a96e0eea69b0bca33"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let unsub = null;

    function verileriCek() {
        const seciliSube = document.getElementById('sube').value;
        if(unsub) unsub();

        unsub = db.collection("islemler")
            .where("sube", "==", seciliSube)
            .orderBy("tarih", "desc")
            .onSnapshot(snap => {
                let kasa = 0;
                let islemHtml = "";
                let borcHtml = "";

                snap.forEach(doc => {
                    const d = doc.data();
                    const m = Number(d.miktar) || 0;
                    const id = doc.id;

                    if (d.durum === "aktif") {
                        let satir = `<div class="islem">
                            <span>${m}₺ - ${d.not} (${d.tip})</span>`;
                        
                        if (d.tip === "Borç") {
                            borcHtml += satir + `<button class="ode-btn" onclick="ode('${id}', ${m}, '${d.not}')">ÖDE</button></div>`;
                        } else {
                            if (d.tip === "Gider") kasa -= m; else kasa += m;
                            islemHtml += satir + `</div>`;
                        }
                    }
                });
                document.getElementById('toplamKasa').innerText = kasa + "₺";
                document.getElementById('islemler').innerHTML = islemHtml;
                document.getElementById('borclar').innerHTML = borcHtml;
            });
    }

    async function kaydet() {
        const m = document.getElementById('miktar').value;
        const n = document.getElementById('not').value;
        const t = document.getElementById('tip').value;
        const s = document.getElementById('sube').value;

        if(!m) return;

        await db.collection("islemler").add({
            miktar: Number(m),
            not: n || t,
            tip: t,
            sube: s,
            durum: "aktif",
            tarih: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('miktar').value = "";
        document.getElementById('not').value = "";
    }

    async function ode(id, m, n) {
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        await db.collection("islemler").add({
            miktar: Number(m),
            not: "[ÖDEME] " + n,
            tip: "Nakit",
            sube: document.getElementById('sube').value,
            durum: "aktif",
            tarih: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    document.getElementById('sube').addEventListener('change', verileriCek);
    window.onload = verileriCek;
</script>
</body>
</html>
