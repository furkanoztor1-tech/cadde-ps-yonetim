<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | MANAGEMENT PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');
        :root { --n-green: #39ff14; --n-blue: #00d2ff; --n-red: #ff3131; --bg: #080808; --panel: #111114; }
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; padding: 8px; box-sizing: border-box; }

        /* GÜNCEL NET KASA KARTI */
        .kasa-card { border: 1.5px solid var(--n-green); border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 10px; background: #000; }
        .kasa-label { font-family: 'Orbitron'; font-size: 10px; color: #555; margin-bottom: 4px; display: block; }
        .kasa-val { font-family: 'Orbitron'; font-size: 28px; color: var(--n-green); text-shadow: 0 0 10px rgba(57,255,20,0.4); }

        /* KONTROL MERKEZİ */
        .control-panel { background: var(--panel); border: 1px solid #222; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 6px; background: #000; border: 1.5px solid #222; color: #fff; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; }
        
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 8px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        
        .btn-m { background: #000; border: 1.5px solid #222; color: #666; padding: 14px 0; border-radius: 6px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; text-align: center; font-weight: 700; transition: 0.2s; }
        .btn-m.active { border-color: var(--n-blue); color: var(--n-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        .btn-m.nav-btn { border-color: #333; color: #aaa; }
        .btn-m.nav-btn.active { border-color: var(--n-blue); color: #fff; background: rgba(0, 210, 255, 0.1); }
        .btn-m.red-mode { border-color: #311; color: #744; }
        .btn-m.red-mode:active { background: var(--n-red); color: #000; border-color: var(--n-red); }

        .save-btn { width: 100%; padding: 16px; background: var(--n-green); color: #000; font-family: 'Orbitron'; font-weight: 700; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; box-shadow: 0 4px 20px rgba(57, 255, 20, 0.2); }

        /* PENCERELER */
        .content-area { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .win { background: #0a0a0a; border: 1.2px solid #1a1a1a; border-radius: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .win-h { background: #151518; padding: 8px 12px; border-bottom: 1px solid #222; color: var(--n-blue); font-family: 'Orbitron'; font-size: 9px; }
        .win-b { flex-grow: 1; overflow-y: auto; padding: 5px; }

        .item { padding: 12px; border-bottom: 1px solid #121212; display: flex; justify-content: space-between; align-items: center; }
        .i-val { font-family: 'Orbitron'; font-size: 17px; color: #fff; }
        .i-not { color: #888; font-size: 14px; margin-left: 8px; flex-grow: 1; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="kasa-card">
        <span class="kasa-label">GÜNCEL NET KASA</span>
        <div class="kasa-val" id="vT">0₺</div>
    </div>

    <div class="control-panel">
        <select id="i-sube" onchange="verileriGetir()">
            <option value="CADDEPS 1">ŞUBE 1 (CADDE)</option>
            <option value="CADDEPS 2">ŞUBE 2 (CADDE)</option>
        </select>

        <!-- ÜST SIRA: TİPLER -->
        <div class="grid-5">
            <div class="btn-m active" id="t-nakit" onclick="setT('Nakit', this)">NAKİT</div>
            <div class="btn-m" onclick="setT('Kart', this)">KART</div>
            <div class="btn-m" onclick="setT('Havale', this)">HAVALE</div>
            <div class="btn-m" onclick="setT('Gider', this)">GİDER</div>
            <div class="btn-m" onclick="setT('Borç', this)">BORÇ</div>
        </div>

        <!-- ALT SIRA: YÖNETİM (TAM İSTEDİĞİN YERDE) -->
        <div class="grid-3">
            <div class="btn-m nav-btn active" id="v-pan" onclick="nav('pan')">PANEL</div>
            <div class="btn-m nav-btn" id="v-ars" onclick="nav('ars')">ARŞİV</div>
            <div class="btn-m red-mode" onclick="zRaporu()">GÜNÜ KAPAT</div>
        </div>

        <input type="number" id="i-miktar" placeholder="Tutar ₺" inputmode="decimal">
        <input type="text" id="i-not" placeholder="Açıklama / Müşteri...">
        <button class="save-btn" onclick="kaydet()">İŞLEMİ KAYDET</button>
    </div>

    <div class="content-area" id="view-panel">
        <div class="win"><div class="win-h">AKTİF BORÇLAR</div><div class="win-b" id="log-borc"></div></div>
        <div class="win"><div class="win-h">GÜNLÜK İŞLEMLER</div><div class="win-b" id="log-islem"></div></div>
    </div>

    <div class="content-area" id="view-arsiv" style="display:none;">
        <div class="win"><div class="win-h">KAPALI GÜN ARŞİVİ</div><div class="win-b" id="log-arsiv"></div></div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let curT = "Nakit", unsubs = [];

    function verileriGetir() {
        const s = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        const u1 = db.collection("islemler").where("sube", "==", s).onSnapshot(snap => {
            let kasa = 0, iL="", bL="", aL="";
            const docs = [];
            snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => (b.tarih?.seconds || 0) - (a.tarih?.seconds || 0));

            docs.forEach(d => {
                const m = Number(d.miktar) || 0;
                let ui = `<div class="item"><span class="i-val">${m}₺</span><span class="i-not">${d.not}</span></div>`;
                if(d.arsiv === true) { if(d.tip === "DEVİR") kasa += m; aL += ui; }
                else if(d.durum === "aktif") {
                    if(d.tip === "Borç") bL += ui;
                    else { if(d.tip === "Gider") kasa -= m; else kasa += m; iL += ui; }
                }
            });
            document.getElementById('vT').innerText = kasa + "₺";
            document.getElementById('log-islem').innerHTML = iL;
            document.getElementById('log-borc').innerHTML = bL;
            document.getElementById('log-arsiv').innerHTML = aL;
        });
        unsubs.push(u1);
    }

    async function zRaporu() {
        const s = document.getElementById('i-sube').value;
        const k = parseInt(document.getElementById('vT').innerText);
        if(!confirm(`DÜKKAN KAPANIŞI: ${k}₺ yarına devredilsin mi?`)) return;
        const snap = await db.collection("islemler").where("sube","==",s).where("arsiv","==",false).get();
        const batch = db.batch();
        snap.forEach(d => { if(d.data().tip !== "Borç") batch.update(d.ref, {arsiv: true}); });
        const devRef = db.collection("islemler").doc();
        batch.set(devRef, { miktar: k, tip: "DEVİR", sube: s, not: "Dünden Devreden", tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false });
        await batch.commit();
        alert("Gün kapatıldı, bakiye devredildi.");
    }

    function nav(v) {
        document.getElementById('view-panel').style.display = v === 'pan' ? 'flex' : 'none';
        document.getElementById('view-arsiv').style.display = v === 'ars' ? 'flex' : 'none';
        document.getElementById('v-pan').classList.toggle('active', v === 'pan');
        document.getElementById('v-ars').classList.toggle('active', v === 'ars');
    }

    function setT(v, el) {
        curT = v;
        document.querySelectorAll('.btn-m').forEach(b => { if(!b.classList.contains('nav-btn') && !b.classList.contains('red-mode')) b.classList.remove('active'); });
        el.classList.add('active');
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar: m, tip: curT, sube: document.getElementById('i-sube').value, not: document.getElementById('i-not').value || curT, tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    window.onload = verileriGetir;
</script>
</body>
</html>
