<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v19.9.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --purple: #bc13fe; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #050505; border-bottom: 2px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; padding: 15px; }
        .glass { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 10px; }
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 1px solid #333; background: #000; color: #fff; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; opacity: 0.6; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); opacity: 1; }
        .log-box { height: 450px; overflow-y: auto; background: #050505; padding: 10px; font-size: 13px; border-radius: 5px; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 5px; }
        .action-btn { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 5px; }
        .gizli { display: none !important; }
        .p-card { background: #111; padding: 10px; margin-bottom: 5px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .p-card:hover { border-color: var(--purple); }
        @media (max-width: 1024px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<!-- LOGIN EKRANI (Başlangıçta gizli tutuyoruz ki oto-giriş sırasında sıçrama yapmasın) -->
<div id="login-ekran" class="gizli" style="text-align:center; padding-top:100px;">
    <div style="width:320px; margin:auto; background:#0a0a0a; padding:40px; border-top:4px solid var(--n-blue); border-radius:10px;">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">CADDE PS</h2>
        <input type="text" id="k" placeholder="Kullanıcı Adı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="action-btn" style="background:var(--n-blue); color:#000;">SİSTEME GİRİŞ</button>
    </div>
</div>

<!-- ANA PANEL -->
<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'">00:00:00</div>
        <div id="aktif-user-label" style="font-family:'Orbitron'; font-size:10px; color:var(--n-blue)">GİRİŞ YAPILDI</div>
        <button onclick="cikisYap()" style="background:none; border:1px solid var(--red); color:var(--red); padding:5px 15px; cursor:pointer; border-radius:5px;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <div class="glass" style="padding:15px;">
            <h4 style="margin:0 0 10px 0; color:var(--n-green)">YENİ İŞLEM</h4>
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <button class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</button>
                <button class="t-btn" data-val="Kart" onclick="sec(this)">KART</button>
                <button class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</button>
                <button class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</button>
                <button class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</button>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Açıklama / Masa No">
            <button onclick="kaydet()" class="action-btn" style="background:var(--n-green); color:#000;">KAYDET</button>
            
            <div id="admin-panel" class="gizli" style="margin-top:20px; border-top:2px solid var(--purple); padding-top:15px;">
                <h4 style="color:var(--purple); margin:0 0 10px 0;">PERSONEL TAKİP & YÖNETİM</h4>
                <div id="personel-listesi"></div>
                <button onclick="pEkleModali()" class="action-btn" style="background:#222; color:var(--purple); border:1px solid var(--purple); margin-top:10px;">+ YENİ PERSONEL EKLE</button>
            </div>
        </div>

        <div class="glass" style="padding:15px;">
            <div style="text-align:center; padding:15px; border:2px solid var(--n-green); border-radius:8px; margin-bottom:10px;">
                <div id="kasa-detay" style="font-size:12px; color:#888;">Nakit: 0₺ | Kart: 0₺</div>
                <div id="vT" style="font-size:36px; font-family:'Orbitron'; color:var(--n-green);">0₺</div>
                <small style="color:#444">Z-RAPORU (02:00 - 02:00)</small>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <div class="glass" style="padding:15px;">
            <h4 style="margin:0 0 10px 0; color:var(--red)">AKTİF BORÇLAR</h4>
            <div id="borc-log" class="log-box"></div>
        </div>
    </div>
</div>

<!-- MODALLAR (Personel Detay, Ekleme vb.) -->
<div id="p-detay-modal" class="gizli" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:1000; padding:20px; box-sizing:border-box; overflow-y:auto;">
    <div style="max-width:800px; margin:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--purple); padding-bottom:10px;">
            <h2 id="detay-p-adi" style="color:var(--purple); font-family:'Orbitron'; margin:0;">PERSONEL ADI</h2>
            <button onclick="modalKapat('p-detay-modal')" style="background:var(--red); border:none; color:#fff; padding:10px 20px; cursor:pointer;">KAPAT</button>
        </div>
        <div id="detay-istatistik" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:20px 0;"></div>
        <div id="detay-islem-listesi" class="log-box" style="height:60vh;"></div>
    </div>
</div>

<div id="p-ekle-modal" class="gizli" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1001; display:flex; align-items:center; justify-content:center;">
    <div style="width:300px; background:#0a0a0a; padding:30px; border:1px solid var(--n-blue);">
        <h3 style="color:var(--n-blue); margin-top:0;">PERSONEL EKLE</h3>
        <input type="text" id="yeni-p-ad" placeholder="Kullanıcı Adı">
        <input type="text" id="yeni-p-sifre" placeholder="Şifre">
        <button onclick="pKaydet()" class="action-btn" style="background:var(--n-blue); color:#000;">KAYDET</button>
        <button onclick="modalKapat('p-ekle-modal')" class="action-btn" style="background:#333; color:#fff;">İPTAL</button>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    // KRİTİK: OTURUM KONTROLÜ (Sayfa açılır açılmaz çalışır)
    (function kontrolEt() {
        const data = localStorage.getItem('cadde_session');
        if (data) {
            const session = JSON.parse(data);
            userRole = session.role;
            currentUserName = session.name;
            setTimeout(() => panelBaslat(), 100); // Firebase'in hazır olması için minik bir bekleme
        } else {
            document.getElementById('login-ekran').classList.remove('gizli');
        }
    })();

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value;
        const patronDoc = await db.collection("ayarlar").doc("patron").get();
        
        if(k === patronDoc.data().ad && s === patronDoc.data().sifre) {
            userRole = "admin"; currentUserName = k;
            localStorage.setItem('cadde_session', JSON.stringify({role: "admin", name: k}));
            panelBaslat();
        } else {
            const pSnap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!pSnap.empty) {
                userRole="staff"; currentUserName=k;
                localStorage.setItem('cadde_session', JSON.stringify({role: "staff", name: k}));
                panelBaslat();
            } else alert("Hatalı Giriş!");
        }
    }

    function cikisYap() {
        localStorage.removeItem('cadde_session');
        location.reload();
    }

    function panelBaslat() {
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        document.getElementById('aktif-user-label').innerText = currentUserName.toUpperCase() + " OTURUMU";
        if(userRole === "admin") {
            document.getElementById('admin-panel').classList.remove('gizli');
            personelleriYukle();
        }
        verileriGetir();
    }

    function getZTime() {
        let simdi = new Date();
        let bas = new Date();
        if(simdi.getHours() < 2) bas.setDate(simdi.getDate() - 1);
        bas.setHours(2,0,0,0);
        return bas;
    }

    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        const baslangic = getZTime();

        const u1 = db.collection("islemler").where("sube","==",sube).where("tarih",">=",baslangic).orderBy("tarih","desc").onSnapshot(snap => {
            let nT=0, kT=0, log="";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.durum === "aktif") {
                    if(d.tip==="Nakit") nT += d.miktar;
                    if(d.tip==="Kart") kT += d.miktar;
                }
                log += `<div style="padding:10px; border-bottom:1px solid #111; display:flex; justify-content:space-between;">
                    <div><b style="color:var(--n-blue)">${d.miktar}₺</b> - ${d.not || d.tip} <small style="color:#444">(${d.ekleyen})</small></div>
                    ${userRole==='admin' ? `<button onclick="tSil('${doc.id}')" style="background:red; border:none; color:white; font-size:10px; padding:2px 5px;">SİL</button>` : ''}
                </div>`;
            });
            document.getElementById('kasa-detay').innerText = `Nakit: ${nT}₺ | Kart: ${kT}₺`;
            document.getElementById('vT').innerText = (nT+kT) + "₺";
            document.getElementById('islem-log').innerHTML = log;
        });

        const u2 = db.collection("islemler").where("sube","==",sube).where("tip","==","Borç").where("durum","==","aktif").onSnapshot(snap => {
            let bLog = "";
            snap.forEach(doc => {
                const d = doc.data();
                bLog += `<div style="padding:10px; background:#080808; border-left:3px solid var(--red); margin-bottom:5px; font-size:12px;">
                    <b>${d.miktar}₺</b> - ${d.not} <br>
                    <button onclick="bTahsil('${doc.id}',${d.miktar},'${d.not}','Nakit')" style="background:var(--n-green); border:none; padding:5px; font-weight:bold; margin-top:5px; cursor:pointer;">NAKİT ALINDI</button>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1, u2);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, not:document.getElementById('i-not').value, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function personelleriYukle() {
        const snap = await db.collection("personeller").get();
        let h = "";
        snap.forEach(doc => {
            const p = doc.data();
            h += `<div class="p-card" onclick="personelDetayGetir('${p.ad}')">
                <span>${p.ad.toUpperCase()}</span>
                <button onclick="event.stopPropagation(); pSil('${doc.id}')" style="background:none; color:red; border:none; font-weight:bold;">SİL</button>
            </div>`;
        });
        document.getElementById('personel-listesi').innerHTML = h;
    }

    async function personelDetayGetir(pAdi) {
        document.getElementById('p-detay-modal').classList.remove('gizli');
        document.getElementById('detay-p-adi').innerText = pAdi.toUpperCase() + " İŞLEMLERİ";
        const snap = await db.collection("islemler").where("ekleyen","==",pAdi).orderBy("tarih","desc").limit(100).get();
        let h = "", nakit=0, kart=0;
        snap.forEach(doc => {
            const d = doc.data();
            if(d.tip === "Nakit") nakit += d.miktar;
            if(d.tip === "Kart") kart += d.miktar;
            h += `<div style="padding:10px; border-bottom:1px solid #222;">
                <b>${d.miktar}₺</b> - ${d.not || d.tip} <small style="float:right">${d.tarih.toDate().toLocaleDateString()}</small>
            </div>`;
        });
        document.getElementById('detay-istatistik').innerHTML = `<div class="glass" style="text-align:center">Nakit<br>${nakit}₺</div><div class="glass" style="text-align:center">Kart<br>${kart}₺</div><div class="glass" style="text-align:center">Toplam<br>${nakit+kart}₺</div>`;
        document.getElementById('detay-islem-listesi').innerHTML = h || "İşlem bulunamadı.";
    }

    function pEkleModali() { document.getElementById('p-ekle-modal').classList.remove('gizli'); }
    function modalKapat(id) { document.getElementById(id).classList.add('gizli'); }
    async function pKaydet() {
        const ad = document.getElementById('yeni-p-ad').value.trim().toLowerCase();
        const sifre = document.getElementById('yeni-p-sifre').value.trim();
        if(ad && sifre) { await db.collection("personeller").add({ ad, sifre }); modalKapat('p-ekle-modal'); personelleriYukle(); }
    }
    async function pSil(id) { if(confirm("Personeli sil?")) { await db.collection("personeller").doc(id).delete(); personelleriYukle(); } }
    async function tSil(id) { if(confirm("Siliniyor?")) await db.collection("islemler").doc(id).delete(); }
    async function bTahsil(id, m, n, t) {
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        await db.collection("islemler").add({ miktar:m, tip:t, sube:document.getElementById('i-sube').value, not:"BORÇ ÖDENDİ: "+n, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
    }
    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=> { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
