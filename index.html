<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | YÖNETİM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Rajdhani', sans-serif; 
            background: #080808; 
            color: #fff; 
            height: 100vh;
        }

        .main-container { padding: 10px; display: flex; flex-direction: column; gap: 10px; }

        .kasa-header {
            background: #000;
            border: 1px solid #39ff14;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .kasa-tutar { font-family: 'Orbitron'; font-size: 28px; color: #39ff14; }

        .islem-form {
            background: #111;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #222;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 7px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .tipler {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .t-btn {
            background: #000;
            border: 1px solid #333;
            color: #666;
            padding: 12px 0;
            border-radius: 6px;
            font-size: 9px;
            font-weight: bold;
            text-align: center;
        }

        .t-btn.active {
            border-color: #00d2ff;
            color: #00d2ff;
        }

        .kaydet-btn {
            width: 100%;
            padding: 15px;
            background: #39ff14;
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-weight: 700;
        }

        .logs-container { display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
        .log-box { background: #000; border: 1px solid #1a1a1a; border-radius: 10px; }
        .log-title { background: #151518; padding: 7px 12px; font-family: 'Orbitron'; font-size: 9px; color: #00d2ff; border-bottom: 1px solid #222; }
        .log-list { max-height: 200px; overflow-y: auto; }

        .log-item {
            padding: 10px;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-val { font-family: 'Orbitron'; font-size: 17px; color: #fff; }
        .item-not { color: #888; font-size: 13px; margin-left: 8px; }
        
        .ode-button { background: #39ff14; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="kasa-header">
        <div style="font-family:'Orbitron'; font-size:10px; color:#555">GÜNCEL KASA</div>
        <div class="kasa-tutar" id="kasaGosterge">0₺</div>
    </div>

    <div class="islem-form">
        <select id="subeSec">
            <option value="CADDEPS 1">ŞUBE 1 (CADDE)</option>
            <option value="CADDEPS 2">ŞUBE 2 (CADDE)</option>
        </select>

        <div class="tipler">
            <div class="t-btn active" onclick="tipSec('Nakit', this)">NAKİT</div>
            <div class="t-btn" onclick="tipSec('Kart', this)">KART</div>
            <div class="t-btn" onclick="tipSec('Havale', this)">HAVALE</div>
            <div class="t-btn" onclick="tipSec('Gider', this)">GİDER</div>
            <div class="t-btn" onclick="tipSec('Borç', this)">BORÇ</div>
        </div>

        <input type="number" id="miktar" placeholder="Tutar ₺" inputmode="decimal">
        <input type="text" id="not" placeholder="Açıklama veya İsim...">
        <button class="kaydet-btn" onclick="veriyiKaydet()">İŞLEMİ KAYDET</button>
    </div>

    <div class="logs-container">
        <div class="log-box">
            <div class="log-title">AKTİF BORÇLAR</div>
            <div id="borcListesi" class="log-list"></div>
        </div>
        <div class="log-box">
            <div class="log-title">BUGÜNKÜ İŞLEMLER</div>
            <div id="islemListesi" class="log-list"></div>
        </div>
    </div>
</div>

<script>
    // BUGÜNÜN İLK KODUNDAKİ ASIL AYARLAR
    const firebaseConfig = { 
        apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", 
        authDomain: "cadde-yonetim.firebaseapp.com", 
        projectId: "cadde-yonetim", 
        storageBucket: "cadde-yonetim.firebasestorage.app", 
        messagingSenderId: "578914689738", 
        appId: "1:578914689738:web:70c71a96e0eea69b0bca33" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let seciliTip = "Nakit";
    let dinleyici = null;

    function verileriYukle() {
        const sube = document.getElementById('subeSec').value;
        if(dinleyici) dinleyici();

        dinleyici = db.collection("islemler")
            .where("sube", "==", sube)
            .orderBy("tarih", "desc")
            .onSnapshot(snap => {
                let toplamKasa = 0;
                let islemHtml = "";
                let borcHtml = "";

                snap.forEach(doc => {
                    const veri = doc.data();
                    const m = Number(veri.miktar) || 0;
                    
                    let satir = `<div class="log-item">
                        <div><span class="item-val">${m}₺</span><span class="item-not">${veri.not}</span></div>`;
                    
                    if(veri.tip === "Borç" && veri.durum === "aktif") {
                        borcHtml += satir + `<button class="ode-button" onclick="borcOde('${doc.id}', ${m}, '${veri.not}')">ÖDE</button></div>`;
                    } else if(veri.durum === "aktif") {
                        if(veri.tip === "Gider") toplamKasa -= m; else toplamKasa += m;
                        islemHtml += satir + `</div>`;
                    }
                });

                document.getElementById('kasaGosterge').innerText = toplamKasa + "₺";
                document.getElementById('islemListesi').innerHTML = islemHtml;
                document.getElementById('borcListesi').innerHTML = borcHtml;
            });
    }

    async function veriyiKaydet() {
        const m = Number(document.getElementById('miktar').value);
        const n = document.getElementById('not').value || seciliTip;
        if(!m) return;

        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, not: n,
            sube: document.getElementById('subeSec').value,
            tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif"
        });
        document.getElementById('miktar').value = "";
        document.getElementById('not').value = "";
    }

    async function borcOde(id, m, n) {
        await db.collection("islemler").doc(id).update({durum: "kapali"});
        await db.collection("islemler").add({
            miktar: m, tip: "Nakit", not: "[ÖDENDİ] " + n,
            sube: document.getElementById('subeSec').value,
            tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif"
        });
    }

    function tipSec(t, el) {
        seciliTip = t;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    document.getElementById('subeSec').addEventListener('change', verileriYukle);
    window.onload = verileriYukle;
</script>
</body>
</html>
