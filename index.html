<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | VERI KONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --dark-bg: #0a0a0c; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--dark-bg); color: #fff; }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .glass { background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid #222; padding: 15px; margin-bottom: 15px; }
        .log-container { background: #000; border: 1px solid #111; border-radius: 10px; margin-bottom: 20px; min-height: 40px; }
        .islem-item { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        .section-title { font-family: 'Orbitron'; font-size: 13px; color: var(--n-blue); margin: 15px 0 5px 5px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Rajdhani'; box-sizing: border-box; }
        .t-btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 1px solid #333; text-align: center; font-size: 11px; cursor: pointer; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); }
    </style>
</head>
<body>

<div id="login-ekran" style="padding:50px 20px; text-align:center;">
    <h2 style="font-family:'Orbitron'">CADDE PS</h2>
    <input type="text" id="k" placeholder="Kullanıcı">
    <input type="password" id="s" placeholder="Şifre">
    <button onclick="giris()" style="background:var(--n-blue); font-weight:bold;">GİRİŞ YAP</button>
</div>

<div id="panel" style="display:none;">
    <div class="container">
        <div class="glass" style="text-align:center; border: 2px solid var(--n-green);">
            <small>KASA</small><br>
            <b id="vT" style="font-size:35px; color:var(--n-green); font-family:'Orbitron'">0₺</b>
        </div>

        <div class="glass">
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">ŞUBE 1</option>
                <option value="CADDEPS 2">ŞUBE 2</option>
            </select>
            <div class="t-btn-group">
                <div class="t-btn active" onclick="sec(this, 'Nakit')">NAKİT</div>
                <div class="t-btn" onclick="sec(this, 'Kart')">KART</div>
                <div class="t-btn" onclick="sec(this, 'Borç')">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Not...">
            <button onclick="kaydet()" style="background:var(--n-green); color:#000; font-weight:bold;">KAYDET</button>
        </div>

        <div class="section-title">AÇIK BORÇLAR (TÜM ZAMANLAR)</div>
        <div id="borc-log" class="log-container"></div>

        <div class="section-title">BUGÜNKÜ DİĞER İŞLEMLER</div>
        <div id="islem-log" class="log-container"></div>
    </div>
</div>

<script>
    // Firebase Yapılandırması
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let user = "", role = "staff", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase();
        const s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad && s === pDoc.data().sifre) start(k, "admin");
        else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) start(k, "staff"); else alert("Hata!");
        }
    }

    function start(u, r) {
        user = u.toUpperCase(); role = r;
        localStorage.setItem('c_u', u); localStorage.setItem('c_s', document.getElementById('s').value);
        document.getElementById('login-ekran').style.display='none';
        document.getElementById('panel').style.display='block';
        verileriGetir();
    }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        
        // SORGUDAN ARŞİV VE TARİH FİLTRESİNİ KALDIRDIM (Test için her şeyi getirsin)
        const u1 = db.collection("islemler").where("sube", "==", sName).onSnapshot(snap => {
            let bHtml = "", iHtml = "", kasa = 0;
            
            if (snap.empty) {
                bHtml = iHtml = "<div style='padding:10px; color:#444'>Veritabanında bu şubeye ait veri bulunamadı.</div>";
            }

            snap.forEach(doc => {
                const d = doc.data();
                const m = Number(d.miktar) || 0;
                
                // Kasa hesaplama (Arşivlenmemişse)
                if (d.arsiv === false && d.durum !== "iptal") {
                    if (d.tip === "Nakit") kasa += m;
                    else if (d.tip === "Kart" || d.tip === "Havale") kasa += m;
                    else if (d.tip === "Gider") kasa -= m;
                }

                let satir = `<div class="islem-item">
                    <b>${m}₺</b> - ${d.not || ''} <br>
                    <small style="color:#666">${d.tip} | ${d.ekleyen || ''}</small>
                    ${(d.tip === 'Borç' && d.durum === 'aktif') ? `<button onclick="ode('${doc.id}',${m},'${d.not}')" style="padding:4px; margin-top:5px; font-size:10px; background:var(--n-blue)">ÖDE</button>` : ''}
                </div>`;

                if (d.tip === "Borç" && d.durum === "aktif") bHtml += satir;
                else if (d.arsiv === false) iHtml += satir;
            });

            document.getElementById('borc-log').innerHTML = bHtml || "<div style='padding:10px; color:#444'>Açık borç yok.</div>";
            document.getElementById('islem-log').innerHTML = iHtml || "<div style='padding:10px; color:#444'>Bugün işlem yok.</div>";
            document.getElementById('vT').innerText = kasa + "₺";
        }, err => {
            alert("Veri çekme hatası: " + err.message);
        });
        unsubs.push(u1);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || seciliTip,
            tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif", arsiv: false, ekleyen: user
        });
        document.getElementById('i-miktar').value = ""; document.getElementById('i-not').value = "";
    }

    async function ode(id, m, n) {
        if(!confirm("Tahsil edildi mi?")) return;
        await db.collection("islemler").doc(id).update({durum:"iptal", arsiv:true});
        await db.collection("islemler").add({
            miktar: m, tip: "Nakit", sube: document.getElementById('i-sube').value,
            not: "[BORÇ ÖDENDİ] " + n, tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif", arsiv: false, ekleyen: user
        });
    }

    function sec(btn, val) {
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); seciliTip = val;
    }

    window.onload = () => { if(localStorage.getItem('c_u')) { document.getElementById('k').value=localStorage.getItem('c_u'); document.getElementById('s').value=localStorage.getItem('c_s'); giris(); } };
</script>
</body>
</html>
