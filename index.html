<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | AKILLI YÖNETİM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --orange: #ff9f43; --dark-bg: #0a0a0c; }
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--dark-bg); color: #fff; }
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 15px; background: #000; border-bottom: 2px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 15px; padding: 15px; }
        .glass { background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid #222; padding: 15px; }
        .t-btn { padding: 10px; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; cursor: pointer; text-align: center; font-size: 11px; font-weight: bold; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        .log-box { height: 380px; overflow-y: auto; background: #050505; border-radius: 8px; padding: 5px; border: 1px solid #111; }
        .islem-item { padding: 12px; border-bottom: 1px solid #222; margin-bottom: 5px; }
        .iptal-item { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); }
        .stat-card { background: #000; border: 2px solid var(--n-green); border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .gizli { display: none !important; }
        #login-ekran { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 320px; padding: 30px; background: #111; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .action-btn { padding: 5px 10px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-ekran">
    <div class="login-card">
        <h2 style="font-family:'Orbitron'">CADDE <span style="color:var(--n-blue)">PS</span></h2>
        <input type="text" id="k" placeholder="Kullanıcı Adı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" style="width:100%; padding:15px; background:var(--n-blue); border:none; border-radius:8px; color:#fff; font-weight:900; cursor:pointer;">GİRİŞ</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'; color:var(--n-blue)">00:00:00</div>
        <div id="sube-baslik" style="text-align:center; font-family:'Orbitron'; letter-spacing: 2px;">CADDE PS SİSTEM</div>
        <button onclick="cikisYap()" style="background:#222; border:none; color:#fff; padding:8px 15px; border-radius:5px; cursor:pointer;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <div class="glass">
            <select id="i-sube" onchange="verileriGetir()" style="color:var(--n-blue); font-weight:bold; border-color:var(--n-blue)">
                <option value="CADDEPS 1">ŞUBE 1</option>
                <option value="CADDEPS 2">ŞUBE 2</option>
            </select>
            
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-bottom:15px;">
                <div class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</div>
                <div class="t-btn" data-val="Kart" onclick="sec(this)">KART</div>
                <div class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</div>
                <div class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</div>
                <div class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</div>
            </div>

            <input type="number" id="i-miktar" placeholder="Tutar ₺" style="font-size:30px; color:var(--n-green); text-align:center;">
            <input type="text" id="i-not" placeholder="Açıklama">
            
            <button onclick="kaydet()" style="width:100%; padding:20px; background:var(--n-green); color:#000; font-weight:900; border:none; border-radius:8px; cursor:pointer;">KAYDET</button>
            <button onclick="gunuKapat()" style="width:100%; padding:15px; background:var(--orange); color:#000; font-weight:900; border:none; border-radius:8px; margin-top:10px; cursor:pointer;">GÜNÜ KAPAT</button>
        </div>

        <div class="glass">
            <div class="stat-card">
                <small style="color:#888;">GÜNCEL KASA (NET)</small><br>
                <b id="vT" style="font-size:48px; color:var(--n-green); font-family:'Orbitron'">0₺</b>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
                <div style="background:#000; padding:10px; border-radius:8px; text-align:center; border:1px solid #333;">
                    <small style="color:var(--n-blue)">NAKİT</small><br><b id="vNakit">0₺</b>
                </div>
                <div style="background:#000; padding:10px; border-radius:8px; text-align:center; border:1px solid #333;">
                    <small style="color:var(--orange)">KART</small><br><b id="vKart">0₺</b>
                </div>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <div class="glass">
            <h4 style="color:var(--orange); margin-top:0;">BORÇLAR</h4>
            <div id="borc-log" class="log-box" style="height:180px; margin-bottom:15px;"></div>
            <h4 style="color:var(--red); margin-top:0;">GİDERLER</h4>
            <div id="gider-log" class="log-box" style="height:180px;"></div>
        </div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase();
        const s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad && s === pDoc.data().sifre) basariliGiris(k, s, "admin");
        else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) basariliGiris(k, s, "staff"); else alert("Giriş Hatalı!");
        }
    }

    function basariliGiris(u, p, role) {
        localStorage.setItem('cadde_u', u); localStorage.setItem('cadde_p', p);
        userRole = role; currentUserName = u.toUpperCase();
        document.getElementById('login-ekran').style.display='none';
        document.getElementById('panel').classList.remove('gizli');
        verileriGetir();
    }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());

        const u1 = db.collection("islemler")
            .where("sube", "==", sName)
            .where("arsiv", "==", false)
            .orderBy("tarih", "desc")
            .onSnapshot(snap => {
                let kasa = 0, nakit = 0, kart = 0, log="", gLog="", bLog="";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.durum === "iptal") {
                        let iSatir = `<div class="islem-item iptal-item"><b>${d.miktar}₺</b> - ${d.not} (İPTAL)</div>`;
                        log += iSatir; return;
                    }

                    let m = Number(d.miktar);
                    if(d.tip === "Nakit") { kasa += m; nakit += m; }
                    else if(d.tip === "Kart" || d.tip === "Havale") { kasa += m; kart += m; }
                    else if(d.tip === "Gider") { kasa -= m; nakit -= m; }

                    // SİLME BUTONU: SADECE ADMIN
                    let silBtn = (userRole === "admin") ? `<button onclick="iptal('${doc.id}')" class="action-btn" style="background:var(--red); color:#fff; float:right;">SİL</button>` : "";
                    
                    // ÖDEME BUTONLARI: HERKES GÖREBİLİR (Personel borç tahsil edebilsin diye)
                    let odeBtnler = "";
                    if(d.tip === "Borç") {
                        odeBtnler = `
                            <div style="margin-top:8px;">
                                <button onclick="borcode('${doc.id}', ${m}, '${d.not}', 'Nakit')" class="action-btn" style="background:var(--n-green); color:#000;">NAKİT ÖDENDİ</button>
                                <button onclick="borcode('${doc.id}', ${m}, '${d.not}', 'Kart')" class="action-btn" style="background:var(--n-blue); color:#000; margin-left:5px;">KART ÖDENDİ</button>
                            </div>
                        `;
                    }

                    let satir = `<div class="islem-item">
                        ${silBtn}
                        <div><b>${m}₺</b> - ${d.not}<br><small style="color:#555;">${d.tip} | ${d.ekleyen}</small></div>
                        ${odeBtnler}
                    </div>`;

                    if(d.tip === "Gider") gLog += satir; else if(d.tip === "Borç") bLog += satir; else log += satir;
                });
                document.getElementById('vT').innerText = kasa + "₺";
                document.getElementById('vNakit').innerText = nakit + "₺";
                document.getElementById('vKart').innerText = kart + "₺";
                document.getElementById('islem-log').innerHTML = log;
                document.getElementById('gider-log').innerHTML = gLog;
                document.getElementById('borc-log').innerHTML = bLog;
            });
        unsubs.push(u1);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || seciliTip,
            tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif", arsiv: false, ekleyen: currentUserName
        });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function borcode(id, miktar, eskiNot, odemeTipi) {
        if(!confirm(miktar + "₺ borç " + odemeTipi + " olarak ödendi mi?")) return;
        await db.collection("islemler").doc(id).update({durum:"iptal", arsiv: true});
        await db.collection("islemler").add({
            miktar: miktar, tip: odemeTipi, sube: document.getElementById('i-sube').value,
            not: "[ÖDENEN BORÇ] " + eskiNot, tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif", arsiv: false, ekleyen: currentUserName
        });
        alert("Borç tahsil edildi ve kasaya işlendi.");
    }

    async function gunuKapat() {
        if(!confirm("Kasa sıfırlanacak! Emin misin?")) return;
        const sName = document.getElementById('i-sube').value;
        const snap = await db.collection("islemler").where("sube","==",sName).where("arsiv","==",false).get();
        const batch = db.batch();
        snap.forEach(doc => batch.update(doc.ref, {arsiv: true}));
        await db.collection("z_raporlari").add({ 
            tarih: new Date().toLocaleString('tr-TR'), sube: sName, kasa: document.getElementById('vT').innerText, ts: new Date() 
        });
        await batch.commit();
        alert("Gün kapatıldı.");
    }

    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    function cikisYap() { localStorage.clear(); location.reload(); }
    function iptal(id) { if(confirm("İŞLEM SİLİNSİN Mİ?")) db.collection("islemler").doc(id).update({durum:"iptal"}); }
    setInterval(()=> { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
    window.onload = function() { if(localStorage.getItem('cadde_u')) { document.getElementById('k').value = localStorage.getItem('cadde_u'); document.getElementById('s').value = localStorage.getItem('cadde_p'); giris(); } };
</script>
</body>
</html>
