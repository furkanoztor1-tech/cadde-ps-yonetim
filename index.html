<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v20.6 FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --purple: #bc13fe; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #050505; border-bottom: 2px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; padding: 15px; }
        .glass { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 10px; }
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 1px solid #333; background: #000; color: #fff; cursor: pointer; font-size: 11px; font-family: 'Orbitron'; opacity: 0.6; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); opacity: 1; }
        .log-box { height: 450px; overflow-y: auto; background: #050505; padding: 10px; font-size: 13px; border-radius: 5px; margin-top: 10px; border: 1px solid #111; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 5px; font-family: 'Rajdhani'; }
        .action-btn { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 5px; }
        .gizli { display: none !important; }
        .p-card { background: #111; padding: 10px; margin-bottom: 5px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .vardiya-box { border: 1px solid var(--gold); padding: 10px; border-radius: 5px; margin-top: 15px; background: #080808; }
        @media (max-width: 1024px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-ekran" class="gizli" style="text-align:center; padding-top:100px;">
    <div style="width:320px; margin:auto; background:#0a0a0a; padding:40px; border-top:4px solid var(--n-blue); border-radius:10px;">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">CADDE PS</h2>
        <input type="text" id="k" placeholder="Kullanıcı Adı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="action-btn" style="background:var(--n-blue); color:#000;">SİSTEME GİRİŞ</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'">00:00:00</div>
        <div id="user-info" style="font-family:'Orbitron'; font-size:12px; color:var(--n-blue)"></div>
        <button onclick="cikisYap()" style="background:none; border:1px solid var(--red); color:var(--red); padding:5px 15px; cursor:pointer; border-radius:5px;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--n-green)">İŞLEM GİRİŞİ</h4>
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <button class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</button>
                <button class="t-btn" data-val="Kart" onclick="sec(this)">KART</button>
                <button class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</button>
                <button class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</button>
                <button class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</button>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Açıklama">
            <button onclick="kaydet()" class="action-btn" style="background:var(--n-green); color:#000;">KAYDET</button>
            
            <div id="vardiya-ozet" class="vardiya-box">
                <p style="color:var(--gold); margin:0 0 5px 0; font-size:11px; font-family:'Orbitron'">VARDIYA ÖZETİNİZ</p>
                <div id="v-nakit">Nakit: 0₺</div>
                <div id="v-kart">Kart: 0₺</div>
                <button onclick="vardiyaBitir()" class="action-btn" style="background:var(--gold); color:#000; margin-top:10px; font-size:10px;">VARDİYAYI KAPAT / DÜKKANI KAPAT</button>
            </div>

            <div id="admin-panel" class="gizli" style="margin-top:20px; border-top:2px solid var(--purple); padding-top:15px;">
                <button onclick="arsivAc()" class="action-btn" style="background:var(--purple); color:#fff; margin-bottom:10px;">📊 MUHASEBE ARŞİVİ</button>
                <h4 style="color:var(--purple); font-size:12px; margin-bottom:10px;">PERSONEL TAKİBİ</h4>
                <div id="personel-listesi"></div>
                <button onclick="pEkleModali()" class="action-btn" style="background:#222; color:var(--purple); border:1px solid var(--purple); margin-top:10px;">+ YENİ PERSONEL EKLE</button>
            </div>
        </div>

        <div class="glass">
            <div style="text-align:center; padding:15px; border:2px solid var(--n-green); border-radius:8px; margin-bottom:10px;">
                <div id="kasa-detay" style="font-size:12px; color:#888;">Nakit: 0₺ | Kart: 0₺</div>
                <div id="vT" style="font-size:36px; font-family:'Orbitron'; color:var(--n-green);">0₺</div>
                <small style="color:#444">BUGÜN (02:00 - 02:00)</small>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <div class="glass">
            <h4 style="margin:0 0 10px 0; color:var(--red)">AKTİF BORÇLAR</h4>
            <div id="borc-log" class="log-box"></div>
        </div>
    </div>
</div>

<div id="arsiv-modal" class="gizli" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:2000; padding:20px; box-sizing:border-box;">
    <div style="max-width:900px; margin:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold); padding-bottom:10px;">
            <h2 style="color:var(--gold); font-family:'Orbitron';">MUHASEBE ARŞİVİ</h2>
            <button onclick="modalKapat('arsiv-modal')" style="background:var(--red); border:none; color:#fff; padding:10px 20px; cursor:pointer;">KAPAT</button>
        </div>
        <div style="margin:20px 0; display:grid; grid-template-columns: 1fr 1fr auto; gap:10px;">
            <input type="date" id="arsiv-tarih">
            <select id="arsiv-p-filtre"><option value="hepsi">Tüm Personeller</option></select>
            <button onclick="arsivGetir()" class="action-btn" style="background:var(--gold); color:#000; width:120px; margin:0;">SORGULA</button>
        </div>
        <div id="arsiv-sonuc" class="log-box" style="height:60vh;"></div>
    </div>
</div>

<div id="p-ekle-modal" class="gizli" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2100; display:flex; align-items:center; justify-content:center;">
    <div style="width:300px; background:#0a0a0a; padding:30px; border:1px solid var(--n-blue);">
        <h3 style="color:var(--n-blue); margin-top:0;">PERSONEL EKLE</h3>
        <input type="text" id="yeni-p-ad" placeholder="Kullanıcı Adı">
        <input type="password" id="yeni-p-sifre" placeholder="Şifre">
        <button onclick="pKaydet()" class="action-btn" style="background:var(--n-blue); color:#000;">KAYDET</button>
        <button onclick="modalKapat('p-ekle-modal')" class="action-btn" style="background:#333; color:#fff;">İPTAL</button>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    const SABIT_KASA = 200; 
    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];
    let pNakit = 0, pKart = 0;

    (function kontrol() {
        const d = localStorage.getItem('cadde_session_v2');
        if(d) {
            const s = JSON.parse(d);
            userRole = s.role; currentUserName = s.name;
            panelBaslat();
        } else { document.getElementById('login-ekran').classList.remove('gizli'); }
    })();

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad && s === pDoc.data().sifre) {
            userRole = "admin"; currentUserName = k;
            localStorage.setItem('cadde_session_v2', JSON.stringify({role:"admin", name:k}));
            panelBaslat();
        } else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) {
                userRole="staff"; currentUserName=k;
                localStorage.setItem('cadde_session_v2', JSON.stringify({role:"staff", name:k}));
                panelBaslat();
            } else alert("Hatalı Giriş!");
        }
    }

    function panelBaslat() {
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        document.getElementById('user-info').innerText = currentUserName.toUpperCase();
        if(userRole === "admin") {
            document.getElementById('admin-panel').classList.remove('gizli');
            personelleriYukle();
        }
        verileriGetir();
    }

    function verileriGetir() {
        const sube = document.getElementById('i-sube').value;
        unsubs.forEach(u => { if(typeof u === 'function') u(); });
        unsubs = []; 
        
        let simdi = new Date();
        let bas = new Date(simdi); if(bas.getHours() < 2) bas.setDate(bas.getDate()-1); bas.setHours(2,0,0,0);
        let bit = new Date(bas); bit.setDate(bit.getDate()+1);

        const u1 = db.collection("islemler").where("sube","==",sube).where("tarih",">=",bas).where("tarih","<",bit).orderBy("tarih","desc").onSnapshot(snap => {
            let nT=0, kT=0, log="", vN=0, vK=0;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.durum === "aktif") {
                    if(d.tip==="Nakit") nT += d.miktar;
                    if(d.tip==="Kart") kT += d.miktar;
                    if(d.tip==="Gider") nT -= d.miktar; 
                    
                    if(d.ekleyen === currentUserName) {
                        if(d.tip==="Nakit") vN += d.miktar;
                        if(d.tip==="Kart") vK += d.miktar;
                        if(d.tip==="Gider") vN -= d.miktar;
                    }
                }
                log += `<div style="padding:10px; border-bottom:1px solid #111; display:flex; justify-content:space-between;">
                    <span><b>${d.miktar}₺</b> - ${d.not || d.tip} <small>(${d.ekleyen})</small></span>
                    ${userRole==='admin' ? `<button onclick="tSil('${doc.id}')" style="background:red; border:none; color:white; font-size:10px;">SİL</button>` : ''}
                </div>`;
            });
            document.getElementById('kasa-detay').innerText = `Kasadaki Nakit: ${nT + SABIT_KASA}₺ | Kart: ${kT}₺`;
            document.getElementById('vT').innerText = (nT + kT + SABIT_KASA) + "₺";
            document.getElementById('islem-log').innerHTML = log;
            pNakit = vN; pKart = vK;
            document.getElementById('v-nakit').innerHTML = `Nakit Tahsilat: ${vN}₺ <br><small>(Kasa: ${vN + SABIT_KASA}₺)</small>`;
            document.getElementById('v-kart').innerText = `Kart Tahsilat: ${vK}₺`;
        });

        const u2 = db.collection("islemler").where("sube","==",sube).where("tip","==","Borç").where("durum","==","aktif").onSnapshot(snap => {
            let bLog = "";
            snap.forEach(doc => {
                const d = doc.data();
                bLog += `<div style="padding:10px; background:#080808; border-left:3px solid var(--red); margin-bottom:10px;">
                    <div style="margin-bottom:5px;"><b>${d.miktar}₺</b> - ${d.not}</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                        <button onclick="bTahsil('${doc.id}',${d.miktar},'${d.not}','Nakit')" style="background:var(--n-green); color:#000; border:none; padding:8px; font-weight:bold; cursor:pointer; font-size:10px;">NAKİT AL</button>
                        <button onclick="bTahsil('${doc.id}',${d.miktar},'${d.not}','Kart')" style="background:var(--n-blue); color:#000; border:none; padding:8px; font-weight:bold; cursor:pointer; font-size:10px;">KART AL</button>
                    </div>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1, u2);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, not:document.getElementById('i-not').value, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function bTahsil(id, m, n, t) {
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        await db.collection("islemler").add({ miktar:m, tip:t, sube:document.getElementById('i-sube').value, not:"BORÇ ÖDEME: "+n, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
    }

    async function vardiyaBitir() {
        const sube = document.getElementById('i-sube').value;
        if(confirm(`Dükkanı Kapatıyorsunuz.\nSizin Topladığınız Nakit: ${pNakit}₺\nSizin Topladığınız Kart: ${pKart}₺\n(200₺ Kasada bırakılacaktır.)\nOnaylıyor musunuz?`)) {
            try {
                let simdi = new Date();
                let bas = new Date(simdi); if(bas.getHours() < 2) bas.setDate(bas.getDate()-1); bas.setHours(2,0,0,0);
                let bit = new Date(bas); bit.setDate(bit.getDate()+1);

                const snap = await db.collection("islemler")
                    .where("sube", "==", sube)
                    .where("tarih", ">=", bas)
                    .where("tarih", "<", bit)
                    .get();

                let islemlerDizisi = [];
                snap.forEach(doc => {
                    let data = doc.data();
                    data.id = doc.id;
                    islemlerDizisi.push(data);
                });
                islemlerDizisi.sort((a, b) => a.tarih - b.tarih);

                let wpMesaj = `📊 *CADDE PS - GÜN SONU RAPORU*\n`;
                wpMesaj += `🏪 *Şube:* ${sube}\n`;
                wpMesaj += `👤 *Kapatan Personel:* ${currentUserName.toUpperCase()}\n`;
                wpMesaj += `📅 *Rapor Saati:* ${new Date().toLocaleTimeString('tr-TR')}\n`;
                wpMesaj += `------------------------------------------\n\n`;
                
                wpMesaj += `💰 *CİRO ÖZETİ*\n`;
                wpMesaj += `• Teslim Edilen Nakit: ${pNakit} ₺\n`;
                wpMesaj += `• Toplanan Kart: ${pKart} ₺\n`;
                wpMesaj += `• Kasada Bırakılan: ${SABIT_KASA} ₺ (SABİT)\n`;
                wpMesaj += `------------------------------------------\n\n`;
                
                wpMesaj += `📝 *İŞLEM DETAYLARI (SAAT SAAT)*\n`;
                
                let sayac = 1;
                islemlerDizisi.forEach(d => {
                    if(d.durum === "aktif") {
                        let islemSaati = "00:00";
                        if(d.tarih) {
                            const t = d.tarih.toDate ? d.tarih.toDate() : new Date(d.tarih);
                            islemSaati = t.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                        }
                        wpMesaj += `🕒 ${islemSaati} -> *${d.miktar}₺* - ${d.not || d.tip} (${d.ekleyen})\n`;
                        sayac++;
                    }
                });
                
                if(sayac === 1) wpMesaj += `_Bugün hiç işlem kaydı girilmedi._\n`;
                wpMesaj += `\n------------------------------------------\n`;
                wpMesaj += `🔐 _Bu rapor sistem tarafından otomatik üretilmiştir._`;

                await db.collection("islemler").add({ miktar: 0, tip: "BİLGİ", not: `KAPANIŞ: ${pNakit}₺ teslim, ${SABIT_KASA}₺ kasada kaldı.`, tarih: new Date(), ekleyen: currentUserName, sube: sube, durum: "info" });

                const patronNo = "905393774554"; 
                const wpUrl = `https://api.whatsapp.com/send?phone=${patronNo}&text=${encodeURIComponent(wpMesaj)}`;
                
                window.open(wpUrl, '_blank');
                cikisYap();
            } catch (hata) {
                console.error("Rapor hatası:", hata);
                alert("Rapor hazırlanırken hata oluştu.");
                cikisYap();
            }
        }
    }

    async function arsivGetir() {
        const tVal = document.getElementById('arsiv-tarih').value;
        const pF = document.getElementById('arsiv-p-filtre').value;
        const sube = document.getElementById('i-sube').value;
        if(!tVal) return alert("Tarih seçin");
        let d = new Date(tVal); d.setHours(2,0,0,0);
        let bit = new Date(d); bit.setDate(bit.getDate()+1);
        let q = db.collection("islemler").where("sube","==",sube).where("tarih",">=",d).where("tarih","<",bit);
        if(pF !== "hepsi") q = q.where("ekleyen","==",pF);
        const snap = await q.get();
        let h = "", nT=0, kT=0;
        snap.forEach(doc => {
            const data = doc.data();
            if(data.durum === "aktif") {
                if(data.tip==="Nakit") nT += data.miktar;
                if(data.tip==="Kart") kT += data.miktar;
            }
            h += `<div style="padding:10px; border-bottom:1px solid #222;"><b>${data.miktar}₺</b> - ${data.not || data.tip} (${data.ekleyen})</div>`;
        });
        document.getElementById('arsiv-sonuc').innerHTML = `<div style="background:var(--gold); color:#000; padding:10px; margin-bottom:10px; text-align:center;"><b>TOPLAM: ${nT+kT}₺</b> (Nakit: ${nT}₺ | Kart: ${kT}₺)</div>` + h;
    }

    async function personelleriYukle() {
        const snap = await db.collection("personeller").get();
        let h = "", opts = '<option value="hepsi">Tüm Personeller</option>';
        snap.forEach(doc => {
            const p = doc.data();
            h += `<div class="p-card"><span>${p.ad.toUpperCase()}</span><button onclick="pSil('${doc.id}')" style="background:none; color:red; border:none; cursor:pointer; font-weight:bold;">SİL</button></div>`;
            opts += `<option value="${p.ad}">${p.ad.toUpperCase()}</option>`;
        });
        document.getElementById('personel-listesi').innerHTML = h;
        document.getElementById('arsiv-p-filtre').innerHTML = opts;
    }

    async function pKaydet() {
        const ad = document.getElementById('yeni-p-ad').value.trim().toLowerCase();
        const sifre = document.getElementById('yeni-p-sifre').value.trim();
        if(ad && sifre) { await db.collection("personeller").add({ ad, sifre }); modalKapat('p-ekle-modal'); personelleriYukle(); }
    }

    async function pSil(id) { if(confirm("Personeli silmek istediğinize emin misiniz?")) { await db.collection("personeller").doc(id).delete(); personelleriYukle(); } }
    async function tSil(id) { if(confirm("İşlemi silmek istediğinize emin misiniz?")) await db.collection("islemler").doc(id).delete(); }

    function cikisYap() { localStorage.removeItem('cadde_session_v2'); location.reload(); }
    function arsivAc() { document.getElementById('arsiv-modal').classList.remove('gizli'); }
    function pEkleModali() { document.getElementById('p-ekle-modal').classList.remove('gizli'); }
    function modalKapat(id) { document.getElementById(id).classList.add('gizli'); }
    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=> { if(document.getElementById('saat')) document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
