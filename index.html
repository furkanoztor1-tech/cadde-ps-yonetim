<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS PRO | MANAGEMENT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00d2ff;
            --dark-core: #080808;
            --panel-bg: #121214;
            --border-color: #222;
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--dark-core); 
            color: #eee; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
        }

        /* YAN PANEL (PROFESYONEL NAVİGASYON) */
        .sidebar {
            width: 70px;
            background: #000;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            transition: width 0.3s;
            z-index: 1000;
        }
        .sidebar:hover { width: 160px; }
        
        .nav-item {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            cursor: pointer;
            color: #444;
            transition: 0.2s;
            font-family: 'Orbitron';
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
        }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 5px; }
        .nav-item.active { color: var(--neon-blue); border-right: 3px solid var(--neon-blue); background: rgba(0,210,255,0.05); }
        .nav-item:hover { color: #fff; }

        /* ANA İÇERİK ALANI */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ÜST KASA BİLGİSİ */
        .top-bar {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border-bottom: 1px solid var(--border-color);
        }
        .kasa-box { text-align: right; }
        .kasa-label { font-family: 'Orbitron'; font-size: 9px; color: #555; }
        .kasa-val { font-family: 'Orbitron'; font-size: 26px; color: var(--neon-green); text-shadow: 0 0 10px rgba(57,255,20,0.3); }

        .scroll-area { flex-grow: 1; padding: 15px; overflow-y: auto; }

        /* FORM TASARIMI */
        .pro-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        select, input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .btn-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
        .btn-opt {
            background: #000; border: 1px solid #333; color: #666;
            padding: 12px 0; border-radius: 6px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer;
        }
        .btn-opt.active { border-color: var(--neon-blue); color: var(--neon-blue); }
        
        .save-btn {
            width: 100%; padding: 15px; background: var(--neon-green); color: #000;
            font-family: 'Orbitron'; font-weight: 700; border: none; border-radius: 8px; cursor: pointer;
        }

        /* LİSTE GÖRÜNÜMÜ */
        .window-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .window { background: #0a0a0a; border: 1px solid var(--border-color); border-radius: 12px; min-height: 250px; display: flex; flex-direction: column; }
        .w-title { padding: 10px 15px; background: #111; border-bottom: 1px solid #222; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 10px; border-radius: 12px 12px 0 0; }
        .w-list { flex-grow: 1; padding: 10px; overflow-y: auto; }
        
        .list-item { 
            padding: 12px; border-bottom: 1px solid #1a1a1a; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .item-val { font-family: 'Orbitron'; font-size: 16px; color: #fff; }
        .item-not { color: #888; font-size: 14px; margin-left: 10px; }

        .z-btn { background: #500; color: #fff; border: 1px solid #800; padding: 8px 15px; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-item active" onclick="tab('main')">PANEL</div>
        <div class="nav-item" onclick="tab('arsiv')">ARŞİV</div>
        <div class="nav-item" onclick="muhasebe()">RAPOR</div>
    </nav>

    <div class="main-content">
        <header class="top-bar">
            <div class="brand" style="font-family:'Orbitron'; font-weight:700; color:#fff">CADDE PS <span style="color:var(--neon-blue)">v5.0</span></div>
            <div class="kasa-box">
                <div class="kasa-label">NET KASA STATUS</div>
                <div class="kasa-val" id="vT">0₺</div>
            </div>
            <button class="z-btn" onclick="gunuKapat()">GÜNÜ KAPAT</button>
        </header>

        <div class="scroll-area">
            <div id="main-view">
                <div class="pro-card">
                    <select id="i-sube" onchange="verileriGetir()">
                        <option value="CADDEPS 1">ŞUBE 1 (CADDE)</option>
                        <option value="CADDEPS 2">ŞUBE 2 (CADDE)</option>
                    </select>
                    <div class="btn-group">
                        <div class="btn-opt active" onclick="setTip('Nakit', this)">NAKİT</div>
                        <div class="btn-opt" onclick="setTip('Kart', this)">KART</div>
                        <div class="btn-opt" onclick="setTip('Havale', this)">HAVALE</div>
                        <div class="btn-opt" onclick="setTip('Gider', this)">GİDER</div>
                        <div class="btn-opt" onclick="setTip('Borç', this)">BORÇ</div>
                    </div>
                    <input type="number" id="i-miktar" placeholder="Tutar ₺" inputmode="decimal">
                    <input type="text" id="i-not" placeholder="Açıklama / Müşteri...">
                    <button class="save-btn" onclick="kaydet()">VERİYİ SİSTEME İŞLE</button>
                </div>

                <div class="window-grid">
                    <div class="window"><div class="w-title">GÜNLÜK İŞLEMLER</div><div class="w-list" id="log-islem"></div></div>
                    <div class="window"><div class="w-title">AÇIK BORÇLAR</div><div class="w-list" id="log-borc"></div></div>
                </div>
            </div>

            <div id="arsiv-view" style="display:none;">
                <div class="window" style="min-height:500px;"><div class="w-title">GEÇMİŞ ARŞİV</div><div class="w-list" id="log-arsiv"></div></div>
            </div>
        </div>
    </div>

<script>
    // Konfigürasyon ve Firebase Başlatma
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let tip = "Nakit", unsubs = [];

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        const u1 = db.collection("islemler").where("sube", "==", sName).onSnapshot(snap => {
            let kasa = 0, hL="", bL="", aL="";
            const docs = [];
            snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => (b.tarih?.seconds || 0) - (a.tarih?.seconds || 0));

            docs.forEach(d => {
                const m = Number(d.miktar) || 0;
                let ui = `<div class="list-item"><div><span class="item-val">${m}₺</span><span class="item-not">${d.not}</span></div></div>`;
                
                if(d.arsiv === true) {
                    if(d.tip === "DEVİR") kasa += m;
                    aL += ui;
                } else if(d.durum === "aktif") {
                    if(d.tip === "Borç") bL += ui;
                    else {
                        if(d.tip === "Gider") kasa -= m; else kasa += m;
                        hL += ui;
                    }
                }
            });
            document.getElementById('vT').innerText = kasa + "₺";
            document.getElementById('log-islem').innerHTML = hL;
            document.getElementById('log-borc').innerHTML = bL;
            document.getElementById('log-arsiv').innerHTML = aL;
        });
        unsubs.push(u1);
    }

    async function gunuKapat() {
        const s = document.getElementById('i-sube').value;
        const k = parseInt(document.getElementById('vT').innerText);
        if(!confirm(`Z RAPORU: ${k}₺ devredilsin mi?`)) return;

        const snap = await db.collection("islemler").where("sube","==",s).where("arsiv","==",false).get();
        const batch = db.batch();
        snap.forEach(d => { if(d.data().tip !== "Borç") batch.update(d.ref, {arsiv: true}); });
        const devirRef = db.collection("islemler").doc();
        batch.set(devirRef, { miktar: k, tip: "DEVİR", sube: s, not: "Dünden Devreden", tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false });
        await batch.commit();
        alert("GÜN KAPATILDI.");
    }

    function tab(v) {
        document.getElementById('main-view').style.display = v === 'main' ? 'block' : 'none';
        document.getElementById('arsiv-view').style.display = v === 'arsiv' ? 'block' : 'none';
    }

    function setTip(v, el) {
        tip = v;
        document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: tip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || tip,
            tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif", arsiv: false
        });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    window.onload = verileriGetir;
</script>
</body>
</html>
