<!-- v19.5: Vardiya Takip ve Personel Performans Sistemi -->
<script>
    // ... (Firebase Config ve Login aynı kalacak) ...

    // 1. PERSONEL İÇİN VARDİYA BİTİRME FONKSİYONU
    async function vardiyaBitir() {
        const sName = document.getElementById('i-sube').value;
        if(!confirm(currentUserName.toUpperCase() + " vardiyanı bitirmek ve raporunu kaydetmek istiyor musun?")) return;

        let n=0, k=0, b=0, g=0;
        let simdi = new Date(); let bas = new Date();
        if (simdi.getHours() < 2) { bas.setDate(simdi.getDate() - 1); }
        bas.setHours(2, 0, 0, 0);

        // Personelin o günkü aktif işlemlerini tara
        const snap = await db.collection("islemler")
            .where("sube","==",sName)
            .where("ekleyen","==",currentUserName)
            .where("tarih",">=",bas)
            .where("durum","==","aktif").get();

        snap.forEach(doc => {
            const d = doc.data();
            if(d.tip==="Nakit") n += d.miktar;
            else if(d.tip==="Kart") k += d.miktar;
            else if(d.tip==="Borç") b += d.miktar;
            else if(d.tip==="Gider") g += d.miktar;
        });

        // Vardiya raporunu kaydet
        await db.collection("vardiya_raporlari").add({
            personel: currentUserName,
            sube: sName,
            nakit: n,
            kart: k,
            borc: b,
            gider: g,
            toplamCiro: n + k,
            tarih: new Date(),
            saat: new Date().toLocaleTimeString('tr-TR')
        });

        alert("Vardiya raporun başarıyla kaydedildi. İyi istirahatler!");
        cikisYap(); // Vardiya bitince otomatik çıkış yapar
    }

    // 2. PATRON İÇİN VARDİYA RAPORLARINI GÖRÜNTÜLEME
    async function vardiyalariGor() {
        const snap = await db.collection("vardiya_raporlari").orderBy("tarih","desc").limit(20).get();
        let html = "<h3>PERSONEL VARDİYA RAPORLARI</h3><table class='rapor-tablo'><thead><tr><th>Personel</th><th>Nakit</th><th>Kart</th><th>Borç</th><th>Toplam</th><th>Saat</th></tr></thead><tbody>";
        
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr>
                <td style="color:var(--n-blue)">${d.personel.toUpperCase()}</td>
                <td>${d.nakit}₺</td>
                <td>${d.kart}₺</td>
                <td style="color:var(--orange)">${d.borc}₺</td>
                <td style="font-weight:bold">${d.toplamCiro}₺</td>
                <td>${d.saat}</td>
            </tr>`;
        });
        html += "</tbody></table>";
        // Raporu modal içinde göster
        document.getElementById('z-body').innerHTML = html;
        document.getElementById('rapor-modal').style.display='block';
    }
</script>

<!-- ARAYÜZ GÜNCELLEMESİ (Sol Panel) -->
<div class="glass">
    <h4 style="color:var(--n-green); margin:0 0 10px 0;">YENİ İŞLEM</h4>
    <!-- ... (Diğer giriş alanları) ... -->
    
    <div style="margin-top:20px; padding:15px; background:#111; border-radius:8px; border-top:3px solid var(--red);">
        <button onclick="vardiyaBitir()" style="width:100%; padding:12px; background:var(--red); color:#fff; border:none; font-weight:900; border-radius:6px; cursor:pointer;">VARDİYAYI BİTİR</button>
        <small style="display:block; margin-top:8px; color:#666; font-size:10px; text-align:center;">Vardiyanız bitince raporunuzu kaydetmek için basın.</small>
    </div>

    <!-- Admin Özel: Vardiya İzleme -->
    <div id="admin-rapor-btn" class="gizli" style="margin-top:10px;">
        <button onclick="vardiyalariGor()" style="width:100%; padding:10px; background:var(--n-purple); color:#fff; border:none; border-radius:6px; cursor:pointer;">PERSONEL RAPORLARI</button>
    </div>
</div>
