<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | ORİJİNAL YÖNETİM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --dark-bg: #0a0a0c; }
        
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--dark-bg); color: #fff; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 5px; box-sizing: border-box; }

        .stat-card { background: #000; border: 1px solid var(--n-green); border-radius: 8px; padding: 10px; text-align: center; margin-bottom: 5px; }
        .glass { background: #111; border-radius: 8px; border: 1px solid #222; padding: 8px; }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 5px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .t-btn-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 6px; }
        .t-btn { padding: 10px 0; border: 1px solid #333; text-align: center; font-size: 10px; border-radius: 5px; background: #000; color: #777; font-weight: bold; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); }
        .btn-green { width: 100%; padding: 12px; background: var(--n-green); color: #000; font-weight: bold; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 13px; }

        .window-container { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; margin-bottom: 10px; }
        .pencere { display: flex; flex-direction: column; background: #080808; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 5px; }
        .pencere-baslik { background: #111; padding: 5px 10px; font-family: 'Orbitron'; font-size: 10px; color: var(--n-blue); border-bottom: 1px solid #222; }
        .pencere-icerik { padding: 5px; }

        .islem-item { padding: 10px; border-bottom: 1px solid #151515; display: flex; justify-content: space-between; align-items: center; }
        .amount { font-family: 'Orbitron'; font-size: 16px; color: #fff; }
        .meta { font-size: 11px; color: #444; }
        
        .action-btn { padding: 6px 12px; font-size: 10px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="stat-card">
        <span style="font-size:10px; color:#555; font-family:'Orbitron'">GÜNCEL KASA</span><br>
        <b id="vT" style="font-size:26px; color:var(--n-green); font-family:'Orbitron'">0₺</b>
    </div>

    <div class="glass">
        <select id="i-sube" onchange="verileriGetir()">
            <option value="CADDEPS 1">ŞUBE 1</option>
            <option value="CADDEPS 2">ŞUBE 2</option>
        </select>
        <div class="t-btn-group">
            <div class="t-btn active" onclick="sec(this, 'Nakit')">NAKİT</div>
            <div class="t-btn" onclick="sec(this, 'Kart')">KART</div>
            <div class="t-btn" onclick="sec(this, 'Havale')">HAVALE</div>
            <div class="t-btn" onclick="sec(this, 'Gider')">GİDER</div>
            <div class="t-btn" onclick="sec(this, 'Borç')">BORÇ</div>
        </div>
        <input type="number" id="i-miktar" placeholder="Tutar ₺">
        <input type="text" id="i-not" placeholder="Detay...">
        <button onclick="kaydet()" class="btn-green">KAYDET</button>
    </div>

    <div class="window-container">
        <div class="pencere"><div class="pencere-baslik">AÇIK BORÇLAR</div><div id="borc-log" class="pencere-icerik"></div></div>
        <div class="pencere"><div class="pencere-baslik">İŞLEMLER</div><div id="islem-log" class="pencere-icerik"></div></div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let seciliTip = "Nakit", unsubs = [];

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        const u1 = db.collection("islemler").where("sube", "==", sName).onSnapshot(snap => {
            let kasa = 0, log="", bLog="";
            snap.forEach(d => {
                const data = d.data();
                const m = Number(data.miktar) || 0;
                let s = `<div class="islem-item"><div><span class="amount">${m}₺</span> - ${data.not}<br><span class="meta">${data.tip}</span></div>`;
                
                if(data.tip === "Borç" && data.durum === "aktif") {
                    bLog += s + `<div><button onclick="ode('${d.id}',${m},'${data.not}')" class="action-btn" style="background:var(--n-green);">ÖDE</button></div></div>`;
                } else if(data.durum === "aktif") {
                    if(data.tip === "Gider") kasa -= m; else kasa += m;
                    log += s + `</div>`;
                }
            });
            document.getElementById('vT').innerText = kasa + "₺";
            document.getElementById('islem-log').innerHTML = log;
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || seciliTip,
            tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif"
        });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function ode(id, m, n) {
        await db.collection("islemler").doc(id).update({durum:"kapali"});
        await db.collection("islemler").add({
            miktar: m, tip: "Nakit", sube: document.getElementById('i-sube').value,
            not: "[ÖDENDİ] " + n, tarih: firebase.firestore.FieldValue.serverTimestamp(), durum: "aktif"
        });
    }

    function sec(btn, val) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=val; }
    window.onload = verileriGetir;
</script>
</body>
</html>
