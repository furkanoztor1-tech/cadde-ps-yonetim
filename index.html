<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | v19.6 PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --n-purple: #bc13fe; --red: #ff4444; --orange: #ffa502; }
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow-x: hidden; font-weight: 600; }
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px 20px; background: #050505; border-bottom: 3px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 340px 1fr 340px; gap: 20px; padding: 20px; box-sizing: border-box; }
        .glass { background: rgba(15,15,15,0.9); border-radius: 12px; border: 2px solid #252525; padding: 15px; display: flex; flex-direction: column; }
        .type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 2px solid #333; border-radius: 6px; background: #000; color: #fff; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; opacity: 0.5; text-align: center; }
        .t-btn.active { opacity: 1; border-color: var(--n-blue); color: var(--n-blue); }
        .log-box { flex: 1; overflow-y: auto; background: #030303; border-radius: 8px; padding: 10px; font-size: 14px; min-height: 250px; max-height: 500px; }
        .stat-card { background: #000; border: 2px solid var(--n-green); border-radius: 10px; padding: 12px; text-align: center; margin-bottom: 10px; }
        .gizli { display: none !important; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-family: 'Rajdhani'; }
        .hata-li { text-decoration: line-through; color: var(--red) !important; opacity: 0.6; }
        .v-rapor-btn { background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }
        @media (max-width: 1024px) { .main-grid { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-ekran">
    <div style="width: 320px; padding: 40px; background: #0a0a0a; border-top: 5px solid var(--n-blue); text-align: center; border-radius: 10px; margin: 50px auto;">
        <h1 style="font-family:'Orbitron';">CADDE PS</h1>
        <input type="text" id="k" placeholder="Kullanıcı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" style="width:100%; padding:15px; background:var(--n-blue); color:#000; font-weight:900; border:none; border-radius:5px; cursor:pointer;">GİRİŞ YAP</button>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron'; font-size:16px;">00:00:00</div>
        <div style="text-align:center"><h2 style="font-family:'Orbitron'; margin:0;">CADDE <span style="color:var(--n-blue)">PS</span></h2></div>
        <button onclick="cikisYap()" style="background:none; border:1px solid var(--red); color:var(--red); font-size:10px; padding:6px 12px; border-radius:5px;">ÇIKIŞ</button>
    </div>

    <div class="main-grid">
        <!-- SOL: Giriş ve Vardiya -->
        <div class="glass">
            <h4 style="color:var(--n-green); margin:0 0 10px 0;">YENİ İŞLEM</h4>
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <div class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</div>
                <div class="t-btn" data-val="Kart" onclick="sec(this)">KART</div>
                <div class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</div>
                <div class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</div>
                <div class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Açıklama">
            <button onclick="kaydet()" style="width:100%; padding:15px; background:var(--n-green); color:#000; font-weight:900; border:none; border-radius:8px; cursor:pointer;">KAYDET</button>
            
            <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
                <button onclick="vardiyaBitir()" class="v-rapor-btn">VARDİYAYI BİTİR</button>
                <div id="p-ozet" style="text-align:center; margin-top:10px; color:var(--n-blue); font-size:20px;">0₺</div>
            </div>
            
            <button id="admin-rapor-btn" onclick="vardiyalariGor()" class="gizli" style="margin-top:10px; background:var(--n-purple); color:white; border:none; padding:10px; border-radius:8px;">VARDİYA RAPORLARI</button>
        </div>

        <!-- ORTA: Kasa -->
        <div class="glass">
            <div class="stat-card">
                <div id="kasa-detay" style="display:grid; grid-template-columns:1fr 1fr; font-size:12px; margin-bottom:5px;"></div>
                <div id="vT" style="font-size:38px; color:var(--n-green); font-family:'Orbitron';">0₺</div>
            </div>
            <div id="islem-log" class="log-box"></div>
        </div>

        <!-- SAĞ: Borçlar -->
        <div class="glass">
            <h4 style="color:var(--n-purple); margin:0 0 10px 0;">BORÇLAR</h4>
            <div id="borc-log" class="log-box"></div>
        </div>
    </div>
</div>

<!-- Rapor Modalı -->
<div id="modal" class="gizli" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; overflow-y:auto; padding:20px; box-sizing:border-box;">
    <button onclick="document.getElementById('modal').classList.add('gizli')" style="background:var(--red); color:white; padding:10px; margin-bottom:10px; border:none; border-radius:5px;">KAPAT</button>
    <div id="modal-body"></div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase(), s = document.getElementById('s').value;
        const p = await db.collection("ayarlar").doc("patron").get();
        if(k === p.data().ad && s === p.data().sifre) { 
            userRole = "admin"; currentUserName = k; 
            document.getElementById('admin-rapor-btn').classList.remove('gizli');
            baslat();
        } else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) { userRole = "staff"; currentUserName = k; baslat(); }
            else alert("Hatalı Giriş!");
        }
    }

    function baslat() {
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        verileriGetir();
    }

    function cikisYap() { location.reload(); }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        let simdi = new Date(); let bas = new Date();
        if (simdi.getHours() < 2) bas.setDate(simdi.getDate() - 1);
        bas.setHours(2, 0, 0, 0);

        const u1 = db.collection("islemler").where("sube", "==", sName).where("tarih", ">=", bas).onSnapshot(snap => {
            let nT=0, kT=0, hT=0, gT=0, pT=0; let log = "";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.durum === "aktif") {
                    if(d.tip === "Nakit") nT += d.miktar;
                    else if(d.tip === "Kart") kT += d.miktar;
                    else if(d.tip === "Havale") hT += d.miktar;
                    else if(d.tip === "Gider") gT += d.miktar;
                    if(d.ekleyen === currentUserName && d.tip !== "Gider") pT += d.miktar;
                }
                let btn = userRole === "admin" ? `<button onclick="tSil('${doc.id}')" style="float:right; background:red; color:white; border:none; padding:2px 5px; font-size:10px; margin-left:5px;">SİL</button>` : "";
                if(d.durum === "aktif" && d.tip !== "Borç") btn += `<button onclick="hBildir('${doc.id}')" style="float:right; background:orange; color:black; border:none; padding:2px 5px; font-size:10px;">HATA</button>`;
                
                log += `<div class="${d.durum === 'hata' ? 'hata-li' : ''}" style="padding:10px; border-bottom:1px solid #222;">
                    <b>${d.miktar}₺</b> - ${d.not} (${d.tip}) ${btn}
                    <div style="font-size:10px; color:#555;">${d.ekleyen || ''}</div>
                </div>`;
            });
            document.getElementById('kasa-detay').innerHTML = `<div>NAKİT: ${nT}₺</div><div>KART: ${kT}₺</div>`;
            document.getElementById('vT').innerText = (nT + kT + hT - gT) + "₺";
            document.getElementById('p-ozet').innerText = "Benim Toplam: " + pT + "₺";
            document.getElementById('islem-log').innerHTML = log;
        });

        const u2 = db.collection("islemler").where("sube", "==", sName).where("tip", "==", "Borç").where("durum", "==", "aktif").onSnapshot(snap => {
            let bLog = "";
            snap.forEach(doc => {
                const d = doc.data();
                bLog += `<div style="padding:10px; border-bottom:1px solid #222; background:#080808; margin-bottom:5px;">
                    <b>${d.miktar}₺</b> - ${d.not}
                    <div style="margin-top:5px;">
                        <button onclick="bTahsil('${doc.id}', ${d.miktar}, '${d.not}', 'Nakit')" style="background:var(--n-green); color:black; border:none; padding:5px; border-radius:4px; font-size:10px;">NAKİT</button>
                        <button onclick="bTahsil('${doc.id}', ${d.miktar}, '${d.not}', 'Kart')" style="background:var(--n-blue); color:black; border:none; padding:5px; border-radius:4px; font-size:10px;">KART</button>
                    </div>
                </div>`;
            });
            document.getElementById('borc-log').innerHTML = bLog;
        });
        unsubs.push(u1, u2);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({ miktar:m, tip:seciliTip, sube:document.getElementById('i-sube').value, not:document.getElementById('i-not').value || seciliTip, tarih:new Date(), durum:"aktif", ekleyen:currentUserName });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function hBildir(id) { if(confirm("Hata?")) await db.collection("islemler").doc(id).update({ durum: "hata" }); }
    async function tSil(id) { if(confirm("Sil?")) await db.collection("islemler").doc(id).delete(); }

    async function bTahsil(id, m, n, t) {
        await db.collection("islemler").doc(id).update({ durum: "odendi" });
        await db.collection("islemler").add({ miktar: m, tip: t, sube: document.getElementById('i-sube').value, not: "BORÇ: " + n, tarih: new Date(), durum: "aktif", ekleyen: currentUserName });
    }

    async function vardiyaBitir() {
        if(!confirm("Vardiyayı bitirip rapor kaydedilsin mi?")) return;
        const sName = document.getElementById('i-sube').value;
        let n=0, k=0, b=0;
        let simdi = new Date(); let bas = new Date();
        if (simdi.getHours() < 2) bas.setDate(simdi.getDate() - 1);
        bas.setHours(2, 0, 0, 0);

        const snap = await db.collection("islemler").where("sube","==",sName).where("ekleyen","==",currentUserName).where("tarih",">=",bas).where("durum","==","aktif").get();
        snap.forEach(doc => {
            const d = doc.data();
            if(d.tip==="Nakit") n+=d.miktar; else if(d.tip==="Kart") k+=d.miktar; else if(d.tip==="Borç") b+=d.miktar;
        });

        await db.collection("vardiya_raporlari").add({ personel:currentUserName, sube:sName, nakit:n, kart:k, borc:b, tarih:new Date() });
        alert("Rapor Kaydedildi!"); cikisYap();
    }

    async function vardiyalariGor() {
        const snap = await db.collection("vardiya_raporlari").orderBy("tarih","desc").limit(10).get();
        let h = "<h2>Son Vardiyalar</h2><table border='1' style='width:100%; border-collapse:collapse;'><tr><th>Personel</th><th>Nakit</th><th>Kart</th><th>Tarih</th></tr>";
        snap.forEach(doc => {
            const d = doc.data();
            h += `<tr><td>${d.personel}</td><td>${d.nakit}₺</td><td>${d.kart}₺</td><td>${d.tarih.toDate().toLocaleString()}</td></tr>`;
        });
        document.getElementById('modal-body').innerHTML = h + "</table>";
        document.getElementById('modal').classList.remove('gizli');
    }

    function sec(btn) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=btn.getAttribute('data-val'); }
    setInterval(()=> { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
