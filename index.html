<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS | SCROLL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --red: #ff4444; --orange: #ff9f43; --dark-bg: #0a0a0c; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--dark-bg); color: #fff; overflow-x: hidden; }
        .container { padding: 10px; max-width: 600px; margin: auto; padding-bottom: 50px; }
        
        /* KASA KARTI */
        .stat-card { background: #000; border: 2px solid var(--n-green); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px; }
        
        /* GİRİŞ ALANI */
        .glass { background: #111; border-radius: 15px; border: 1px solid #222; padding: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 16px; font-family: 'Rajdhani'; }

        /* BUTONLAR */
        .t-btn-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .t-btn { padding: 10px 2px; border: 1px solid #333; text-align: center; font-size: 11px; cursor: pointer; border-radius: 8px; background: #000; font-weight: bold; }
        .t-btn.active { border-color: var(--n-blue); color: var(--n-blue); }
        .btn-green { width: 100%; padding: 18px; background: var(--n-green); color: #000; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 14px; }

        /* SENİN İSTEDİĞİN KAYDIRILABİLİR PENCERE (SCROLL BOX) */
        .scroll-window { 
            background: #050505; 
            border: 1px solid #1a1a1a; 
            border-radius: 12px; 
            max-height: 250px; /* Pencere boyutu: Yaklaşık 3-4 borç sığar, fazlası için kaydırılır */
            overflow-y: auto;  /* Aşağı doğru kaydırma özelliği */
            margin-bottom: 10px;
        }
        
        /* Scrollbar'ı güzelleştirme (Modern görünüm) */
        .scroll-window::-webkit-scrollbar { width: 4px; }
        .scroll-window::-webkit-scrollbar-thumb { background: var(--n-blue); border-radius: 10px; }

        .section-title { font-family: 'Orbitron'; font-size: 12px; color: var(--n-blue); margin: 15px 0 8px 5px; text-transform: uppercase; }
        
        .islem-item { padding: 12px; border-bottom: 1px solid #151515; position: relative; }
        .action-btn { padding: 8px 12px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-ekran" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="width:100%; max-width:320px; padding:30px; background:#111; border-radius:20px; text-align:center; border:1px solid #222;">
        <h2 style="font-family:'Orbitron'">CADDE <span style="color:var(--n-blue)">PS</span></h2>
        <input type="text" id="k" placeholder="Kullanıcı">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()" class="btn-green" style="background:var(--n-blue); color:#fff;">GİRİŞ</button>
    </div>
</div>

<div id="panel" style="display:none;">
    <div class="container">
        <!-- KASA -->
        <div class="stat-card">
            <small style="color:#555;">GÜNCEL KASA</small><br>
            <b id="vT" style="font-size:35px; color:var(--n-green); font-family:'Orbitron'">0₺</b>
        </div>

        <!-- KAYIT -->
        <div class="glass">
            <select id="i-sube" onchange="verileriGetir()">
                <option value="CADDEPS 1">ŞUBE 1</option>
                <option value="CADDEPS 2">ŞUBE 2</option>
            </select>
            <div class="t-btn-group">
                <div class="t-btn active" onclick="sec(this, 'Nakit')">NAKİT</div>
                <div class="t-btn" onclick="sec(this, 'Kart')">KART</div>
                <div class="t-btn" onclick="sec(this, 'Havale')">HAVALE</div>
                <div class="t-btn" onclick="sec(this, 'Gider')">GİDER</div>
                <div class="t-btn" onclick="sec(this, 'Borç')">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺">
            <input type="text" id="i-not" placeholder="Not (Müşteri adı vb.)">
            <button onclick="kaydet()" class="btn-green">KAYDET</button>
        </div>

        <!-- KAYDIRILABİLİR BORÇ PENCERESİ -->
        <div class="section-title">AÇIK BORÇLAR (KAYDIRILABİLİR)</div>
        <div id="borc-log" class="scroll-window"></div>

        <!-- BUGÜNKÜ İŞLEMLER PENCERESİ -->
        <div class="section-title">BUGÜNKÜ İŞLEMLER</div>
        <div id="islem-log" class="scroll-window" style="max-height: 200px;"></div>

        <!-- GİDERLER PENCERESİ -->
        <div class="section-title">GİDERLER</div>
        <div id="gider-log" class="scroll-window" style="max-height: 150px;"></div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris() {
        const k = document.getElementById('k').value.trim().toLowerCase();
        const s = document.getElementById('s').value;
        const pDoc = await db.collection("ayarlar").doc("patron").get();
        if(k === pDoc.data().ad && s === pDoc.data().sifre) start(k, "admin");
        else {
            const snap = await db.collection("personeller").where("ad","==",k).where("sifre","==",s).get();
            if(!snap.empty) start(k, "staff"); else alert("Hata!");
        }
    }

    function start(u, r) {
        userRole = r; currentUserName = u.toUpperCase();
        localStorage.setItem('c_u', u); localStorage.setItem('c_p', document.getElementById('s').value);
        document.getElementById('login-ekran').style.display='none';
        document.getElementById('panel').style.display='block';
        verileriGetir();
    }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        unsubs.forEach(u => u());
        const u1 = db.collection("islemler").where("sube", "==", sName).onSnapshot(snap => {
            let kasa = 0, log="", gLog="", bLog="";
            const docs = [];
            snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => (b.tarih?.seconds || 0) - (a.tarih?.seconds || 0));

            docs.forEach(d => {
                const m = Number(d.miktar) || 0;
                const isBorc = d.tip === "Borç" && d.durum === "aktif";
                const isToday = d.arsiv === false;
                if(d.durum === "iptal" && !isToday) return;

                if(isToday && d.durum !== "iptal") {
                    if(["Nakit", "Kart", "Havale"].includes(d.tip)) kasa += m;
                    else if(d.tip === "Gider") kasa -= m;
                }

                let silBtn = (userRole === "admin" || isToday) ? `<button onclick="iptal('${d.id}')" style="background:var(--red); color:#fff; position:absolute; right:10px; top:10px; border:none; padding:4px 8px; border-radius:4px; font-size:9px;">SİL</button>` : "";
                
                let satir = `<div class="islem-item">
                    ${silBtn}
                    <div><b>${m}₺</b> - ${d.not}<br><small style="color:#555">${d.tip} | ${d.ekleyen}</small></div>
                    ${isBorc ? `<div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="ode('${d.id}',${m},'${d.not}','Nakit')" class="action-btn" style="background:var(--n-green); color:#000; flex:1;">NAKİT ÖDE</button>
                        <button onclick="ode('${d.id}',${m},'${d.not}','Kart')" class="action-btn" style="background:var(--n-blue); color:#000; flex:1;">KART ÖDE</button>
                    </div>` : ""}
                </div>`;

                if(isBorc) bLog += satir;
                else if(isToday) { if(d.tip === "Gider") gLog += satir; else log += satir; }
            });
            document.getElementById('vT').innerText = kasa + "₺";
            document.getElementById('islem-log').innerHTML = log || "<center style='padding:20px; color:#333'>İşlem yok.</center>";
            document.getElementById('gider-log').innerHTML = gLog || "<center style='padding:20px; color:#333'>Gider yok.</center>";
            document.getElementById('borc-log').innerHTML = bLog || "<center style='padding:20px; color:#333'>Açık borç yok.</center>";
        });
        unsubs.push(u1);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value); if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || seciliTip,
            tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif", arsiv: false, ekleyen: currentUserName
        });
        document.getElementById('i-miktar').value=""; document.getElementById('i-not').value="";
    }

    async function ode(id, m, n, tip) {
        if(!confirm("Tahsil edildi mi?")) return;
        await db.collection("islemler").doc(id).update({durum:"iptal", arsiv: true});
        await db.collection("islemler").add({
            miktar: m, tip: tip, sube: document.getElementById('i-sube').value,
            not: "[BORÇ KAPANDI] " + n, tarih: firebase.firestore.FieldValue.serverTimestamp(),
            durum: "aktif", arsiv: false, ekleyen: currentUserName
        });
    }

    function iptal(id) { if(confirm("Siliyorum?")) db.collection("islemler").doc(id).update({durum:"iptal"}); }
    function sec(btn, val) { document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); seciliTip=val; }
    window.onload = () => { if(localStorage.getItem('c_u')) { document.getElementById('k').value=localStorage.getItem('c_u'); document.getElementById('s').value=localStorage.getItem('c_p'); giris(); } };
</script>
</body>
</html>
