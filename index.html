<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADDE PS v17.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --n-purple: #bc13fe; --red: #ff4444; --orange: #ff9f43; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .top-bar { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px 20px; background: #050505; border-bottom: 3px solid var(--n-blue); align-items: center; }
        .main-grid { display: grid; grid-template-columns: 340px 1fr 340px; gap: 20px; padding: 20px; box-sizing: border-box; }
        .glass { background: rgba(15,15,15,0.9); border-radius: 12px; border: 2px solid #252525; padding: 15px; display: flex; flex-direction: column; }
        .type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .t-btn { padding: 10px; border: 2px solid #333; border-radius: 6px; background: #000; color: #fff; cursor: pointer; font-size: 10px; text-align: center; font-weight: 900; }
        .t-btn.active[data-val="Nakit"] { border-color: var(--n-green); color: var(--n-green); }
        .t-btn.active[data-val="Kart"] { border-color: var(--n-blue); color: var(--n-blue); }
        .t-btn.active[data-val="Havale"] { border-color: var(--orange); color: var(--orange); }
        .gizli { display: none !important; }
        @media (max-width: 768px) { .main-grid { display: flex; flex-direction: column; } }
        
        #pwa-setup { display: none; background: #111; padding: 15px; border-radius: 10px; border: 2px solid var(--orange); margin-bottom: 20px; text-align: center; }
        #pwa-setup b { color: var(--orange); display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-ekran">
    <div style="width: 320px; padding: 30px; background: #0a0a0a; border-top: 5px solid var(--n-blue); text-align: center; border-radius: 10px; margin: 80px auto;">
        <h1 style="font-family:'Orbitron'; color:#fff;">CADDE PS</h1>
        
        <div id="pwa-setup">
            <b>UYGULAMA HAZIR!</b>
            <button onclick="installPWA()" style="width:100%; padding:12px; background:var(--orange); color:#000; font-weight:900; border:none; border-radius:5px; cursor:pointer;">TELEFONA İNDİR</button>
        </div>

        <p id="l-durum" style="color:var(--n-blue); font-size:12px;">Sisteme bağlanılıyor...</p>
        <div id="l-form">
            <input type="text" id="k" placeholder="Kullanıcı" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; box-sizing:border-box;">
            <input type="password" id="s" placeholder="Şifre" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; box-sizing:border-box;">
            <button onclick="giris()" style="width:100%; padding:15px; background:var(--n-blue); color:#000; font-weight:900; border:none; cursor:pointer; border-radius:5px;">GİRİŞ YAP</button>
        </div>
    </div>
</div>

<div id="panel" class="gizli">
    <div class="top-bar">
        <div id="saat" style="font-family:'Orbitron';">00:00:00</div>
        <div style="text-align:center; font-family:'Orbitron';">CADDE <span style="color:var(--n-blue)">PS</span></div>
        <button onclick="cikisYap()" style="background:none; border:1px solid var(--red); color:var(--red); font-size:10px; padding:5px; border-radius:4px; cursor:pointer;">ÇIKIŞ</button>
    </div>
    
    <div class="main-grid">
        <div class="glass">
            <h4 style="color:var(--n-green); margin:0 0 10px 0;">İŞLEM YAP</h4>
            <select id="i-sube" onchange="verileriGetir()" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--n-blue); margin-bottom:10px;">
                <option value="CADDEPS 1">CADDEPS 1</option>
                <option value="CADDEPS 2">CADDEPS 2</option>
            </select>
            <div class="type-grid">
                <div class="t-btn active" data-val="Nakit" onclick="sec(this)">NAKİT</div>
                <div class="t-btn" data-val="Kart" onclick="sec(this)">KART</div>
                <div class="t-btn" data-val="Havale" onclick="sec(this)">HAVALE</div>
                <div class="t-btn" data-val="Gider" onclick="sec(this)">GİDER</div>
                <div class="t-btn" data-val="Borç" onclick="sec(this)">BORÇ</div>
            </div>
            <input type="number" id="i-miktar" placeholder="Tutar ₺" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; font-size:20px; margin-bottom:10px; box-sizing:border-box;">
            <input type="text" id="i-not" placeholder="Not/Müşteri" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:10px; box-sizing:border-box;">
            <button onclick="kaydet()" style="width:100%; padding:15px; background:var(--n-green); color:#000; font-weight:900; border:none; border-radius:5px; cursor:pointer;">KAYDI TAMAMLA</button>
        </div>

        <div class="glass">
            <div class="stat-card" style="text-align:center; padding:15px; border:1px solid var(--n-green); border-radius:10px; margin-bottom:10px;">
                <small id="sube-ad" style="color:#888;">...</small><br>
                <b id="vT" style="font-size:32px; color:var(--n-green); font-family:'Orbitron';">0₺</b>
            </div>
            <div id="islem-log" style="height:300px; overflow-y:auto; background:#050505; padding:10px; font-size:13px; border-radius:5px;"></div>
        </div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyA1Yr6u_z0eQV5a_8_5wRSvLrqcV6vUmI8", authDomain: "cadde-yonetim.firebaseapp.com", projectId: "cadde-yonetim", storageBucket: "cadde-yonetim.firebasestorage.app", messagingSenderId: "578914689738", appId: "1:578914689738:web:70c71a96e0eea69b0bca33" };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('pwa-setup').style.display = 'block';
    });

    async function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                deferredPrompt = null;
                document.getElementById('pwa-setup').style.display = 'none';
            }
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=10');
    }

    // OTO GİRİŞ VE HATIRLAMA MANTIĞI
    window.onload = function() {
        const kaydedilenUser = localStorage.getItem('caddeUser');
        const kaydedilenSifre = localStorage.getItem('caddePass');
        
        if(kaydedilenUser && kaydedilenSifre) {
            document.getElementById('k').value = kaydedilenUser;
            document.getElementById('s').value = kaydedilenSifre;
            giris(true); // Otomatik giriş yap
        } else {
            document.getElementById('l-durum').innerText = "Lütfen giriş yapın.";
        }
    };

    let userRole = "staff", currentUserName = "", seciliTip = "Nakit", unsubs = [];

    async function giris(isAuto = false) {
        const k = document.getElementById('k').value.trim().toLowerCase();
        const s = document.getElementById('s').value;
        if(!k || !s) return;

        document.getElementById('l-durum').innerText = "Kontrol ediliyor...";

        const p = await db.collection("ayarlar").doc("patron").get();
        const pD = p.data();

        if(k === pD.ad && s === pD.sifre) {
            basariliGiris(k, s, "admin");
        } else {
            db.collection("personeller").where("ad","==",k).where("sifre","==",s).get().then(snap => {
                if(!snap.empty) {
                    basariliGiris(k, s, "staff");
                } else {
                    document.getElementById('l-durum').innerText = "Hatalı Giriş!";
                    localStorage.removeItem('caddeUser');
                    localStorage.removeItem('caddePass');
                }
            });
        }
    }

    function basariliGiris(u, p, role) {
        localStorage.setItem('caddeUser', u);
        localStorage.setItem('caddePass', p);
        userRole = role;
        currentUserName = u;
        document.getElementById('login-ekran').classList.add('gizli');
        document.getElementById('panel').classList.remove('gizli');
        verileriGetir();
    }

    function cikisYap() {
        localStorage.removeItem('caddeUser');
        localStorage.removeItem('caddePass');
        location.reload();
    }

    function verileriGetir() {
        const sName = document.getElementById('i-sube').value;
        document.getElementById('sube-ad').innerText = sName;
        unsubs.forEach(u => u());
        
        let bugun = new Date();
        bugun.setHours(0,0,0,0);

        const u1 = db.collection("islemler").where("tarih", ">=", bugun).orderBy("tarih", "desc").onSnapshot(snap => {
            let toplam = 0, logH = "";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.sube === sName && d.durum !== "iptal") {
                    if(d.tip !== "Gider" && d.tip !== "Borç") toplam += Number(d.miktar);
                    logH += `<div style="padding:8px; border-bottom:1px solid #222;"><b>${d.miktar}₺</b> - ${d.not} <small>(${d.tip})</small></div>`;
                }
            });
            document.getElementById('vT').innerText = toplam + "₺";
            document.getElementById('islem-log').innerHTML = logH;
        });
        unsubs.push(u1);
    }

    async function kaydet() {
        const m = Number(document.getElementById('i-miktar').value);
        if(!m) return;
        await db.collection("islemler").add({
            miktar: m, tip: seciliTip, sube: document.getElementById('i-sube').value,
            not: document.getElementById('i-not').value || seciliTip,
            tarih: new Date(), durum: "aktif", ekleyen: currentUserName
        });
        document.getElementById('i-miktar').value = "";
        document.getElementById('i-not').value = "";
    }

    function sec(btn) {
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        seciliTip = btn.getAttribute('data-val');
    }

    setInterval(() => { document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
